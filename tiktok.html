<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <title>Pixel Click - TikTok Timer Shake Only</title>
    <style>
        :root {
            --color-1: #ff4757;
            --color-2: #2e86de;
            --color-3: #2ed573;
            --color-4: #eccc68;
            --color-accent: #2e86de;
            --color-title: #ffd700; 
            --correct-glow: #00ff00; 
        }

        body {
            background-image: url('background.png');
            background-size: auto; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            color: white;
            font-family: 'Russo One', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #video-canvas {
            width: 100vw;
            max-width: 450px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            padding: 20px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        /* ANIMAÇÃO DE TREMIDA (SHAKE) ISOLADA */
        @keyframes timerShake {
            0% { transform: translateX(0) rotate(0); }
            15% { transform: translateX(-4px) rotate(-1deg); }
            30% { transform: translateX(4px) rotate(1deg); }
            45% { transform: translateX(-3px) rotate(-1deg); }
            60% { transform: translateX(3px) rotate(1deg); }
            75% { transform: translateX(-2px) rotate(0); }
            100% { transform: translateX(2px) rotate(0); }
        }

        /* Classe que aplica a tremida (shake) à barra de tempo */
        .suspense-timer-shake {
            animation: timerShake 0.15s infinite ease-in-out;
        }

        .fixed-title {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 100px; 
            margin-bottom: 50px;
            color: var(--color-title);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7), 0 0 20px rgba(255, 215, 0, 0.5), 2px 2px 2px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 5;
        }

        .question-text {
            font-size: 1.7rem;
            margin-bottom: 10px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000, 0 0 20px rgba(0,0,0,0.9);
            z-index: 2;
        }

        #timer-container {
            width: 100%;
            height: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 2;
        }
        
        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--color-3);
            box-shadow: 0 0 15px var(--color-3);
            /* Transições para suavizar a troca de cor e brilho */
            transition: background-color 0.3s, box-shadow 0.3s;
            /* Garante que o shake não quebre o layout */
            transform-origin: center left; 
        }

        .options-list {
            width: 100%;
            display: grid;
            gap: 15px;
            z-index: 2;
        }

        .option {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 22px;
            border-radius: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .opt-0 { border-color: var(--color-1); box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .opt-1 { border-color: var(--color-2); box-shadow: 0 0 15px rgba(46, 134, 222, 0.4); }
        .opt-2 { border-color: var(--color-3); box-shadow: 0 0 15px rgba(46, 213, 115, 0.4); }
        .opt-3 { border-color: var(--color-4); box-shadow: 0 0 15px rgba(236, 204, 104, 0.4); }

        .highlight-correct {
            border-color: var(--correct-glow) !important;
            background: var(--correct-glow) !important;
            color: black !important;
            box-shadow: 0 0 20px var(--correct-glow), 0 0 40px var(--correct-glow) !important;
            transform: scale(1.08);
            z-index: 10;
        }

        .footer-brand {
            margin-top: 40px; 
            background: var(--color-accent);
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(46, 134, 222, 0.7);
            position: relative;
            z-index: 2;
        }

        .particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; z-index: -1; animation: move-particle 2s linear forwards; }
        @keyframes move-particle { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <div id="video-canvas">
        <div class="fixed-title" id="main-title">TESTE SEU CONHECIMENTO</div>
        
        <div style="width: 100%;" id="quiz-container">
            <div class="question-text" id="q-text"></div>
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div class="options-list" id="options-box"></div>
        </div>

        <div class="footer-brand" id="footer-btn">WWW.PIXELCLICK.FUN</div>
    </div>

    <script src="geografia.js"></script>

    <script>
        const masterPool = [...(typeof geografiaData !== 'undefined' ? geografiaData : [])];
        const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, 8);
        let currentQ = 0;
        let particleIntervals = [];

        function startSequence() {
            particleIntervals.forEach(clearInterval);
            particleIntervals = [];
            
            // Garante que o suspense-shake do container inteiro (se existir) seja removido
            document.getElementById('quiz-container').classList.remove('suspense-shake');
            // Remove a tremida da barra de tempo anterior
            document.getElementById('timer-bar').classList.remove('suspense-timer-shake');

            if (currentQ >= 8) {
                document.getElementById('video-canvas').innerHTML = `
                    <div style="display: flex; flex-direction: column; justify-content: center; height: 100%; align-items: center;">
                        <div class="fixed-title" style="margin-top: 0; margin-bottom: 40px;">TESTE FINALIZADO</div>
                        <h1 style="font-size: 2.5rem; margin-bottom: 50px;">QUAL FOI A SUA PONTUAÇÃO?</h1>
                        <div class="footer-brand" style="margin-top: 0">WWW.PIXELCLICK.FUN</div>
                    </div>
                `;
                return;
            }

            const data = selectedQuestions[currentQ];
            document.getElementById('q-text').innerText = data.q;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            const colors = ['#ff4757', '#2e86de', '#2ed573', '#eccc68'];

            particleIntervals.push(setInterval(() => spawnParticle(document.getElementById('main-title'), '#ffffff'), 300));

            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = `option opt-${i}`;
                div.id = `opt-${i}`;
                div.innerText = opt;
                box.appendChild(div);
                particleIntervals.push(setInterval(() => spawnParticle(div, colors[i]), 180));
            });

            particleIntervals.push(setInterval(() => spawnParticle(document.getElementById('footer-btn'), '#2e86de'), 250));

            runTimer(data.correct);
        }

        function runTimer(correctIndex) {
            const barEl = document.getElementById('timer-bar');
            const startTime = Date.now();
            const duration = 8000; // 8 segundos

            function update() {
                const elapsed = Date.now() - startTime;
                const percent = Math.max(0, 100 - (elapsed / duration * 100));
                
                barEl.style.width = percent + "%";

                // Lógica de Cores e Suspense ISOLADA na Barra de Tempo
                if (percent > 60) {
                    barEl.style.backgroundColor = "#2ed573"; // Verde
                    barEl.style.boxShadow = "0 0 15px #2ed573";
                    barEl.classList.remove('suspense-timer-shake'); // Garante que está limpo
                } else if (percent <= 60 && percent > 30) {
                    barEl.style.backgroundColor = "#eccc68"; // Amarelo (Meio suspendo)
                    barEl.style.boxShadow = "0 0 15px #eccc68";
                    barEl.classList.add('suspense-timer-shake'); // INICIA A TREMIDA SÓ NA BARRA
                } else {
                    barEl.style.backgroundColor = "#ff4757"; // Vermelho (Urgência Total)
                    barEl.style.boxShadow = "0 0 20px #ff4757";
                    // Mantém a tremida que já foi ativada, ou poderia aumentar a velocidade via JS inline
                }

                if (elapsed < duration) {
                    requestAnimationFrame(update);
                } else {
                    // Limpa a tremida ao final do tempo
                    barEl.classList.remove('suspense-timer-shake');
                    
                    const correctEl = document.getElementById(`opt-${correctIndex}`);
                    if(correctEl) correctEl.classList.add('highlight-correct');
                    setTimeout(() => { currentQ++; startSequence(); }, 1500);
                }
            }
            update();
        }

        function spawnParticle(parent, color) {
            if (!parent) return;
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.backgroundColor = color;
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.setProperty('--mx', (Math.random() - 0.5) * 150 + 'px');
            p.style.setProperty('--my', (Math.random() - 0.5) * 150 + 'px');
            parent.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }

        startSequence();
    </script>
</body>
</html>
