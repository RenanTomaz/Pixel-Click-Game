<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <title>Pixel Click - TikTok 9x16</title>
    <style>
        :root {
            --bg: #000000;
            --color-1: rgba(255, 71, 87, 0.9);
            --color-2: rgba(46, 134, 222, 0.9);
            --color-3: rgba(46, 213, 115, 0.9);
            --color-4: rgba(236, 204, 104, 0.9);
        }

        body {
            background: url('1000383281.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Archivo Black', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Impede qualquer rolagem no celular */
        }

        #video-canvas {
            /* Força a proporção 9:16 baseada na altura da tela */
            width: calc(100vh * 9 / 16);
            height: 100vh;
            max-width: 100vw; /* Garante que não estoure em telas muito estreitas */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Distribui topo, meio e fim */
            padding: 60px 30px; /* Respiro para não bater na interface do TikTok */
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }
        
        .question-text {
            font-size: 1.8rem;
            line-height: 1.1;
            width: 100%;
            height: 25%; /* Área fixa para a pergunta */
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        #timer-container {
            width: 100%;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff80;
            box-shadow: 0 0 15px #00ff80;
        }

        .options-list {
            width: 100%;
            display: grid;
            gap: 15px;
            flex-grow: 1; /* Ocupa o espaço central */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .option {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 3px solid #333;
            padding: 25px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            color: white;
            text-transform: uppercase;
            position: relative;
            transition: transform 0.2s;
        }

        /* Cores e Partículas (Glow) */
        .option:nth-child(1) { border-color: var(--color-1); box-shadow: 0 0 20px var(--color-1); }
        .option:nth-child(2) { border-color: var(--color-2); box-shadow: 0 0 20px var(--color-2); }
        .option:nth-child(3) { border-color: var(--color-3); box-shadow: 0 0 20px var(--color-3); }
        .option:nth-child(4) { border-color: var(--color-4); box-shadow: 0 0 20px var(--color-4); }

        .highlight-correct {
            background: white !important;
            color: black !important;
            box-shadow: 0 0 50px white !important;
            transform: scale(1.05);
        }

        .footer-brand {
            margin-bottom: 20px;
            font-size: 1.6rem;
            background: linear-gradient(180deg, #3498db, #2980b9);
            color: white;
            padding: 12px 45px;
            border-radius: 40px;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.6);
        }
    </style>
</head>
<body>
    <div id="video-canvas">
        <div class="question-text" id="q-text">CARREGANDO...</div>
        
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <div class="options-list" id="options-box"></div>

        <div class="footer-brand">PIXELCLICK.FUN</div>
    </div>

    <script>
        // Use a lógica de sorteio de questões que já definimos anteriormente
        // ... (geografiaData, startSequence, etc)
    </script>
</body>
</html>
