<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <title>Pixel Click - TikTok Premium</title>
    <style>
        :root {
            --color-1: #ff4757;
            --color-2: #2e86de;
            --color-3: #2ed573;
            --color-4: #eccc68;
            --color-accent: #2e86de;
        }

        body {
            background-image: url('background.png');
            background-size: auto; 
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000;
            
            color: white;
            /* Fonte Sans Serif para todo o projeto */
            font-family: 'Archivo Black', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #video-canvas {
            width: 100vw;
            max-width: 450px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            padding: 20px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        /* TÍTULO ESTILIZADO SANS SERIF */
        .fixed-title {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 100px; 
            margin-bottom: 60px;
            
            /* Efeito Gradiente Metálico */
            background: linear-gradient(to bottom, #ffffff 0%, #bbbbbb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Brilho Neon Branco */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
            position: relative;
            z-index: 5;
        }

        .question-text {
            font-size: 1.7rem;
            margin-bottom: 10px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            /* Sombra para legibilidade extrema */
            text-shadow: 2px 2px 0px #000, 0 0 20px rgba(0,0,0,0.9);
            z-index: 2;
        }

        #timer-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 2;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: #2ed573;
            box-shadow: 0 0 15px #2ed573;
        }

        .options-list {
            width: 100%;
            display: grid;
            gap: 15px;
            z-index: 2;
        }

        .option {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 22px;
            border-radius: 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            position: relative;
            transition: all 0.3s;
        }

        /* Brilhos Constantes por cor */
        .opt-0 { border-color: var(--color-1); box-shadow: 0 0 15px rgba(255, 71, 87, 0.5); }
        .opt-1 { border-color: var(--color-2); box-shadow: 0 0 15px rgba(46, 134, 222, 0.5); }
        .opt-2 { border-color: var(--color-3); box-shadow: 0 0 15px rgba(46, 213, 115, 0.5); }
        .opt-3 { border-color: var(--color-4); box-shadow: 0 0 15px rgba(236, 204, 104, 0.5); }

        .highlight-correct {
            border-color: #fff !important;
            background: #fff !important;
            color: #000 !important;
            box-shadow: 0 0 40px #fff !important;
            transform: scale(1.05);
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1; 
            animation: move-particle 2s linear forwards;
        }

        @keyframes move-particle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        .footer-brand {
            margin-top: 40px; 
            background: var(--color-accent);
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(46, 134, 222, 0.7);
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="video-canvas">
        <div class="fixed-title" id="main-title">TESTE SEU CONHECIMENTO</div>
        
        <div style="width: 100%;">
            <div class="question-text" id="q-text"></div>
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div class="options-list" id="options-box"></div>
        </div>

        <div class="footer-brand" id="footer-btn">WWW.PIXELCLICK.FUN</div>
    </div>

    <script src="geografia.js"></script>

    <script>
        const masterPool = [...(typeof geografiaData !== 'undefined' ? geografiaData : [])];
        const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, 8);
        let currentQ = 0;
        let particleIntervals = [];

        function startSequence() {
            particleIntervals.forEach(clearInterval);
            particleIntervals = [];

            if (currentQ >= 8) {
                document.getElementById('video-canvas').innerHTML = `
                    <div class="fixed-title" style="margin-top: 150px">TESTE FINALIZADO</div>
                    <h1 style="font-size: 2rem">QUANTAS VOCÊ ACERTOU?</h1>
                    <div class="footer-brand" style="margin-top: 40px">WWW.PIXELCLICK.FUN</div>
                `;
                return;
            }

            const data = selectedQuestions[currentQ];
            document.getElementById('q-text').innerText = data.q;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            const colors = ['#ff4757', '#2e86de', '#2ed573', '#eccc68'];

            // Loop Partículas Título
            const title = document.getElementById('main-title');
            particleIntervals.push(setInterval(() => spawnParticle(title, '#ffffff'), 300));

            // Opções
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = `option opt-${i}`;
                div.id = `opt-${i}`;
                div.innerText = opt;
                box.appendChild(div);
                particleIntervals.push(setInterval(() => spawnParticle(div, colors[i]), 180));
            });

            // Loop Partículas Footer
            const footer = document.getElementById('footer-btn');
            particleIntervals.push(setInterval(() => spawnParticle(footer, '#2e86de'), 250));

            runTimer(data.correct);
        }

        function spawnParticle(parent, color) {
            if (!parent) return;
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.backgroundColor = color;
            p.style.boxShadow = `0 0 6px ${color}`;

            const edge = Math.floor(Math.random() * 4);
            let x = 0, y = 0;
            if(edge === 0) { x = Math.random() * 100; y = 0; }        
            else if(edge === 1) { x = 100; y = Math.random() * 100; } 
            else if(edge === 2) { x = Math.random() * 100; y = 100; } 
            else { x = 0; y = Math.random() * 100; }                  

            p.style.left = x + '%';
            p.style.top = y + '%';

            const mx = (Math.random() - 0.5) * 150 + 'px';
            const my = (Math.random() - 0.5) * 150 + 'px';
            p.style.setProperty('--mx', mx);
            p.style.setProperty('--my', my);

            parent.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }

        function runTimer(correctIndex) {
            const barEl = document.getElementById('timer-bar');
            const startTime = Date.now();
            const duration = 8000;

            function update() {
                const elapsed = Date.now() - startTime;
                const percent = Math.max(0, 100 - (elapsed / duration * 100));
                barEl.style.width = percent + "%";
                if (elapsed < duration) requestAnimationFrame(update);
                else {
                    const correctEl = document.getElementById(`opt-${correctIndex}`);
                    if(correctEl) correctEl.classList.add('highlight-correct');
                    setTimeout(() => { currentQ++; startSequence(); }, 1500);
                }
            }
            update();
        }

        startSequence();
    </script>
</body>
</html>
