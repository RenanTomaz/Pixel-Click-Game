<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <title>Pixel Click - TikTok Mode</title>
    <style>
        :root {
            --bg: #000000;
            --color-1: rgba(255, 71, 87, 0.9);
            --color-2: rgba(46, 134, 222, 0.9);
            --color-3: rgba(46, 213, 115, 0.9);
            --color-4: rgba(236, 204, 104, 0.9);
            --correct: #00ff80;
        }

        body {
            background: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* O segredo: Este container é a moldura da imagem */
        #video-canvas {
            position: relative;
            width: calc(100vh * 9 / 16);
            height: 100vh;
            max-width: 100vw;
            background: url('1000383281.png') no-repeat center center;
            background-size: contain; /* Garante que a moldura apareça inteira */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            /* Padding interno para o conteúdo não bater na moldura cinza da imagem */
            padding: 12% 10%; 
        }
        
        .question-text {
            font-size: 1.5rem;
            line-height: 1.2;
            width: 100%;
            height: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            text-align: center;
            font-family: 'Archivo Black', sans-serif;
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            margin-top: 10%;
        }

        #timer-container {
            width: 100%;
            height: 14px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--correct);
            box-shadow: 0 0 15px var(--correct);
        }

        .options-list {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .option {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 3px solid #333;
            padding: 20px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            color: white;
            text-transform: uppercase;
            text-align: center;
            font-family: 'Archivo Black', sans-serif;
            transition: all 0.3s ease;
        }

        /* Glows específicos baseados na sua imagem 1000383231.png */
        .option:nth-child(1) { border-color: var(--color-1); box-shadow: 0 0 15px var(--color-1); }
        .option:nth-child(2) { border-color: var(--color-2); box-shadow: 0 0 15px var(--color-2); }
        .option:nth-child(3) { border-color: var(--color-3); box-shadow: 0 0 15px var(--color-3); }
        .option:nth-child(4) { border-color: var(--color-4); box-shadow: 0 0 15px var(--color-4); }

        .highlight-correct {
            background: var(--correct) !important;
            color: black !important;
            border-color: white !important;
            box-shadow: 0 0 40px var(--correct) !important;
            transform: scale(1.05);
        }

        .footer-brand {
            width: 90%;
            font-size: 1.3rem;
            background: linear-gradient(180deg, #3498db, #2980b9);
            color: white;
            padding: 12px 0;
            border-radius: 40px;
            font-family: 'Archivo Black', sans-serif;
            text-align: center;
            font-weight: 900;
            margin-bottom: 5%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="video-canvas">
        <div class="question-text" id="q-text">CARREGANDO...</div>
        
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <div class="options-list" id="options-box"></div>

        <div class="footer-brand">WWW.PIXELCLICK.FUN</div>
    </div>

    <script>
        // Insira aqui sua lógica JavaScript masterPool e runTimer enviada anteriormente
    </script>
</body>
</html>
