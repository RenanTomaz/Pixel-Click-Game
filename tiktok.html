<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <title>Pixel Click - TikTok Creator Mode</title>
    <style>
        :root {
            --bg: #000000;
            /* Cores com transparência conforme a imagem */
            --color-1: rgba(255, 71, 87, 0.8);
            --color-2: rgba(46, 134, 222, 0.8);
            --color-3: rgba(46, 213, 115, 0.8);
            --color-4: rgba(236, 204, 104, 0.8);
            --accent-blue: #2e86de;
        }

        body {
            /* Usando sua imagem de fundo carregada */
            background: url('1000383281.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Archivo Black', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #video-canvas {
            width: 100vw;
            max-width: 450px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            position: relative;
            background: rgba(0, 0, 0, 0.2); /* Leve transparência no container */
        }
        
        .question-text {
            font-size: 1.6rem;
            line-height: 1.2;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            /* Efeito de brilho no texto */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        #timer-container {
            width: 90%;
            height: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.2);
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff80;
            box-shadow: 0 0 20px #00ff80;
            transition: background-color 0.3s ease;
        }

        .options-list {
            width: 100%;
            display: grid;
            gap: 15px;
        }

        .option {
            background: rgba(26, 26, 26, 0.4); /* Transparência no botão */
            backdrop-filter: blur(5px); /* Efeito de vidro */
            border: 3px solid #333;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            color: white;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
        }

        /* Partículas simuladas com box-shadow e glow */
        .option:nth-child(1) { 
            border-color: var(--color-1); 
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5), inset 0 0 10px rgba(255, 71, 87, 0.3); 
        }
        .option:nth-child(2) { 
            border-color: var(--color-2); 
            box-shadow: 0 0 20px rgba(46, 134, 222, 0.5), inset 0 0 10px rgba(46, 134, 222, 0.3); 
        }
        .option:nth-child(3) { 
            border-color: var(--color-3); 
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.5), inset 0 0 10px rgba(46, 213, 115, 0.3); 
        }
        .option:nth-child(4) { 
            border-color: var(--color-4); 
            box-shadow: 0 0 20px rgba(236, 204, 104, 0.5), inset 0 0 10px rgba(236, 204, 104, 0.3); 
        }

        .highlight-correct {
            background: #ffffff !important;
            color: #000 !important;
            border-color: #ffffff !important;
            box-shadow: 0 0 50px #ffffff !important;
            transform: scale(1.05);
        }

        .footer-brand {
            margin-top: 40px;
            font-size: 1.4rem;
            background: linear-gradient(180deg, #3498db, #2980b9);
            color: white;
            padding: 8px 40px;
            border-radius: 30px;
            font-weight: 900;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px rgba(52, 152, 219, 0.5);
        }
    </style>
</head>
<body>
    <div id="video-canvas">
        <div class="question-text" id="q-text"></div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div class="options-list" id="options-box"></div>
        <div class="footer-brand">WWW.PIXELCLICK.FUN</div>
    </div>

    <script src="geografia.js"></script>
    <script src="ciencia.js"></script>
    <script src="historia.js"></script>
    <script src="natureza.js"></script>
    <script src="esportes.js"></script>
    <script src="entretenimento.js"></script>

    <script>
        // ... (Mantendo sua lógica do masterPool e startSequence enviada anteriormente) ...
        const masterPool = [
            ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
            ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
            ...(typeof historiaData !== 'undefined' ? historiaData : []),
            ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
            ...(typeof esportesData !== 'undefined' ? esportesData : []),
            ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
        ];

        const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, 8);
        let currentQ = 0;

        function startSequence() {
            if (currentQ >= 8) {
                document.getElementById('video-canvas').innerHTML = `
                    <p style="font-size: 1.8rem">QUANTAS VOCÊ ACERTOU?</p>
                    <div class="footer-brand">WWW.PIXELCLICK.FUN</div>
                `;
                return;
            }
            const data = selectedQuestions[currentQ];
            document.getElementById('q-text').innerText = data.q;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            data.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.id = `opt-${i}`;
                div.innerText = opt;
                box.appendChild(div);
            });
            runTimer(data.correct);
        }

        function runTimer(correctIndex) {
            const barEl = document.getElementById('timer-bar');
            barEl.style.width = "100%";
            const startTime = Date.now();
            const duration = 8000;

            function updateBar() {
                const elapsed = Date.now() - startTime;
                const percent = Math.max(0, 100 - (elapsed / duration * 100));
                barEl.style.width = percent + "%";
                if (percent > 60) barEl.style.backgroundColor = "#00ff80";
                else if (percent > 30) barEl.style.backgroundColor = "#ffcc00";
                else barEl.style.backgroundColor = "#ff4757";

                if (elapsed < duration) requestAnimationFrame(updateBar);
                else {
                    const correctEl = document.getElementById(`opt-${correctIndex}`);
                    if(correctEl) correctEl.classList.add('highlight-correct');
                    setTimeout(() => { currentQ++; startSequence(); }, 1200);
                }
            }
            requestAnimationFrame(updateBar);
        }
        startSequence();
    </script>
</body>
</html>
