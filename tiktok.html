<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <title>Pixel Click - TikTok Proportional</title>
    <style>
        :root {
            --color-1: #ff4757;
            --color-2: #2e86de;
            --color-3: #2ed573;
            --color-4: #eccc68;
            --color-accent: #2e86de;
            --color-title: #ffd700; 
            --correct-glow: #00ff00; 
        }

        /* Reset e Base */
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Russo One', sans-serif;
        }

        /* Container 9:16 que segue a proporção da imagem */
        #video-canvas {
            position: relative;
            width: 56vh; /* 9/16 de 100vh */
            height: 90vh;
            background-image: url('background.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            transition: padding-top 0.4s ease-in-out;
            
            /* Padding proporcional para manter conteúdo dentro da moldura escura */
            padding: 2vh 8vh 10vh 8vh; 
            text-align: center;
        }

        .fixed-title {
    font-size: 4.2vh; 
    text-transform: uppercase;
    letter-spacing: 0.2vh;
    color: var(--color-title);
    text-shadow: 0 0 1vh rgba(255, 215, 0, 0.6), 0.3vh 0.3vh 0.3vh rgba(0, 0, 0, 0.8);
    width: 100%;
    z-index: 5;

    /* AJUSTE AQUI: */
    margin-top: -3vh;    /* Valores negativos (ex: -2vh, -4vh) sobem o título */
    margin-bottom: 2vh;  /* Espaço entre o título e a pergunta abaixo dele */
    position: relative;  /* Garante que a margem negativa funcione corretamente */
}

        .question-text {
            font-size: 2.6vh;
            height: 14vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            text-shadow: 0.3vh 0.3vh 0px #000;
            margin-bottom: 1.5vh;
            color: white;
            line-height: 1.2;
            z-index: 2;
        }

        #timer-container {
    width: 100%;
    height: 1.6vh;
    background: rgba(255,255,255,0.1);
    border-radius: 1vh;
    overflow: hidden;
    border: 0.3vh solid rgba(255,255,255,0.2);
    z-index: 2;

    /* Novas propriedades para imutabilidade */
    flex-shrink: 0;        /* Impede que o container seja esmagado por textos longos */
    margin: 2vh 0 3vh 0;   /* Define margens fixas (Top, Right, Bottom, Left) */
    position: relative;    /* Garante o posicionamento estável */
}

#timer-bar {
    width: 100%;
    height: 100%;
    background: var(--color-3);
    box-shadow: 0 0 2vh var(--color-3);
    transform-origin: center left; 
    transition: background-color 0.3s;
    
    /* Garante que a animação interna não afete o layout externo */
    display: block; 
}

        .options-list {
            width: 100%;
            display: grid;
            gap: 1.4vh;
            flex-grow: 1;
            align-content: center;
            z-index: 2;
        }

        .option {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(1vh);
            -webkit-backdrop-filter: blur(1vh);
            border: 0.3vh solid rgba(255, 255, 255, 0.2);
            padding: 2vh;
            border-radius: 1.5vh;
            font-size: 2vh;
            text-transform: uppercase;
            color: white;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .opt-0 { border-color: var(--color-1); box-shadow: 0 0 1vh rgba(255, 71, 87, 0.3); }
        .opt-1 { border-color: var(--color-2); box-shadow: 0 0 1vh rgba(46, 134, 222, 0.3); }
        .opt-2 { border-color: var(--color-3); box-shadow: 0 0 1vh rgba(46, 213, 115, 0.3); }
        .opt-3 { border-color: var(--color-4); box-shadow: 0 0 1vh rgba(236, 204, 104, 0.3); }

        .highlight-correct {
            border-color: var(--correct-glow) !important;
            background: var(--correct-glow) !important;
            color: black !important;
            box-shadow: 0 0 4vh var(--correct-glow) !important;
            transform: scale(1.05);
            z-index: 10;
        }

        .footer-brand {
            width: 100%;
            background: var(--color-accent);
            padding: 1.4vh 0;
            border-radius: 5vh;
            font-size: 2.4vh;
            font-weight: bold;
            color: white;
            border: 0.3vh solid rgba(255, 255, 255, 0.3);
            margin-top: 3vh;
            z-index: 2;
        }

        /* Partículas Proporcionais */
        .particle { 
            position: absolute; 
            width: 0.5vh; 
            height: 0.5vh; 
            border-radius: 50%; 
            pointer-events: none; 
            z-index: -1; 
            animation: move-particle 2s linear forwards; 
        }
        @keyframes move-particle { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; } 
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div id="video-canvas">
        <div class="fixed-title" id="main-title">TESTE SEU CONHECIMENTO</div>
        
        <div class="question-text" id="q-text"></div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <div class="options-list" id="options-box"></div>

        <div class="footer-brand" id="footer-btn">WWW.PIXELCLICK.FUN</div>
    </div>

    <script src="geografia.js"></script>
    

    <script>
    const masterPool = [...(typeof geografiaData !== 'undefined' ? geografiaData : [])];
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, 8);
    let currentQ = 0;
    let particleIntervals = [];

    const sfx = {
        timer: new Howl({ src: ['timer_tic_tac.mp3'], loop: true, volume: 0.5 }),
        correct: new Howl({ src: ['success.mp3'], volume: 0.8 }),
        transition: new Howl({ src: ['swoosh.mp3'], volume: 0.4 })
    };

    function startSequence() {
        particleIntervals.forEach(clearInterval);
        particleIntervals = [];

        // --- TELA FINAL ---
        if (currentQ >= 8) {
            sfx.timer.stop();
            sfx.transition.play();

            document.getElementById('video-canvas').innerHTML = `
                <div style="display: flex; flex-direction: column; justify-content: center; height: 100%; align-items: center;">
                    <div class="fixed-title">FIM DO TESTE</div>
                    <h1 style="color:white; font-size: 3vh; margin-bottom: 4vh;">QUAL FOI O SEU RESULTADO?</h1>
                    <div class="footer-brand">WWW.PIXELCLICK.FUN</div>
                </div>
            `;

            // Narração do Encerramento
            setTimeout(() => {
                window.speechSynthesis.cancel();
                const msgFinal = new SpeechSynthesisUtterance("Fim do teste! Qual foi o seu resultado?");
                msgFinal.lang = 'pt-BR';
                msgFinal.rate = 1.1;
                window.speechSynthesis.speak(msgFinal);
            }, 500);
            
            return;
        }

        // --- INÍCIO DE NOVA PERGUNTA ---
        sfx.transition.play();
        sfx.timer.play();

        const data = selectedQuestions[currentQ];
        const correctText = data.options[data.correct];
        
        let shuffledOptions = data.options
            .map((text) => ({ text }))
            .sort(() => Math.random() - 0.5);
        const newCorrectIndex = shuffledOptions.findIndex(opt => opt.text === correctText);

        const qTextElement = document.getElementById('q-text');
        qTextElement.innerText = data.q;

        // Narração da Pergunta
        window.speechSynthesis.cancel(); 
        const msgQ = new SpeechSynthesisUtterance(data.q);
        msgQ.lang = 'pt-BR';
        msgQ.rate = 1.1;
        window.speechSynthesis.speak(msgQ);

        const canvas = document.getElementById('video-canvas');
        setTimeout(() => {
            if (qTextElement.offsetHeight > window.innerHeight * 0.15) {
                canvas.style.paddingTop = "8vh";
            } else {
                canvas.style.paddingTop = "18vh";
            }
        }, 10);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        const colors = ['#ff4757', '#2e86de', '#2ed573', '#eccc68'];

        particleIntervals.push(setInterval(() => spawnParticle(document.getElementById('main-title'), '#ffffff'), 400));

        shuffledOptions.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = `option opt-${i}`;
            div.id = `opt-${i}`;
            div.innerText = opt.text;
            box.appendChild(div);
            particleIntervals.push(setInterval(() => spawnParticle(div, colors[i]), 250));
        });

        runTimer(newCorrectIndex, correctText);
    }

    function runTimer(correctIndex, correctText) {
        const barEl = document.getElementById('timer-bar');
        const startTime = Date.now();
        const duration = 8000;

        function update() {
            const elapsed = Date.now() - startTime;
            const percent = Math.max(0, 100 - (elapsed / duration * 100));
            barEl.style.width = percent + "%";

            if (percent > 60) barEl.style.backgroundColor = "#2ed573";
            else if (percent > 30) barEl.style.backgroundColor = "#eccc68";
            else barEl.style.backgroundColor = "#ff4757";

            if (elapsed < duration) {
                requestAnimationFrame(update);
            } else {
                sfx.timer.stop(); 
                sfx.correct.play(); 
                
                const correctEl = document.getElementById(`opt-${correctIndex}`);
                if(correctEl) {
                    correctEl.classList.add('highlight-correct');
                    
                    // Narração da Resposta Correta
                    const msgA = new SpeechSynthesisUtterance("" + correctText);
                    msgA.lang = 'pt-BR';
                    msgA.rate = 1.2;
                    window.speechSynthesis.speak(msgA);
                }
                
                // 2.5 segundos para dar tempo de ouvir a resposta antes de trocar
                setTimeout(() => { currentQ++; startSequence(); }, 2500);
            }
        }
        update();
    }

    function spawnParticle(parent, color) {
        if (!parent) return;
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.backgroundColor = color;
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        const range = window.innerHeight * 0.08;
        p.style.setProperty('--mx', (Math.random() - 0.5) * range + 'px');
        p.style.setProperty('--my', (Math.random() - 0.5) * range + 'px');
        parent.appendChild(p);
        setTimeout(() => p.remove(), 2000);
    }

    startSequence();
</script>
</body>
</html>
