<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopaNews - Gerador de Conteúdo</title>
    <style>
        /* Configurações Gerais e Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', 'Impact', sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Painel de Configuração Inicial */
        .setup-container {
            background: #161616;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 450px;
            border: 1px solid #262626;
            font-family: 'Segoe UI', sans-serif;
        }

        .setup-container h2 {
            margin-bottom: 25px;
            text-align: center;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #bbb;
        }

        .form-group input[type="text"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            outline: none;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-group input[type="text"]:focus {
            border-color: #ffd700;
        }

        .btn-gerar {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-gerar:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* Tela de Exibição (Preview do Vídeo) */
        .preview-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Container Proporção 9:16 Vertical */
        .video-player-9-16 {
            width: calc(100vh * (9 / 16));
            height: 100vh;
            max-width: 100vw;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* Recorte do vídeo focado no centro */
        .video-player-9-16 video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Moldura Dourada Estilizada */
        .golden-interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            border: 10px solid transparent;
            border-image: linear-gradient(135deg, #b8860b 0%, #ffd700 25%, #fff8dc 50%, #ffd700 75%, #b8860b 100%) 10;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 25px;
        }

        /* Botão Logo do Neymar (Substituindo o Sair) */
        .neylogo-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 65px;
            height: 65px;
            z-index: 10;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s, filter 0.2s;
            background: #000;
        }

        /* Força a imagem a preencher o círculo cortando as rebarbas de fora */
        .neylogo-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.02); /* Ajuste fino para focar no círculo interno */
        }

        .neylogo-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        /* Estilização Avançada dos Textos (Estilo Reels/TikTok de Notícias) */
        .hud-top {
            width: 100%;
            text-align: center;
            margin-top: 40px;
        }

        /* Título de Destaque no Topo */
        .hud-top h1 {
            color: #ffffff;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
            background: linear-gradient(180deg, #fff 60%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, 0.9));
        }

        .hud-bottom {
            width: 100%;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Subtítulo Dinâmico na Base */
        .hud-bottom p {
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            display: inline-block;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 6px;
            border-left: 4px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            max-width: 90%;
        }
    </style>
</head>
<body>

    <div class="setup-container" id="setupPanel">
        <h2>CopaNews Creator v2</h2>
        
        <div class="form-group">
            <label for="videoInput">Selecione o Vídeo da Cobertura:</label>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div class="form-group">
            <label for="titleInput">Manchete Principal (Topo):</label>
            <input type="text" id="titleInput" placeholder="Ex: URUGUAI ELIMINADO DA COPA!">
        </div>

        <div class="form-group">
            <label for="subtitleInput">Subtítulo Informativo (Baixo):</label>
            <input type="text" id="subtitleInput" placeholder="Ex: Veja os melhores momentos e a reação da torcida">
        </div>

        <button class="btn-gerar" onclick="gerarVideo()">⚡ Gerar Formato TikTok</button>
    </div>

    <div class="preview-screen" id="previewScreen">
        
        <div class="neylogo-btn" onclick="fecharPreview()" title="Clique para voltar">
            <img src="neylogo.png" alt="Voltar">
        </div>
        
        <div class="video-player-9-16">
            <video id="mainVideo" controls loop></video>

            <div class="golden-interface">
                <div class="hud-top">
                    <h1 id="displayTitle">TÍTULO DA NOTÍCIA</h1>
                </div>
                
                <div class="hud-bottom">
                    <p id="displaySubtitle">Subtítulo descritivo do vídeo</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function gerarVideo() {
            const videoInput = document.getElementById('videoInput');
            const titleInput = document.getElementById('titleInput').value;
            const subtitleInput = document.getElementById('subtitleInput').value;
            
            const mainVideo = document.getElementById('mainVideo');
            const displayTitle = document.getElementById('displayTitle');
            const displaySubtitle = document.getElementById('displaySubtitle');

            if (!videoInput.files[0]) {
                alert("Por favor, selecione um arquivo de vídeo.");
                return;
            }

            const file = videoInput.files[0];
            const fileURL = URL.createObjectURL(file);
            mainVideo.src = fileURL;

            // Injeta os textos customizados
            displayTitle.innerText = titleInput ? titleInput : "EXCLUSIVO COPANEWS";
            displaySubtitle.innerText = subtitleInput ? subtitleInput : "Acompanhe a cobertura em tempo real.";

            // Ativa o modo de visualização
            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('previewScreen').style.display = 'flex';
            
            // Ativa tela cheia nativa do navegador
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }

            mainVideo.play();
        }

        function fecharPreview() {
            const mainVideo = document.getElementById('mainVideo');
            mainVideo.pause();

            if (document.exitFullscreen && document.fullscreenElement) {
                document.exitFullscreen();
            }

            document.getElementById('previewScreen').style.display = 'none';
            document.getElementById('setupPanel').style.display = 'block';
        }
    </script>
</body>
</html>
