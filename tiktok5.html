<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopaNews - Gerador de Conteúdo</title>
    <style>
        /* Configurações Gerais e Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Painel de Input (Configuração) */
        .setup-container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }

        .setup-container h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }

        .form-group input[type="text"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input[type="text"]:focus {
            border-color: #ffd700;
        }

        .btn-gerar {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-gerar:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        /* Tela de Exibição (Preview do Vídeo) */
        .preview-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050505;
            display: none; /* Escondido por padrão */
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Container do Feed 9:16 vertical */
        .video-player-9-16 {
            width: calc(100vh * (9 / 16));
            height: 100vh;
            max-width: 100vw;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* O Vídeo clipado e focado no centro */
        .video-player-9-16 video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Corta as laterais e foca no meio */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Overlay de Interface Metálica Dourada */
        .golden-interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Permite interagir com o vídeo por trás */
            border: 12px solid transparent;
            /* Efeito de borda gradiente metálica imitando ouro */
            border-image: linear-gradient(135deg, #b8860b 0%, #ffd700 25%, #fff8dc 50%, #ffd700 75%, #b8860b 100%) 12;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        /* Elementos de Texto na Tela */
        .hud-text {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }

        .hud-top {
            align-self: center;
            text-align: center;
            width: 90%;
            transform: translateY(10px);
        }

        .hud-top h1 {
            color: #ffd700;
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .hud-top p {
            color: #ffffff;
            font-size: 14px;
            font-weight: 300;
        }

        /* Botão Sair da Tela Cheia */
        .btn-back {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 3;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-back:hover {
            background: #ffd700;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="setup-container" id="setupPanel">
        <h2>CopaNews Creator</h2>
        
        <div class="form-group">
            <label for="videoInput">Selecione o Vídeo (MP4/WebM):</label>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div class="form-group">
            <label for="titleInput">Título Principal:</label>
            <input type="text" id="titleInput" placeholder="Ex: BRASIL RUMO AO HEXA!">
        </div>

        <div class="form-group">
            <label for="subtitleInput">Subtítulo:</label>
            <input type="text" id="subtitleInput" placeholder="Ex: Bastidores e escalação da partida de hoje">
        </div>

        <button class="btn-gerar" onclick="gerarVideo()">⚡ Gerar Tela Cheia</button>
    </div>

    <div class="preview-screen" id="previewScreen">
        <button class="btn-back" onclick="fecharPreview()">✕ Sair</button>
        
        <div class="video-player-9-16">
            <video id="mainVideo" controls loop></video>

            <div class="golden-interface">
                <div class="hud-text hud-top">
                    <h1 id="displayTitle">TÍTULO DA NOTÍCIA</h1>
                    <p id="displaySubtitle">Subtítulo descritivo do vídeo</p>
                </div>
                <div></div> </div>
        </div>
    </div>

    <script>
        function gerarVideo() {
            const videoInput = document.getElementById('videoInput');
            const titleInput = document.getElementById('titleInput').value;
            const subtitleInput = document.getElementById('subtitleInput').value;
            
            const mainVideo = document.getElementById('mainVideo');
            const displayTitle = document.getElementById('displayTitle');
            const displaySubtitle = document.getElementById('displaySubtitle');

            // Validação simples
            if (!videoInput.files[0]) {
                alert("Por favor, selecione um arquivo de vídeo primeiro.");
                return;
            }

            // Injeta o arquivo de vídeo local no player do site
            const file = videoInput.files[0];
            const fileURL = URL.createObjectURL(file);
            mainVideo.src = fileURL;

            // Altera os textos da HUD dourada
            displayTitle.innerText = titleInput ? titleInput : "COPANEWS 2026";
            displaySubtitle.innerText = subtitleInput ? subtitleInput : "Atualização ao vivo";

            // Transiciona a tela e inicia a reprodução
            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('previewScreen').style.display = 'flex';
            
            // Tenta colocar em modo Tela Cheia do navegador (Opcional, ótima experiência)
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }

            mainVideo.play();
        }

        function fecharPreview() {
            const mainVideo = document.getElementById('mainVideo');
            mainVideo.pause();

            // Desfaz a tela cheia do navegador
            if (document.exitFullscreen && document.fullscreenElement) {
                document.exitFullscreen();
            }

            // Retorna ao painel inicial
            document.getElementById('previewScreen').style.display = 'none';
            document.getElementById('setupPanel').style.display = 'block';
        }
    </script>
</body>
</html>
