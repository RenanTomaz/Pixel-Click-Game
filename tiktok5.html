<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopaNews - Gerador de Conteúdo Profissional</title>
    <style>
        /* Configurações Gerais de Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
            overflow: hidden;
        }

        /* PAINEL DE CONFIGURAÇÃO (TELA INICIAL) */
        .setup-container {
            background: #161616;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 460px;
            border: 1px solid #262626;
            z-index: 10;
        }

        .setup-container h2 {
            margin-bottom: 25px;
            text-align: center;
            color: #ffd700;
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #aaa;
            font-weight: 600;
            text-transform: uppercase;
        }

        .form-group input[type="text"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-group input[type="text"]:focus {
            border-color: #ffd700;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
        }

        .btn-gerar {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-gerar:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* TELA DE PREVIEW (MOCKUP TIKTOK) */
        .preview-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* Canvas estrito em 9:16 - Idêntico ao Render de Smartphone */
        .video-player-9-16 {
            width: calc(100vh * (9 / 16));
            height: 100vh;
            max-width: 100vw;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        /* Ajuste do Vídeo em Corte Central */
        .video-player-9-16 video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* MOLDURA DOURADA COPA NEWS */
        .golden-interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            /* Borda metálica baseada no anel da foto */
            border: 8px solid transparent;
            border-image: linear-gradient(135deg, #b8860b 0%, #ffd700 25%, #fff8dc 50%, #ffd700 75%, #b8860b 100%) 8;
            box-shadow: inset 0 0 35px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 0px 20px;
        }

        /* BOTÃO NEYLOGO (MÁSCARA CIRCULAR PERFEITA) */
        .neylogo-btn {
            position: absolute;
            top: 120px; /* Alinhado abaixo do menu superior padrão do TikTok */
            right: 25px;
            width: 70px;
            height: 70px;
            z-index: 10;
            cursor: pointer;
            pointer-events: auto;
            border-radius: 50%;
            overflow: hidden;
            border: 2.5px solid #ffd700;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            transition: transform 0.2s;
            background-color: #000;
        }

        /* Recorte para pegar apenas o círculo dourado interno da imagem */
        .neylogo-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.02); /* Elimina qualquer borda quadrada residual */
        }

        .neylogo-btn:hover {
            transform: scale(1.08);
        }

        /* PADRÃO DE TEXTO GRANDES CANAIS (MANCHETE NO TOPO) */
        .hud-top {
            width: 90%;
            text-align: center;
            margin-top: 115px; /* Recuo exato para fugir do "Seguindo / Para Você" */
        }

        .hud-top h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: #ffffff;
            font-size: 32px;
            text-transform: uppercase;
            line-height: 1.1;
            letter-spacing: 0.5px;
            /* Sombra projetada pesada para dar leitura sobre qualquer fundo de vídeo */
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 1)) drop-shadow(0px 0px 15px rgba(0,0,0,0.6));
        }

        /* PADRÃO DE TEXTO (LEGENDA DINÂMICA NA BASE) */
        .hud-bottom {
            width: 100%;
            text-align: center;
            margin-bottom: 240px; /* Recuo para ficar livre dos textos nativos do TikTok (@user e tags) */
            padding: 0 10px;
        }

        .hud-bottom p {
            font-family: 'Arial Black', sans-serif;
            color: #ffffff;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            display: inline-block;
            background: #ffd700;
            color: #000000; /* Texto preto no fundo amarelo gera alto contraste e retenção */
            padding: 10px 18px;
            border-radius: 4px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            max-width: 95%;
            line-height: 1.3;
            letter-spacing: -0.3px;
        }
    </style>
</head>
<body>

    <div class="setup-container" id="setupPanel">
        <h2>CopaNews Studio</h2>
        
        <div class="form-group">
            <label for="videoInput">Vídeo Bruto (16:9 ou 9:16):</label>
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div class="form-group">
            <label for="titleInput">Manchete de Impacto (Topo):</label>
            <input type="text" id="titleInput" placeholder="Ex: FALHA BISONHA ABRE O PLACAR!">
        </div>

        <div class="form-group">
            <label for="subtitleInput">Subtítulo Retenção (Base):</label>
            <input type="text" id="subtitleInput" placeholder="Ex: QUIÑONES DEIXA O MÉXICO NA FRENTE">
        </div>

        <button class="btn-gerar" onclick="gerarVideo()">⚡ Gerar Formato TikTok</button>
    </div>

    <div class="preview-screen" id="previewScreen">
        
        <div class="neylogo-btn" onclick="fecharPreview()" title="Clique na Logo para voltar">
            <img src="neylogo.png" alt="CopaNews Voltar">
        </div>
        
        <div class="video-player-9-16">
            <video id="mainVideo" controls loop></video>

            <div class="golden-interface">
                <div class="hud-top">
                    <h1 id="displayTitle">TÍTULO</h1>
                </div>
                
                <div class="hud-bottom">
                    <p id="displaySubtitle">SUBTÍTULO</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function gerarVideo() {
            const videoInput = document.getElementById('videoInput');
            const titleInput = document.getElementById('titleInput').value;
            const subtitleInput = document.getElementById('subtitleInput').value;
            
            const mainVideo = document.getElementById('mainVideo');
            const displayTitle = document.getElementById('displayTitle');
            const displaySubtitle = document.getElementById('displaySubtitle');

            if (!videoInput.files[0]) {
                alert("Por favor, faça o upload de um vídeo antes.");
                return;
            }

            // Transforma o arquivo de vídeo local em uma URL reproduzível pelo navegador
            const file = videoInput.files[0];
            const fileURL = URL.createObjectURL(file);
            mainVideo.src = fileURL;

            // Injeta as informações tratando textos vazios
            displayTitle.innerText = titleInput ? titleInput : "URGENTE DA COPA";
            displaySubtitle.innerText = subtitleInput ? subtitleInput : "SE LIGA NO LANCE!";

            // Alterna os painéis na tela
            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('previewScreen').style.display = 'flex';
            
            // Força a tela cheia nativa do dispositivo
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }

            mainVideo.play();
        }

        function fecharPreview() {
            const mainVideo = document.getElementById('mainVideo');
            mainVideo.pause();

            if (document.exitFullscreen && document.fullscreenElement) {
                document.exitFullscreen();
            }

            document.getElementById('previewScreen').style.display = 'none';
            document.getElementById('setupPanel').style.display = 'block';
        }
    </script>
</body>
</html>
