<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Click</title>
    <meta property="og:title" content="Pixel Click">
    <meta property="og:description" content="Escolha seu desafio e bata recordes mundiais!">
    <meta property="og:image" content="https://www.pixelclick.fun/thumb.png">
    
    <style>
        :root { 
            --bg-color: #121212; 
            --card-inner: #161616;
            /* UNIFICADO: O verde foi substituído pelo azul em todo o Hub */
            --accent-trivia: #3498db; 
            
            /* Cores do Gradiente (25% cada) */
            --g-red: #ff4757;
            --g-blue: #2e86de;
            --g-yellow: #eccc68;
            --g-green: #2ed573;
        }

        body { 
            background-color: var(--bg-color); 
            color: white; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh; 
            overflow-y: auto;
            user-select: none;
        }

        #lang-selector { position: absolute; top: 15px; right: 15px; display: flex; gap: 12px; z-index: 200; }
        .lang-btn { width: 40px; height: 30px; cursor: pointer; filter: grayscale(0.8); transition: 0.3s; border: 2px solid transparent; }
        .lang-btn.active { filter: grayscale(0); transform: scale(1.2); border-color: white; }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .logo-container { width: 100%; display: flex; justify-content: center; margin-top: 60px; }
        .main-logo { max-width: 120px; height: auto; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); transition: 0.3s; }
        
        #ui-hub-subtitle { font-size: 1.1rem; color: #aaa; margin-top: 5px; margin-bottom: 10px; text-align: center; }

        .hub-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: stretch;
            justify-content: center;
            gap: 25px;
            width: 95%;
            max-width: 900px;
            margin: 10vh auto 0 auto; /* O terceiro valor (0) tira o espaço de baixo dos cards */
        }

        /* ESTILIZAÇÃO DA BORDA EM GRADIENTE */
        .game-card {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            position: relative;
            padding: 40px 30px;
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 1;
            border-radius: 30px;
            background: transparent; 
        }

        .game-card::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -2;
            border-radius: 20px;
            padding: 6px; 
            background: linear-gradient(to right, 
                var(--g-red) 0%, var(--g-red) 25%, 
                var(--g-blue) 25%, var(--g-blue) 50%, 
                var(--g-yellow) 50%, var(--g-yellow) 75%, 
                var(--g-green) 75%, var(--g-green) 100%);
            
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            
            transition: 0.3s;
        }

        .game-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--card-inner);
            z-index: -1;
            border-radius: 20px;
        }

        .game-card:hover { transform: translateY(-8px) scale(1.02); }
        .game-card:hover::before { filter: brightness(1.3); }

        .card-trivia { opacity: 0.7; cursor: not-allowed; }

        /* Estilo dos Subtítulos (UNIFICADO PARA AZUL) */
        .tag { 
            font-weight: 900; 
            margin-bottom: 20px; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            color: var(--accent-trivia); /* Cor unificada */
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        
        p { font-size: 0.9rem; color: #ccc; margin-bottom: 25px; line-height: 1.5; flex-grow: 1; }

        /* Botões UNIFICADOS */
        .play-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            border: 4px solid #000;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--accent-trivia); /* Cor unificada */
            color: #fff;
        }
        
        .play-btn:active { transform: translateY(3px); }

        .trivia-btn { background: #444; color: #888; border-color: #222; }

        #ad-hub {
            width: 300px;
            height: 250px;
            margin: 30px auto;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #444;
        }

        @media (max-width: 700px) {
            .hub-container { flex-direction: column; align-items: center; margin-top: 10vh; }
            #lang-selector { top: 5px; left: 50%; transform: translateX(-50%); }
        }
        /* Container do Banner abaixo dos cards */
.ad-banner-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0 auto; /* Zero no topo para colar nos cards */
    text-align: center;
}

.ad-box {
    background: #1a1a1a;
    padding: 10px;
    /* Borda removida conforme solicitado */
    border: none; 
    border-radius: 15px;
    display: inline-block;
    min-width: 300px;
    min-height: 250px;
}
    </style>
</head>
<body>
    <div id="lang-selector">
        <div class="lang-btn active" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w80/br.png" alt="Brasil"></div>
        <div class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w80/gb.png" alt="UK"></div>
        <div class="lang-btn" onclick="setLang('fr')" id="btn-fr"><img src="https://flagcdn.com/w80/fr.png" alt="França"></div>
        <div class="lang-btn" onclick="setLang('es')" id="btn-es"><img src="https://flagcdn.com/w80/es.png" alt="Espanha"></div>
    </div>

    <div class="hub-container">
        <div class="game-card card-pixel" onclick="location.href='pixel-stroop.html'">
            <div>
                <div id="ui-stroop-tag" class="tag">PIXEL STROOP</div>
                <p id="ui-pixel-desc">Treine seu raciocínio contra o caos das cores e números.</p>
            </div>
            <button class="play-btn" id="ui-pixel-btn">JOGAR</button>
        </div>

        <div class="game-card card-trivia">
            <div>
                <div id="ui-trivia-tag" class="tag">PIXEL TRIVIA</div>
                <p id="ui-trivia-desc">Escolha seu tema favorito e teste seus conhecimentos em tempo recorde.</p>
            </div>
            <button class="play-btn trivia-btn" id="ui-trivia-btn" disabled>EM BREVE</button>
        </div>
    </div>

    <script>
        const hubLangs = {
            pt: { 
                subtitle: "Escolha o seu desafio", 
                stroop: "PIXEL STROOP", 
                pixelDesc: "Desafio de números e cores contra o tempo.", 
                triviaTag: "PIXEL TRIVIA", 
                triviaDesc: "Escolha seu tema favorito e teste seus conhecimentos contra o tempo.", // Atualizado
                play: "JOGAR", 
                locked: "EM BREVE" 
            },
            en: { 
                subtitle: "Choose your challenge", 
                stroop: "PIXEL STROOP", 
                pixelDesc: "Numbers and colors challenge against the clock.", 
                triviaTag: "PIXEL TRIVIA", 
                triviaDesc: "Pick your favorite theme and test your knowledge against the clock.", // Atualizado
                play: "PLAY", 
                locked: "COMING SOON" 
            },
            fr: { 
                subtitle: "Choisissez votre défi", 
                stroop: "PIXEL STROOP", 
                pixelDesc: "Défi de chiffres et de couleurs contre a montre.", 
                triviaTag: "PIXEL TRIVIA", 
                triviaDesc: "Choisissez votre thème préféré et testez vos connaissances contre a montre.", // Atualizado
                play: "JOUER", 
                locked: "BIENTÔT" 
            },
            es: { 
                subtitle: "Elige tu desafío", 
                stroop: "PIXEL STROOP", 
                pixelDesc: "Desafío de números y colores contra el reloj.", 
                triviaTag: "PIXEL TRIVIA", 
                triviaDesc: "Elige tu tema favorito y pon a prueba tus conocimientos contra el reloj.", // Atualizado
                play: "JUGAR", 
                locked: "PRÓXIMAMENTE" 
            }
        };

        function setLang(l) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');
            const ui = hubLangs[l];
            
            if(document.getElementById('ui-hub-subtitle')) {
                document.getElementById('ui-hub-subtitle').textContent = ui.subtitle;
            }
            
            document.getElementById('ui-stroop-tag').textContent = ui.stroop;
            document.getElementById('ui-pixel-desc').textContent = ui.pixelDesc;
            document.getElementById('ui-pixel-btn').textContent = ui.play;
            
            document.getElementById('ui-trivia-tag').textContent = ui.triviaTag;
            document.getElementById('ui-trivia-desc').textContent = ui.triviaDesc;
            document.getElementById('ui-trivia-btn').textContent = ui.locked;
        }
        setLang('pt');
    </script>
</body>
</html>
