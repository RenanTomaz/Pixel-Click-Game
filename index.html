<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pixel Click | Jogos de Agilidade e Trivia</title>
    
    <meta name="description" content="Desafie seu cérebro no Pixel Click! Teste seus conhecimentos com jogos rápidos, gratuitos e competitivos.">
    
    <meta name="keywords" content="pixel click, pixel stroop, pixel trivia, jogos de agilidade mental, quiz, jogos de navegador grátis, desafio contra o relógio">

    <meta property="og:title" content="Pixel Click - Qual o seu recorde hoje?">
    <meta property="og:description" content="Teste os seus reflexos e o seu conhecimento com jogos viciantes!">
    <meta property="og:image" content="https://www.pixelclick.fun/thumb.png">
    
    <style>
        :root { 
            --bg-color: #121212; 
            --card-inner: #161616;
            /* UNIFICADO: O verde foi substituído pelo azul em todo o Hub */
            --accent-trivia: #3498db; 
            
            /* Cores do Gradiente (25% cada) */
            --g-red: #ff4757;
            --g-blue: #2e86de;
            --g-yellow: #eccc68;
            --g-green: #2ed573;
        }

        body { 
            background-color: var(--bg-color); 
            color: white; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh; 
            overflow-y: auto;
            user-select: none;
        }

        #lang-selector { position: absolute; top: 15px; right: 15px; display: flex; gap: 12px; z-index: 200; }
        .lang-btn { width: 40px; height: 30px; cursor: pointer; filter: grayscale(0.8); transition: 0.3s; border: 2px solid transparent; }
        .lang-btn.active { filter: grayscale(0); transform: scale(1.2); border-color: white; }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .logo-container { width: 100%; display: flex; justify-content: center; margin-top: 60px; }
        .main-logo { max-width: 120px; height: auto; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); transition: 0.3s; }
        
        #ui-hub-subtitle { font-size: 1.1rem; color: #aaa; margin-top: 5px; margin-bottom: 10px; text-align: center; }

        .hub-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: stretch;
            justify-content: center;
            gap: 25px;
            width: 95%;
            max-width: 900px;
            margin: 10vh auto 0 auto; /* O terceiro valor (0) tira o espaço de baixo dos cards */
        }

        /* ESTILIZAÇÃO DA BORDA EM GRADIENTE */
        .game-card {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            position: relative;
            padding: 40px 30px;
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 1;
            border-radius: 30px;
            background: transparent; 
        }

        .game-card:hover { transform: translateY(-8px) scale(1.02); }


        /* Estilo dos Subtítulos (UNIFICADO PARA AZUL) */
        .tag { 
            font-weight: 900; 
            margin-bottom: 20px; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            color: var(--accent-trivia); /* Cor unificada */
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        
        p { font-size: 0.9rem; color: #ccc; margin-bottom: 25px; line-height: 1.5; flex-grow: 1; }

        /* Botões UNIFICADOS */
        .play-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            border: 4px solid #000;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--accent-trivia); /* Cor unificada */
            color: #fff;
        }
        
        .play-btn:active { transform: translateY(3px); }

        #ad-hub {
            width: 300px;
            height: 250px;
            margin: 30px auto;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #444;
        }

        @media (max-width: 700px) {
            .hub-container { flex-direction: column; align-items: center; margin-top: 10vh; }
            #lang-selector { top: 5px; left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <div id="lang-selector">
        <div class="lang-btn active" onclick="setLang('pt')" id="btn-pt"><img src="https://flagcdn.com/w80/br.png" alt="Brasil"></div>
        <div class="lang-btn" onclick="setLang('en')" id="btn-en"><img src="https://flagcdn.com/w80/gb.png" alt="UK"></div>
        <div class="lang-btn" onclick="setLang('fr')" id="btn-fr"><img src="https://flagcdn.com/w80/fr.png" alt="França"></div>
        <div class="lang-btn" onclick="setLang('es')" id="btn-es"><img src="https://flagcdn.com/w80/es.png" alt="Espanha"></div>
    </div>

    <div class="hub-container">
    <div class="game-card card-pixel" onclick="location.href='pixel-stroop.html'">
        <div>
            <div id="ui-stroop-tag" class="tag">PIXEL STROOP</div>
            <p id="ui-pixel-desc">Treine seu raciocínio contra o caos das cores e números.</p>
        </div>
        <button class="play-btn" id="ui-pixel-btn">JOGAR</button>
    </div>

    <div class="game-card card-trivia" onclick="location.href='pixel-trivia.html'" style="cursor: pointer;">
    <div>
        <div id="ui-trivia-tag" class="tag">PIXEL TRIVIA</div>
        <p id="ui-trivia-desc">Escolha seu tema favorito e teste seus conhecimentos em tempo recorde.</p>
    </div>
    <button class="play-btn trivia-btn" id="ui-trivia-btn">JOGAR</button>
</div>
</div>

    <script>
        const hubLangs = {
    pt: { 
        subtitle: "Escolha seu desafio", 
        stroop: "PIXEL STROOP", 
        pixelDesc: "Desafio de números e cores contra o relógio.", 
        triviaTag: "PIXEL TRIVIA", 
        triviaDesc: "Escolha seu tema favorito e teste seus conhecimentos contra o relógio.",
        play: "JOGAR", 
        locked: "JOGAR" // MUDADO DE "EM BREVE" PARA "JOGAR"
    },
    en: { 
        subtitle: "Choose your challenge", 
        stroop: "PIXEL STROOP", 
        pixelDesc: "Color and number challenge against the clock.", 
        triviaTag: "PIXEL TRIVIA", 
        triviaDesc: "Pick your favorite topic and test your knowledge against the clock.",
        play: "PLAY", 
        locked: "PLAY" // MUDADO DE "COMING SOON" PARA "PLAY"
    },
    fr: { 
        subtitle: "Choisissez votre défi", 
        stroop: "PIXEL STROOP", 
        pixelDesc: "Défi de couleurs et de chiffres contre la montre.", 
        triviaTag: "PIXEL TRIVIA", 
        triviaDesc: "Choisissez votre sujet préféré et testez vos connaissances contre la montre.",
        play: "JOUER", 
        locked: "JOUER" // MUDADO DE "BIENTÔT" PARA "JOUER"
    },
    es: { 
        subtitle: "Elige tu desafío", 
        stroop: "PIXEL STROOP", 
        pixelDesc: "Desafío de números y colores contra el reloj.", 
        triviaTag: "PIXEL TRIVIA", 
        triviaDesc: "Elige tu tema favorito y pon a prueba tus conocimientos contra el reloj.",
        play: "JUGAR", 
        locked: "JUGAR" // MUDADO DE "PRÓXIMAMENTE" PARA "JUGAR"
    }
};

        function setLang(l) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');
            const ui = hubLangs[l];
            
            if(document.getElementById('ui-hub-subtitle')) {
                document.getElementById('ui-hub-subtitle').textContent = ui.subtitle;
            }
            
            document.getElementById('ui-stroop-tag').textContent = ui.stroop;
            document.getElementById('ui-pixel-desc').textContent = ui.pixelDesc;
            document.getElementById('ui-pixel-btn').textContent = ui.play;
            
            document.getElementById('ui-trivia-tag').textContent = ui.triviaTag;
            document.getElementById('ui-trivia-desc').textContent = ui.triviaDesc;
            document.getElementById('ui-trivia-btn').textContent = ui.locked;
        }
        setLang('pt');
    </script>
</body>
</html>
