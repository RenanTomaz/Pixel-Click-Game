<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marble Football Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container no formato estrito de 9:16 */
        #tiktok-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Placar Superior */
        #scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            border-bottom: 3px solid #fff;
            z-index: 10;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .team-name {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .score {
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        #team-a-score { color: #3498db; }
        #team-b-score { color: #e74c3c; }

        .vs {
            font-size: 1rem;
            color: #aaa;
        }

        /* Área do Jogo (Canvas) */
        #canvas-container {
            flex-content: -webkit-flex;
            flex: 1;
            position: relative;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Botão de Controle */
        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="tiktok-container">
        <div id="scoreboard">
            <div class="team">
                <span class="team-name">Time Azul</span>
                <span id="team-a-score" class="score">0</span>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <span class="team-name">Time Vermelho</span>
                <span id="team-b-score" class="score">0</span>
            </div>
        </div>

        <div id="canvas-container"></div>

        <div id="control-panel">
            <button class="btn" id="start-btn" onclick="releaseMarbles()">SOLTAR BOLAS</button>
        </div>
    </div>

    <script>
        // Módulos do Matter.js
        const { Engine, Render, Runner, Bodies, Composite, Events, Vector } = Matter;

        const container = document.getElementById('canvas-container');
        
        // Configuração do ambiente de física baseado no tamanho real do container
        const width = container.clientWidth;
        const height = container.clientHeight;

        const engine = Engine.create({ gravity: { y: 1 } });
        const world = engine.world;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // Variáveis do Jogo
        let scoreA = 0;
        let scoreB = 0;
        let ballA, ballB;
        let sensors = [];

        // 1. Criar Obstáculos (Pinos estilo Pachinko)
        const rows = 7;
        const pinsPerRow = 6;
        for (let i = 0; i < rows; i++) {
            const isEven = i % 2 === 0;
            const pins = isEven ? pinsPerRow : pinsPerRow - 1;
            const spacing = width / (pins + 1);

            for (let j = 0; j < pins; j++) {
                const x = (j + 1) * spacing + (isEven ? 0 : spacing / 2);
                const y = 120 + i * (height * 0.08);
                
                const pin = Bodies.circle(x, y, 6, {
                    isStatic: true,
                    render: { fillStyle: '#ffffff' }
                });
                Composite.add(world, pin);
            }
        }

        // 2. Criar Paredes Laterais Invisíveis
        const wallOptions = { isStatic: true, render: { visible: false } };
        Composite.add(world, [
            Bodies.rectangle(-10, height / 2, 20, height, wallOptions),
            Bodies.rectangle(width + 10, height / 2, 20, height, wallOptions)
        ]);

        // 3. Criar os Portões de Placar (Gols) na parte inferior
        const numGates = 4;
        const gateWidth = width / numGates;
        const gateHeight = 40;
        const gateY = height - 60;
        const pointsConfig = [1, 3, 2, 5]; // Pontos de cada quadrado da esquerda para a direita

        for (let i = 0; i < numGates; i++) {
            const x = (i * gateWidth) + (gateWidth / 2);

            // Criar o sensor (área que detecta a bola)
            const sensor = Bodies.rectangle(x, gateY, gateWidth - 10, gateHeight, {
                isStatic: true,
                isSensor: true,
                label: `gate_${pointsConfig[i]}`,
                render: {
                    fillStyle: `rgba(255, 255, 255, 0.15)`,
                    strokeStyle: '#fff',
                    lineWidth: 2
                }
            });
            
            sensors.push(sensor);
            Composite.add(world, sensor);

            // Divisórias visuais entre os portões
            if (i > 0) {
                const divider = Bodies.rectangle(i * gateWidth, gateY + 10, 6, gateHeight + 20, {
                    isStatic: true,
                    render: { fillStyle: '#fff' }
                });
                Composite.add(world, divider);
            }
        }

        // 4. Função para Soltar as Bolas
        function releaseMarbles() {
            // Limpar bolas antigas se existirem
            if (ballA) Composite.remove(world, ballA);
            if (ballB) Composite.remove(world, ballB);

            // Resetar placar
            scoreA = 0;
            scoreB = 0;
            document.getElementById('team-a-score').innerText = scoreA;
            document.getElementById('team-b-score').innerText = scoreB;

            // Criar Bola A (Azul)
            ballA = Bodies.circle(width * 0.4, 40, 14, {
                restitution: 0.6, // Elasticidade
                friction: 0.01,
                label: 'ball_A',
                render: { fillStyle: '#3498db', strokeStyle: '#fff', lineWidth: 2 }
            });

            // Criar Bola B (Vermelha)
            ballB = Bodies.circle(width * 0.6, 40, 14, {
                restitution: 0.6,
                friction: 0.01,
                label: 'ball_B',
                render: { fillStyle: '#e74c3c', strokeStyle: '#fff', lineWidth: 2 }
            });

            Composite.add(world, [ballA, ballB]);
        }

        // 5. Sistema de Colisão e Pontuação
        Events.on(engine, 'collisionStart', function(event) {
            const pairs = event.pairs;

            pairs.forEach(pair => {
                const labels = [pair.bodyA.label, pair.bodyB.label];
                
                // Verifica se uma bola tocou em um portão de pontos
                const gate = pairs.find(p => p.bodyA.label.startsWith('gate_') || p.bodyB.label.startsWith('gate_'));
                
                if (gate) {
                    const gateBody = gate.bodyA.label.startsWith('gate_') ? gate.bodyA : gate.bodyB;
                    const ballBody = gate.bodyA.label.startsWith('gate_') ? gate.bodyB : gate.bodyA;
                    
                    const points = parseInt(gateBody.label.split('_')[1]);

                    if (ballBody.label === 'ball_A' && ballBody.active !== false) {
                        scoreA += points;
                        document.getElementById('team-a-score').innerText = scoreA;
                        ballBody.active = false; // Evita pontuar multiplas vezes no mesmo frame
                    } else if (ballBody.label === 'ball_B' && ballBody.active !== false) {
                        scoreB += points;
                        document.getElementById('team-b-score').innerText = scoreB;
                        ballBody.active = false;
                    }
                }
            });
        });

        // Ajustar tamanho se a janela mudar
        window.addEventListener('resize', () => {
            const newWidth = container.clientWidth;
            const newHeight = container.clientHeight;
            render.canvas.width = newWidth;
            render.canvas.height = newHeight;
        });

    </script>
</body>
</html>
