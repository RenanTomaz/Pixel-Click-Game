<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Marble Race 9:16 - Pinball Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #tiktok-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 2px solid #444;
            z-index: 10;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
        }

        .score {
            font-size: 2.2rem;
        }

        #team-a-score { color: #3498db; }
        #team-b-score { color: #e74c3c; }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        #winner-announcement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: gold;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            z-index: 20;
            display: none;
            border: 2px solid gold;
        }
    </style>
</head>
<body>

    <div id="tiktok-container">
        <div id="scoreboard">
            <div class="team">
                <span>AZUL</span>
                <span id="team-a-score" class="score">0 GOLS</span>
            </div>
            <div style="color: #aaa;">VS</div>
            <div class="team">
                <span>VERMELHO</span>
                <span id="team-b-score" class="score">0 GOLS</span>
            </div>
        </div>

        <div id="canvas-container"></div>
        <div id="winner-announcement">FIM DE JOGO!</div>

        <div id="control-panel">
            <button class="btn" id="start-btn" onclick="startRace()">INICIAR CORRIDA</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        // Pista gigante com 25.000 pixels de altura
        const trackLength = 25000; 

        const engine = Engine.create({ gravity: { y: 0.45 } }); 
        const world = engine.world;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let scoreA = 0, scoreB = 0;
        let ballA, ballB;
        let raceStarted = false;

        // 1. GERAÇÃO DA PISTA LONGA (Obstáculos e Paredes)
        Composite.add(world, [
            Bodies.rectangle(-10, trackLength / 2, 20, trackLength, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(width + 10, trackLength / 2, 20, trackLength, { isStatic: true, render: { visible: false } })
        ]);

        // Espalhar pinos normais pelo mapa
        for (let y = 200; y < trackLength - 600; y += 100) {
            let isEven = (y / 100) % 2 === 0;
            let pins = isEven ? 5 : 4;
            let spacing = width / (pins + 1);

            for (let j = 0; j < pins; j++) {
                // Pulamos algumas posições para dar espaço aos Bumpers de Pinball mais abaixo
                if (Math.random() > 0.85) continue; 

                let x = (j + 1) * spacing + (isEven ? 0 : spacing / 2);
                x += (Math.random() - 0.5) * 15; 

                Composite.add(world, Bodies.circle(x, y, 6, {
                    isStatic: true,
                    render: { fillStyle: '#ffffff', opacity: 0.5 }
                }));
            }
        }

        // 2. ADICIONANDO BUMPERS DE PINBALL (REBATEDORES ATIVOS)
        // Eles são espalhados a cada 400 pixels ao longo da descida
        for (let y = 500; y < trackLength - 1000; y += 400) {
            // Escolhe uma posição X aleatória na pista, mantendo margem das paredes
            let x = Math.random() * (width - 120) + 60; 
            
            let bumper = Bodies.circle(x, y, 22, {
                isStatic: true,
                label: 'pinball_bumper',
                render: { 
                    fillStyle: '#9b59b6', // Roxo por padrão
                    strokeStyle: '#fff', 
                    lineWidth: 3 
                }
            });
            Composite.add(world, bumper);
        }

        // 3. CONFIGURAÇÃO DOS 6 EVENTOS DE GOL NO CAMINHO
        const goalPositions = [4000, 8000, 12000, 16000, 20000, 23500];
        
        goalPositions.forEach((yPos) => {
            let gateA = Bodies.rectangle(width * 0.25, yPos, width * 0.4, 30, {
                isStatic: true, isSensor: true, label: 'gate_A',
                render: { fillStyle: 'rgba(52, 152, 219, 0.2)', strokeStyle: '#3498db', lineWidth: 2 }
            });
            let gateB = Bodies.rectangle(width * 0.75, yPos, width * 0.4, 30, {
                isStatic: true, isSensor: true, label: 'gate_B',
                render: { fillStyle: 'rgba(231, 76, 60, 0.2)', strokeStyle: '#e74c3c', lineWidth: 2 }
            });
            Composite.add(world, [gateA, gateB]);
        });

        // 4. LINHA DE CHEGADA SIMPLES
        const finishY = trackLength - 300;
        const finishLine = Bodies.rectangle(width / 2, finishY, width, 10, {
            isStatic: true, isSensor: true, label: 'finish_line',
            render: { fillStyle: '#fff', strokeStyle: '#000', lineWidth: 4 }
        });
        Composite.add(world, finishLine);

        for(let x=20; x<width; x+=40) {
            Composite.add(world, Bodies.rectangle(x, finishY + 15, 20, 20, { isStatic: true, render: { fillStyle: '#fff' } }));
            Composite.add(world, Bodies.rectangle(x+20, finishY + 35, 20, 20, { isStatic: true, render: { fillStyle: '#fff' } }));
        }

        // 5. FUNÇÃO PARA INICIAR CORRIDA
        function startRace() {
            if (ballA) Composite.remove(world, ballA);
            if (ballB) Composite.remove(world, ballB);

            scoreA = 0; scoreB = 0;
            document.getElementById('team-a-score').innerText = "0 GOLS";
            document.getElementById('team-b-score').innerText = "0 GOLS";
            document.getElementById('winner-announcement').style.display = 'none';

            ballA = Bodies.circle(width * 0.45, 60, 14, {
                restitution: 0.4, friction: 0.01, label: 'ball_A',
                render: { fillStyle: '#3498db', strokeStyle: '#fff', lineWidth: 2 }
            });

            ballB = Bodies.circle(width * 0.55, 60, 14, {
                restitution: 0.4, friction: 0.01, label: 'ball_B',
                render: { fillStyle: '#e74c3c', strokeStyle: '#fff', lineWidth: 2 }
            });

            ballA.crossedGates = new Set();
            ballB.crossedGates = new Set();

            Composite.add(world, [ballA, ballB]);
            raceStarted = true;
        }

        // 6. SISTEMA DE DETECÇÃO (GOLS + PINBALL BUMPERS)
        Events.on(engine, 'collisionStart', function(event) {
            event.pairs.forEach(pair => {
                let bodies = [pair.bodyA, pair.bodyB];
                let ball = bodies.find(b => b.label === 'ball_A' || b.label === 'ball_B');
                let obstacle = bodies.find(o => o.label === 'pinball_bumper' || o.label === 'gate_A' || o.label === 'gate_B' || o.label === 'finish_line');

                if (ball && obstacle) {
                    // AÇÃO DO BUMPER DO PINBALL (Joga para cima com força e ângulo aleatório)
                    if (obstacle.label === 'pinball_bumper') {
                        // Força vertical para cima significativa (-0.02 a -0.035)
                        let forceY = -(0.022 + Math.random() * 0.013); 
                        // Força horizontal aleatória para espalhar para os lados (-0.01 a 0.01)
                        let forceX = (Math.random() - 0.5) * 0.02; 

                        // Aplica o impulso físico na bola no momento do impacto
                        Body.applyForce(ball, ball.position, { x: forceX, y: forceY });

                        // Efeito visual de piscar (Pinball Style)
                        obstacle.render.fillStyle = '#f1c40f'; // Pisca amarelo
                        setTimeout(() => {
                            obstacle.render.fillStyle = '#9b59b6'; // Retorna ao roxo
                        }, 150);
                    }

                    // Fim de corrida
                    if (obstacle.label === 'finish_line' && raceStarted) {
                        raceStarted = false;
                        let winnerText = scoreA > scoreB ? "VITÓRIA DO AZUL!" : (scoreB > scoreA ? "VITÓRIA DO VERMELHO!" : "EMPATE TÉCNICO!");
                        let el = document.getElementById('winner-announcement');
                        el.innerText = `FIM DE CORRIDA!\n${winnerText}`;
                        el.style.display = 'block';
                    }

                    // Marcação dos portões de Gol
                    if (ball.label === 'ball_A' && obstacle.label === 'gate_A' && !ball.crossedGates.has(obstacle.id)) {
                        scoreA++;
                        ball.crossedGates.add(obstacle.id);
                        document.getElementById('team-a-score').innerText = `${scoreA} GOLS`;
                    }
                    if (ball.label === 'ball_B' && obstacle.label === 'gate_B' && !ball.crossedGates.has(obstacle.id)) {
                        scoreB++;
                        ball.crossedGates.add(obstacle.id);
                        document.getElementById('team-b-score').innerText = `${scoreB} GOLS`;
                    }
                }
            });
        });

        // 7. CÂMERA SEGUIDORA DINÂMICA
        Events.on(render, 'beforeRender', function() {
            if (!raceStarted || !ballA || !ballB) return;

            let leaderY = Math.max(ballA.position.y, ballB.position.y);
            let targetY = leaderY - (height / 3);

            if (targetY < 0) targetY = 0;
            if (targetY > trackLength - height) targetY = trackLength - height;

            Render.lookAt(render, {
                min: { x: 0, y: targetY },
                max: { x: width, y: targetY + height }
            });
        });
    </script>
</body>
</html>
