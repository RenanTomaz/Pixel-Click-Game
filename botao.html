<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Marble Race 9:16 - Pixel Forest Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0f19;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #tiktok-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            /* Gradiente inspirado na imagem enviada (Céu noturno florestal) */
            background: linear-gradient(180deg, #0d1321, #131c31, #1b263b);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 4px solid #3e5c76;
        }

        #scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(13, 19, 33, 0.95);
            padding: 12px;
            color: #e0e1dd;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 4px solid #3e5c76;
            z-index: 10;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
        }

        .score {
            font-size: 2rem;
            font-family: monospace;
        }

        #team-a-score { color: #52b788; text-shadow: 0 0 5px #52b788; }
        #team-b-score { color: #ffadad; text-shadow: 0 0 5px #ffadad; }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            background-color: #3e5c76;
            color: #e0e1dd;
            border: 2px solid #748cab;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        #winner-announcement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(11, 15, 25, 0.95);
            color: #ffd166;
            padding: 25px;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            z-index: 20;
            display: none;
            border: 4px dashed #ffd166;
        }
    </style>
</head>
<body>

    <div id="tiktok-container">
        <div id="scoreboard">
            <div class="team">
                <span>BOLA VERDE</span>
                <span id="team-a-score" class="score">0 GOLS</span>
            </div>
            <div style="color: #748cab;">VS</div>
            <div class="team">
                <span>BOLA ROSA</span>
                <span id="team-b-score" class="score">0 GOLS</span>
            </div>
        </div>

        <div id="canvas-container"></div>
        <div id="winner-announcement">FIM DE JOGO!</div>

        <div id="control-panel">
            <button class="btn" id="start-btn" onclick="startRace()">GERAR PARTIDA</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Constraint, Body } = Matter;

        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const trackLength = 25000; 
        const engine = Engine.create({ gravity: { y: 0.5 } }); 
        const world = engine.world;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let scoreA = 0, scoreB = 0;
        let ballA, ballB;
        let raceStarted = false;

        // Limites Invisíveis das laterais
        Composite.add(world, [
            Bodies.rectangle(-10, trackLength / 2, 20, trackLength, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(width + 10, trackLength / 2, 20, trackLength, { isStatic: true, render: { visible: false } })
        ]);

        // 1. DISTRIBUIÇÃO EM TODA A TELA (GANGORRAS + PLATAFORMAS ESTILO PIXEL)
        // O loop varre toda a extensão preenchendo todos os cantos sem deixar pontos vazios
        for (let y = 250; y < trackLength - 800; y += 180) {
            
            // Decisão de layout alternada por nível para preencher extremidades esquerda/direita e centro
            if ((y / 180) % 2 === 0) {
                // Gangorra centralizada
                createSeesaw(width / 2, y, width * 0.55);
                
                // Pequenas plataformas fixas musgosas nos cantos esquerdo e direito para não deixar áreas livres vazias
                Composite.add(world, Bodies.rectangle(20, y + 60, 60, 15, { isStatic: true, render: { fillStyle: '#2d6a4f' } }));
                Composite.add(world, Bodies.rectangle(width - 20, y + 60, 60, 15, { isStatic: true, render: { fillStyle: '#2d6a4f' } }));
            } else {
                // Duas gangorras menores dividindo as duas metades laterais simetricamente
                createSeesaw(width * 0.25, y, width * 0.4);
                createSeesaw(width * 0.75, y, width * 0.4);

                // Pequena plataforma flutuante no meio estática para reter o fluxo direto
                Composite.add(world, Bodies.rectangle(width / 2, y + 40, 40, 15, { isStatic: true, render: { fillStyle: '#1b4332' } }));
            }

            // Elementos visuais decorativos simulando árvores/nuvens do cenário pixel art no fundo
            if (Math.random() > 0.6) {
                Composite.add(world, Bodies.circle(Math.random() * width, y - 50, 12, { isStatic: true, isSensor: true, render: { fillStyle: '#40916c', opacity: 0.15 } }));
            }
        }

        // Função auxiliar para construir uma estrutura gangorra funcional
        function createSeesaw(x, y, length) {
            // A barra que vai girar
            let bar = Bodies.rectangle(x, y, length, 12, {
                frictionAir: 0.05,
                render: { fillStyle: '#748cab', strokeStyle: '#3e5c76', lineWidth: 1 }
            });

            // O pino central de suporte
            let pivot = Bodies.circle(x, y, 5, { isStatic: true, render: { fillStyle: '#ffd166' } });

            // Junta que prende a barra no pino impedindo que ela caia, mas permitindo rotação total
            let joint = Constraint.create({
                bodyA: bar,
                pointB: { x: x, y: y },
                stiffness: 1,
                length: 0,
                render: { visible: false }
            });

            Composite.add(world, [bar, pivot, joint]);
        }

        // 2. CONFIGURAÇÃO DOS 6 EVENTOS DE GOL (Portões de Energia Musgosa)
        const goalPositions = [4000, 8000, 12000, 16000, 20000, 23500];
        
        goalPositions.forEach((yPos) => {
            let gateA = Bodies.rectangle(width * 0.25, yPos, width * 0.45, 25, {
                isStatic: true, isSensor: true, label: 'gate_A',
                render: { fillStyle: 'rgba(82, 183, 136, 0.15)', strokeStyle: '#52b788', lineWidth: 1 }
            });
            let gateB = Bodies.rectangle(width * 0.75, yPos, width * 0.45, 25, {
                isStatic: true, isSensor: true, label: 'gate_B',
                render: { fillStyle: 'rgba(255, 173, 173, 0.15)', strokeStyle: '#ffadad', lineWidth: 1 }
            });
            Composite.add(world, [gateA, gateB]);
        });

        // 3. LINHA DE CHEGADA SIMPLES
        const finishY = trackLength - 300;
        const finishLine = Bodies.rectangle(width / 2, finishY, width, 8, {
            isStatic: true, isSensor: true, label: 'finish_line',
            render: { fillStyle: '#e0e1dd' }
        });
        Composite.add(world, finishLine);

        // 4. INICIAR FUNÇÃO DA PARTIDA
        function startRace() {
            if (ballA) Composite.remove(world, ballA);
            if (ballB) Composite.remove(world, ballB);

            scoreA = 0; scoreB = 0;
            document.getElementById('team-a-score').innerText = "0 GOLS";
            document.getElementById('team-b-score').innerText = "0 GOLS";
            document.getElementById('winner-announcement').style.display = 'none';

            // Bolas baseadas no espectro verde e rosa do estilo pixel art florestal
            ballA = Bodies.circle(width * 0.42, 80, 13, {
                restitution: 0.3, friction: 0.02, label: 'ball_A',
                render: { fillStyle: '#52b788', strokeStyle: '#fff', lineWidth: 1 }
            });

            ballB = Bodies.circle(width * 0.58, 80, 13, {
                restitution: 0.3, friction: 0.02, label: 'ball_B',
                render: { fillStyle: '#ffadad', strokeStyle: '#fff', lineWidth: 1 }
            });

            ballA.crossedGates = new Set();
            ballB.crossedGates = new Set();

            Composite.add(world, [ballA, ballB]);
            raceStarted = true;
        }

        // 5. DETECÇÃO DE PONTOS E ENCERRAMENTO
        Events.on(engine, 'collisionStart', function(event) {
            event.pairs.forEach(pair => {
                let bodies = [pair.bodyA, pair.bodyB];
                let ball = bodies.find(b => b.label === 'ball_A' || b.label === 'ball_B');
                let target = bodies.find(t => t.label === 'gate_A' || t.label === 'gate_B' || t.label === 'finish_line');

                if (ball && target) {
                    if (target.label === 'finish_line' && raceStarted) {
                        raceStarted = false;
                        let winnerText = scoreA > scoreB ? "BOLA VERDE VENCEU!" : (scoreB > scoreA ? "BOLA ROSA VENCEU!" : "EMPATE NA FLORESTA!");
                        let el = document.getElementById('winner-announcement');
                        el.innerText = `FIM DA DESCIDA!\n${winnerText}`;
                        el.style.display = 'block';
                    }

                    if (ball.label === 'ball_A' && target.label === 'gate_A' && !ball.crossedGates.has(target.id)) {
                        scoreA++;
                        ball.crossedGates.add(target.id);
                        document.getElementById('team-a-score').innerText = `${scoreA} GOLS`;
                    }
                    if (ball.label === 'ball_B' && target.label === 'gate_B' && !ball.crossedGates.has(target.id)) {
                        scoreB++;
                        ball.crossedGates.add(target.id);
                        document.getElementById('team-b-score').innerText = `${scoreB} GOLS`;
                    }
                }
            });
        });

        // 6. CÂMERA DINÂMICA
        Events.on(render, 'beforeRender', function() {
            if (!raceStarted || !ballA || !ballB) return;

            let leaderY = Math.max(ballA.position.y, ballB.position.y);
            let targetY = leaderY - (height / 3);

            if (targetY < 0) targetY = 0;
            if (targetY > trackLength - height) targetY = trackLength - height;

            Render.lookAt(render, {
                min: { x: 0, y: targetY },
                max: { x: width, y: targetY + height }
            });
        });
    </script>
</body>
</html>
