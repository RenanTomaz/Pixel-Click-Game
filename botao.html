<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavern Marble Race 9:16 - Ping Pong Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #080a10;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #tiktok-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            background: linear-gradient(180deg, #090d16, #111827, #070a0f);
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 4px solid #2d3748;
        }

        #scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(9, 13, 22, 0.95);
            padding: 12px;
            color: #cbd5e1;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 4px solid #2d3748;
            z-index: 10;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
        }

        .score {
            font-size: 2rem;
        }

        #team-a-score { color: #38bdf8; text-shadow: 0 0 8px rgba(56,189,248,0.5); }
        #team-b-score { color: #fb7185; text-shadow: 0 0 8px rgba(251,113,133,0.5); }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            background-color: #1e293b;
            color: #f8fafc;
            border: 2px solid #475569;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        
        #winner-announcement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 10, 0.95);
            color: #fbbf24;
            padding: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            z-index: 20;
            display: none;
            border: 4px dashed #fbbf24;
        }
    </style>
</head>
<body>

    <div id="tiktok-container">
        <div id="scoreboard">
            <div class="team">
                <span>PING AZUL</span>
                <span id="team-a-score" class="score">0 GOLS</span>
            </div>
            <div style="color: #475569;">VS</div>
            <div class="team">
                <span>PONG ROSA</span>
                <span id="team-b-score" class="score">0 GOLS</span>
            </div>
        </div>

        <div id="canvas-container"></div>
        <div id="winner-announcement">FIM DE PAPO!</div>

        <div id="control-panel">
            <button class="btn" id="start-btn" onclick="startRace()">SOLTAR BOLINHAS</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const trackLength = 25000; 
        const engine = Engine.create({ gravity: { y: 0.35 } }); // Gravidade menor para valorizar o efeito saltitante
        const world = engine.world;

        const render = Render.create({
            element: container,
            engine: engine,
            options: { width: width, height: height, wireframes: false, background: 'transparent' }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let scoreA = 0, scoreB = 0;
        let ballA, ballB;
        let raceStarted = false;
        let motorizedSeesaws = [];

        // 1. LIMITES LATERAIS IRREGULARES (Paredes estilo Caverna)
        // Criando estalactites, estalagmites e relevos pontudos nos cantos esquerdo e direito
        for (let y = 100; y < trackLength; y += 120) {
            // Larguras variadas para os relevos da caverna
            let leftWallWidth = 30 + Math.random() * 45;
            let rightWallWidth = 30 + Math.random() * 45;

            // Bloco irregular da Esquerda
            let caveLeft = Bodies.polygon(leftWallWidth / 2, y, 3, leftWallWidth, {
                isStatic: true, angle: Math.random(),
                render: { fillStyle: '#1e293b' }
            });
            // Bloco irregular da Direita
            let caveRight = Bodies.polygon(width - (rightWallWidth / 2), y + 60, 3, rightWallWidth, {
                isStatic: true, angle: Math.random(),
                render: { fillStyle: '#141b2d' }
            });

            Composite.add(world, [caveLeft, caveRight]);
        }

        // Paredes de colisão planas de segurança por trás do visual para evitar que as bolas saiam voando do mapa
        Composite.add(world, [
            Bodies.rectangle(-5, trackLength / 2, 10, trackLength, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(width + 5, trackLength / 2, 10, trackLength, { isStatic: true, render: { visible: false } })
        ]);

        // 2. DISTRIBUIÇÃO DAS GANGORRAS AUTOMÁTICAS (Não travam a passagem)
        // Elas ocupam menos espaço horizontal (35% da tela) permitindo vazão nas laterais
        for (let y = 300; y < trackLength - 800; y += 220) {
            let xPos = (y / 220) % 2 === 0 ? width * 0.35 : width * 0.65;
            
            // Variando a velocidade inicial e o ângulo máximo do motor automático
            let seesawData = createMotorizedSeesaw(xPos, y, width * 0.38, (Math.random() * 0.03) + 0.02);
            motorizedSeesaws.push(seesawData);
        }

        function createMotorizedSeesaw(x, y, length, speed) {
            let bar = Bodies.rectangle(x, y, length, 12, {
                isStatic: true, // Mantemos static e alteramos o ângulo via script para um movimento uniforme contínuo
                render: { fillStyle: '#475569', strokeStyle: '#64748b', lineWidth: 1 }
            });

            Composite.add(world, bar);

            return {
                body: bar,
                baseY: y,
                speed: speed,
                angleRange: 0.52, // Limite de inclinação (~30 graus) para nunca ficar totalmente em pé e trancar a bola
                phase: Math.random() * Math.PI // Começam em posições de rotação diferentes
            };
        }

        // 3. ATUALIZAÇÃO DO MOVIMENTO AUTOMÁTICO DAS GANGORRAS
        Events.on(engine, 'beforeUpdate', function(event) {
            let time = engine.timing.timestamp;
            motorizedSeesaws.forEach(seesaw => {
                // Cálculo senoidal para fazer oscilar suavemente de um lado para o outro sozinhos
                let newAngle = Math.sin(time * 0.05 * seesaw.speed + seesaw.phase) * seesaw.angleRange;
                Body.setAngle(seesaw.body, newAngle);
            });
        });

        // 4. PORTÕES DE GOL
        const goalPositions = [4000, 8000, 12000, 16000, 20000, 23500];
        goalPositions.forEach((yPos) => {
            let gateA = Bodies.rectangle(width * 0.25, yPos, width * 0.45, 25, {
                isStatic: true, isSensor: true, label: 'gate_A',
                render: { fillStyle: 'rgba(56, 189, 248, 0.1)', strokeStyle: '#38bdf8', lineWidth: 1 }
            });
            let gateB = Bodies.rectangle(width * 0.75, yPos, width * 0.45, 25, {
                isStatic: true, isSensor: true, label: 'gate_B',
                render: { fillStyle: 'rgba(251, 113, 133, 0.1)', strokeStyle: '#fb7185', lineWidth: 1 }
            });
            Composite.add(world, [gateA, gateB]);
        });

        // 5. LINHA DE CHEGADA SIMPLES
        const finishY = trackLength - 300;
        const finishLine = Bodies.rectangle(width / 2, finishY, width, 8, {
            isStatic: true, isSensor: true, label: 'finish_line',
            render: { fillStyle: '#475569' }
        });
        Composite.add(world, finishLine);

        // 6. ADICIONAR E RECONFIGURAR AS BOLAS (FÍSICA DE PING-PONG)
        function startRace() {
            if (ballA) Composite.remove(world, ballA);
            if (ballB) Composite.remove(world, ballB);

            scoreA = 0; scoreB = 0;
            document.getElementById('team-a-score').innerText = "0 GOLS";
            document.getElementById('team-b-score').innerText = "0 GOLS";
            document.getElementById('winner-announcement').style.display = 'none';

            let pingPongPhysics = {
                restitution: 0.85,  // Altíssima elasticidade (Bate e pula muito longe)
                friction: 0.005,    // Quase nenhum atrito na colisão
                frictionAir: 0.008, // Leve resistência do ar para estabilizar o peso simulado
                density: 0.0005     // Massa volumétrica baixa (Muito leve)
            };

            ballA = Bodies.circle(width * 0.42, 80, 12, {
                ...pingPongPhysics, label: 'ball_A',
                render: { fillStyle: '#38bdf8', strokeStyle: '#fff', lineWidth: 2 }
            });

            ballB = Bodies.circle(width * 0.58, 80, 12, {
                ...pingPongPhysics, label: 'ball_B',
                render: { fillStyle: '#fb7185', strokeStyle: '#fff', lineWidth: 2 }
            });

            ballA.crossedGates = new Set();
            ballB.crossedGates = new Set();

            Composite.add(world, [ballA, ballB]);
            raceStarted = true;
        }

        // 7. ARREMATES DE COLISÃO (GOLS / CHEGADA)
        Events.on(engine, 'collisionStart', function(event) {
            event.pairs.forEach(pair => {
                let bodies = [pair.bodyA, pair.bodyB];
                let ball = bodies.find(b => b.label === 'ball_A' || b.label === 'ball_B');
                let target = bodies.find(t => t.label === 'gate_A' || t.label === 'gate_B' || t.label === 'finish_line');

                if (ball && target) {
                    if (target.label === 'finish_line' && raceStarted) {
                        raceStarted = false;
                        let winnerText = scoreA > scoreB ? "AZUL VENCEU!" : (scoreB > scoreA ? "ROSA VENCEU!" : "EMPATE NA CAVERNA!");
                        let el = document.getElementById('winner-announcement');
                        el.innerText = `FIM DA PROVA!\n${winnerText}`;
                        el.style.display = 'block';
                    }

                    if (ball.label === 'ball_A' && target.label === 'gate_A' && !ball.crossedGates.has(target.id)) {
                        scoreA++;
                        ball.crossedGates.add(target.id);
                        document.getElementById('team-a-score').innerText = `${scoreA} GOLS`;
                    }
                    if (ball.label === 'ball_B' && target.label === 'gate_B' && !ball.crossedGates.has(target.id)) {
                        scoreB++;
                        ball.crossedGates.add(target.id);
                        document.getElementById('team-b-score').innerText = `${scoreB} GOLS`;
                    }
                }
            });
        });

        // 8. CÂMERA SEGUIDORA
        Events.on(render, 'beforeRender', function() {
            if (!raceStarted || !ballA || !ballB) return;

            let leaderY = Math.max(ballA.position.y, ballB.position.y);
            let targetY = leaderY - (height / 3);

            if (targetY < 0) targetY = 0;
            if (targetY > trackLength - height) targetY = trackLength - height;

            Render.lookAt(render, {
                min: { x: 0, y: targetY },
                max: { x: width, y: targetY + height }
            });
        });
    </script>
</body>
</html>
