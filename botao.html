<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long Marble Race 9:16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #tiktok-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #scoreboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 2px solid #444;
            z-index: 10;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
        }

        .score {
            font-size: 2.2rem;
        }

        #team-a-score { color: #3498db; }
        #team-b-score { color: #e74c3c; }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        #winner-announcement {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: gold;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            z-index: 20;
            display: none;
            border: 2px solid gold;
        }
    </style>
</head>
<body>

    <div id="tiktok-container">
        <div id="scoreboard">
            <div class="team">
                <span>AZUL</span>
                <span id="team-a-score" class="score">0 GOLS</span>
            </div>
            <div style="color: #aaa;">VS</div>
            <div class="team">
                <span>VERMELHO</span>
                <span id="team-b-score" class="score">0 GOLS</span>
            </div>
        </div>

        <div id="canvas-container"></div>
        <div id="winner-announcement" id="winner-text">FIM DE JOGO!</div>

        <div id="control-panel">
            <button class="btn" id="start-btn" onclick="startRace()">INICIAR CORRIDA</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        // Uma pista gigante com 25.000 pixels de altura para garantir ~1m20s de queda lenta
        const trackLength = 25000; 

        const engine = Engine.create({ gravity: { y: 0.4 } }); // Gravidade um pouco menor para a queda durar mais
        const world = engine.world;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let scoreA = 0, scoreB = 0;
        let ballA, ballB;
        let raceStarted = false;

        // 1. GERAÇÃO DA PISTA LONGA (Obstáculos e Paredes)
        // Paredes laterais estendidas até o fim da pista
        Composite.add(world, [
            Bodies.rectangle(-10, trackLength / 2, 20, trackLength, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(width + 10, trackLength / 2, 20, trackLength, { isStatic: true, render: { visible: false } })
        ]);

        // Espalhar pinos/obstáculos alternados ao longo de todo o percurso
        for (let y = 200; y < trackLength - 600; y += 90) {
            let isEven = (y / 90) % 2 === 0;
            let pins = isEven ? 5 : 4;
            let spacing = width / (pins + 1);

            for (let j = 0; j < pins; j++) {
                let x = (j + 1) * spacing + (isEven ? 0 : spacing / 2);
                // Pequena variação para não ficar perfeitamente simétrico
                x += (Math.random() - 0.5) * 15; 

                Composite.add(world, Bodies.circle(x, y, 7, {
                    isStatic: true,
                    render: { fillStyle: '#ffffff', opacity: 0.7 }
                }));
            }
        }

        // 2. CONFIGURAÇÃO DOS 6 EVENTOS DE GOL NO CAMINHO
        // Distribui os portões proporcionalmente ao longo dos 25.000 pixels
        const goalPositions = [4000, 8000, 12000, 16000, 20000, 23500];
        
        goalPositions.forEach((yPos, index) => {
            // Portão para a Bola Azul (Lado Esquerdo)
            let gateA = Bodies.rectangle(width * 0.25, yPos, width * 0.4, 30, {
                isStatic: true, isSensor: true, label: 'gate_A',
                render: { fillStyle: 'rgba(52, 152, 219, 0.2)', strokeStyle: '#3498db', lineWidth: 2 }
            });
            // Portão para a Bola Vermelha (Lado Direito)
            let gateB = Bodies.rectangle(width * 0.75, yPos, width * 0.4, 30, {
                isStatic: true, isSensor: true, label: 'gate_B',
                render: { fillStyle: 'rgba(231, 76, 60, 0.2)', strokeStyle: '#e74c3c', lineWidth: 2 }
            });

            Composite.add(world, [gateA, gateB]);
        });

        // 3. LINHA DE CHEGADA SIMPLES (No final do mapa)
        const finishY = trackLength - 300;
        const finishLine = Bodies.rectangle(width / 2, finishY, width, 10, {
            isStatic: true, isSensor: true, label: 'finish_line',
            render: { fillStyle: '#fff', strokeStyle: '#000', lineWidth: 4 }
        });
        Composite.add(world, finishLine);

        // Placa visual de chegada
        for(let x=20; x<width; x+=40) {
            Composite.add(world, Bodies.rectangle(x, finishY + 15, 20, 20, { isStatic: true, render: { fillStyle: '#fff' } }));
            Composite.add(world, Bodies.rectangle(x+20, finishY + 35, 20, 20, { isStatic: true, render: { fillStyle: '#fff' } }));
        }

        // 4. FUNÇÃO PARA INICIAR
        function startRace() {
            if (ballA) Composite.remove(world, ballA);
            if (ballB) Composite.remove(world, ballB);

            scoreA = 0; scoreB = 0;
            document.getElementById('team-a-score').innerText = "0 GOLS";
            document.getElementById('team-b-score').innerText = "0 GOLS";
            document.getElementById('winner-announcement').style.display = 'none';

            // Bolas começam no topo perto uma da outra
            ballA = Bodies.circle(width * 0.45, 60, 14, {
                restitution: 0.5, friction: 0.02, label: 'ball_A',
                render: { fillStyle: '#3498db', strokeStyle: '#fff', lineWidth: 2 }
            });

            ballB = Bodies.circle(width * 0.55, 60, 14, {
                restitution: 0.5, friction: 0.02, label: 'ball_B',
                render: { fillStyle: '#e74c3c', strokeStyle: '#fff', lineWidth: 2 }
            });

            // Armazenar os IDs dos portões que cada bola já cruzou para evitar contagem dupla repetida na mesma área
            ballA.crossedGates = new Set();
            ballB.crossedGates = new Set();

            Composite.add(world, [ballA, ballB]);
            raceStarted = true;
        }

        // 5. DETECÇÃO DE GOLS (SENSORES)
        Events.on(engine, 'collisionStart', function(event) {
            event.pairs.forEach(pair => {
                let bodies = [pair.bodyA, pair.bodyB];
                let ball = bodies.find(b => b.label === 'ball_A' || b.label === 'ball_B');
                let gate = bodies.find(g => g.label === 'gate_A' || g.label === 'gate_B' || g.label === 'finish_line');

                if (ball && gate) {
                    // Se cruzou a linha de chegada final
                    if (gate.label === 'finish_line' && raceStarted) {
                        raceStarted = false;
                        let winnerText = scoreA > scoreB ? "VITÓRIA DO AZUL!" : (scoreB > scoreA ? "VITÓRIA DO VERMELHO!" : "EMPATE TÉCNICO!");
                        let el = document.getElementById('winner-announcement');
                        el.innerText = `FIM DE CORRIDA!\n${winnerText}`;
                        el.style.display = 'block';
                        return;
                    }

                    // Sistema de marcação de Gol por área
                    if (ball.label === 'ball_A' && gate.label === 'gate_A' && !ball.crossedGates.has(gate.id)) {
                        scoreA++;
                        ball.crossedGates.add(gate.id);
                        document.getElementById('team-a-score').innerText = `${scoreA} GOLS`;
                    }
                    if (ball.label === 'ball_B' && gate.label === 'gate_B' && !ball.crossedGates.has(gate.id)) {
                        scoreB++;
                        ball.crossedGates.add(gate.id);
                        document.getElementById('team-b-score').innerText = `${scoreB} GOLS`;
                    }
                }
            });
        });

        // 6. SISTEMA DE CÂMERA DINÂMICA (Acompanha o Líder)
        Events.on(render, 'beforeRender', function() {
            if (!raceStarted || !ballA || !ballB) return;

            // Identifica qual bola está mais abaixo na tela (maior valor de Y)
            let leaderY = Math.max(ballA.position.y, ballB.position.y);

            // Centraliza a visão verticalmente na bola líder, respeitando limites do topo
            let targetY = leaderY - (height / 3);
            if (targetY < 0) targetY = 0;
            if (targetY > trackLength - height) targetY = trackLength - height;

            // Aplica a translação de câmera no Matter.js
            Render.lookAt(render, {
                min: { x: 0, y: targetY },
                max: { x: width, y: targetY + height }
            });
        });
    </script>
</body>
</html>
