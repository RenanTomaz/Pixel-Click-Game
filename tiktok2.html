<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - Ultra Neon</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-yellow: #ffff00;
            --neon-green: #00ff00;
            --bg-dark: #050505;
        }

        /* FUNDO VIBRANTE ANIMADO */
        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            /* Gradiente de alto contraste */
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff00cc, #333399);
            background-size: 400% 400%;
            animation: meshGradient 10s ease infinite;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Russo One', sans-serif;
        }

        #video-canvas {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            padding: 6vh 8% 8vh 8%; 
        }

        /* PASSOS DO QUIZ COM BRILHO */
        .progress-header {
            position: absolute;
            top: 2vh;
            width: 85%;
            display: flex;
            gap: 1vh;
            z-index: 10;
        }

        .step {
            flex: 1;
            height: 1vh;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2vh;
            transition: all 0.4s;
        }

        .step.active {
            background: var(--neon-yellow);
            box-shadow: 0 0 2vh var(--neon-yellow);
        }

        .fixed-title {
            font-size: 4.5vh; 
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 1vh var(--neon-pink), 0 0 2vh var(--neon-pink);
            margin-top: 4vh;
            letter-spacing: 3px;
        }

        /* CAIXA DE PERGUNTA ULTRA VISÍVEL */
        .question-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 0.4vh solid var(--neon-blue);
            border-radius: 3vh;
            padding: 2.5vh;
            width: 100%;
            height: 16vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2vh 0;
            box-shadow: 0 0 3vh rgba(0, 255, 255, 0.3);
        }

        .question-text {
            font-size: 3vh; 
            color: white;
            text-align: center;
            text-shadow: 0.3vh 0.3vh 0.5vh #000;
        }

        /* TIMER COLORIDO */
        #timer-container {
            width: 100%;
            height: 2.5vh;
            background: #000;
            border-radius: 5vh;
            border: 0.3vh solid #fff;
            margin-bottom: 2vh;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            box-shadow: 0 0 2vh var(--neon-blue);
            transform-origin: left;
        }

        /* OPÇÕES ESTILO BOTÃO ARCADE */
        .options-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.8vh;
            flex-grow: 1;
        }

        .option {
            background: rgba(0, 0, 0, 0.8);
            border: 0.4vh solid #fff;
            padding: 2vh;
            border-radius: 2vh;
            font-size: 2.4vh;
            color: white;
            text-align: center;
            opacity: 0;
            box-shadow: 0 0.6vh 0 #555;
            transition: all 0.2s;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-3px, -2px) rotate(-1deg); }
            50% { transform: translate(3px, 2px) rotate(1deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }

        .shake-active { animation: shake 0.1s infinite; }

        .highlight-correct {
            background: var(--neon-green) !important;
            border-color: #fff !important;
            color: #000 !important;
            transform: scale(1.1);
            box-shadow: 0 0 5vh var(--neon-green);
            z-index: 10;
        }

        .fade-out { opacity: 0.2 !important; filter: blur(2px); }

        .footer-brand {
            width: 100%;
            background: var(--neon-pink);
            padding: 1.5vh 0;
            border-radius: 2vh;
            font-size: 2.5vh;
            color: white;
            margin-top: 2vh;
            text-align: center;
            box-shadow: 0 0.8vh 0 #990066;
            text-shadow: 0.2vh 0.2vh #000;
        }
    </style>
</head>
<body>

<div id="overlay-start" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:9999; display:flex; justify-content:center; align-items:center;">
    <button onclick="iniciarQuiz()" style="padding: 4vh 10vh; font-family:'Russo One', sans-serif; font-size: 5vh; background: var(--neon-blue); color:#000; border:none; border-radius:3vh; cursor:pointer; box-shadow: 0 1vh 0 #009999;">
      COMEÇAR!
    </button>
</div>

<div id="video-canvas">
    <div class="progress-header" id="step-container"></div>
    <div class="fixed-title">TESTE SEU CONHECIMENTO</d
    
    <div class="question-container">
        <div class="question-text" id="q-text">PREPARE-SE...</div>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>
    <div class="options-list" id="options-box"></div>
    
    <div class="footer-brand">SIGA O CANAL!</div>
</div>

<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    const masterPool = [
        ...(typeof esportesData !== 'undefined' ? esportesData : []),
        ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
        ...(typeof historiaData !== 'undefined' ? historiaData : []),
        ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
        ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
        ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
    ];

    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;

    const sfx = {
        timer: new Howl({ src: ['timer_tic_tac.mp3'], loop: true, volume: 0.5 }),
        correct: new Howl({ src: ['success.mp3'], volume: 1 }),
        transition: new Howl({ src: ['swoosh.mp3'], volume: 0.7 })
    };

    function createSteps() {
        const container = document.getElementById('step-container');
        for(let i=0; i<TOTAL_Q; i++) {
            const div = document.createElement('div');
            div.className = 'step';
            div.id = `step-${i}`;
            container.appendChild(div);
        }
    }

    function iniciarQuiz() {
        document.getElementById('overlay-start').style.display = 'none';
        createSteps();
        startSequence();
    }

    function startSequence() {
        if (currentQ >= TOTAL_Q) {
            document.getElementById('video-canvas').innerHTML = `
                <div style="text-align:center; margin-top:30vh">
                    <h1 style="color:var(--neon-yellow); font-size:7vh; text-shadow:0 0 2vh gold">ACABOU!</h1>
                    <p style="color:white; font-size:4vh">QUANTAS VOCÊ ACERTOU?</p>
                </div>`;
            return;
        }

        document.getElementById(`step-${currentQ}`).classList.add('active');
        const data = selectedQuestions[currentQ];
        const canvas = document.getElementById('video-canvas');
        canvas.classList.remove('shake-active');
        
        document.getElementById('q-text').innerText = data.q;
        
        // Voz (TTS)
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(data.q.toLowerCase());
        msg.lang = 'pt-BR';
        msg.rate = 1.3;
        window.speechSynthesis.speak(msg);

        // Opções
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        const correctTxt = data.options[data.correct];
        let options = data.options.map(t => ({t})).sort(() => Math.random() - 0.5);
        const correctIdx = options.findIndex(o => o.t === correctTxt);

        options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.id = `opt-${i}`;
            div.innerText = opt.t;
            div.style.animation = `slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards ${i * 0.1}s`;
            box.appendChild(div);
        });

        sfx.transition.play();
        setTimeout(() => {
            sfx.timer.play();
            runTimer(correctIdx, correctTxt);
        }, 1000);
    }

    function runTimer(correctIdx, text) {
        const bar = document.getElementById('timer-bar');
        const canvas = document.getElementById('video-canvas');
        const start = Date.now();
        const duration = 7000;

        function update() {
            const elapsed = Date.now() - start;
            const p = Math.max(0, 100 - (elapsed / duration * 100));
            bar.style.width = p + "%";

            if (p < 30) {
                bar.style.background = "var(--neon-pink)";
                canvas.classList.add('shake-active');
            }

            if (elapsed < duration) {
                requestAnimationFrame(update);
            } else {
                finishRound(correctIdx, text);
            }
        }
        update();
    }

    function finishRound(idx, text) {
        sfx.timer.stop();
        sfx.correct.play();
        
        confetti({
            particleCount: 200,
            spread: 90,
            origin: { y: 0.6 },
            colors: ['#ff00ff', '#00ffff', '#ffff00']
        });

        document.querySelectorAll('.option').forEach((el, i) => {
            if(i === idx) el.classList.add('highlight-correct');
            else el.classList.add('fade-out');
        });

        const ans = new SpeechSynthesisUtterance(text.toLowerCase());
        ans.lang = 'pt-BR';
        window.speechSynthesis.speak(ans);

        setTimeout(() => {
            currentQ++;
            startSequence();
        }, 3000);
    }

    // Animação CSS para entrada das opções
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    `;
    document.head.appendChild(styleSheet);
</script>
</body>
</html>
