<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Ares-1: Deep Space POV</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background: #000; font-family: 'Courier New', monospace;
        }

        canvas { display: block; }

        .cockpit-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            border: 30px solid #1a1a1a;
            box-shadow: inset 0 0 150px rgba(0, 255, 255, 0.1);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .hud-top {
            display: flex; justify-content: space-between;
            padding: 40px; color: #00ffff; text-shadow: 0 0 10px #00ffff;
        }

        .hud-bottom {
            padding: 40px; background: rgba(0, 0, 0, 0.85);
            border-top: 2px solid #00ffff; color: #00ffff;
            min-height: 100px; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
        }

        .status-box { border: 1px solid #00ffff; padding: 10px; background: rgba(0, 255, 255, 0.05); line-height: 1.5; }

        #btnIniciar {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 25px 50px; background: #000;
            color: #00ffff; border: 2px solid #00ffff;
            font-size: 1.2rem; cursor: pointer; pointer-events: auto;
            z-index: 100; transition: 0.4s;
            letter-spacing: 2px;
        }

        #btnIniciar:hover { background: #00ffff; color: #000; box-shadow: 0 0 50px #00ffff; }

        .char-label { font-weight: bold; text-transform: uppercase; margin-bottom: 8px; font-size: 1.1rem; }
        #subtitle { font-size: 1.2rem; line-height: 1.4; color: #fff; }
    </style>
</head>
<body>

    <button id="btnIniciar">INICIAR SEQUÊNCIA DE PARTIDA</button>
    <canvas id="starfield"></canvas>

    <div class="cockpit-overlay">
        <div class="hud-top">
            <div class="status-box">
                VELOCIDADE: <span id="vel">11.18</span> km/s<br>
                DISTÂNCIA TERRA: <span id="dist">384.400</span> km
            </div>
            <div class="status-box">
                TRAJETÓRIA: INJEÇÃO TRANS-MARCIANA<br>
                SISTEMA: OPERACIONAL (AISA v.4.2)
            </div>
        </div>
        <div class="hud-bottom">
            <div id="char-name" class="char-label"></div>
            <div id="subtitle">Aguardando inicialização dos sistemas de áudio...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnIniciar');
        const subtitle = document.getElementById('subtitle');
        const charLabel = document.getElementById('char-name');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];
        let speed = 0.4;
        let voices = [];

        // Inicialização de vozes
        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
        }
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Estrelas 3D
        for(let i=0; i<1000; i++) {
            stars.push({
                x: Math.random() * canvas.width - canvas.width/2,
                y: Math.random() * canvas.height - canvas.height/2,
                z: Math.random() * canvas.width
            });
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.translate(canvas.width/2, canvas.height/2);

            stars.forEach(s => {
                s.z -= speed;
                if(s.z <= 0) s.z = canvas.width;
                let sx = (s.x / s.z) * canvas.width;
                let sy = (s.y / s.z) * canvas.height;
                let r = (1 - s.z / canvas.width) * 2;
                ctx.beginPath();
                ctx.fillStyle = "rgba(255, 255, 255, " + (1 - s.z/canvas.width) + ")";
                ctx.arc(sx, sy, r, 0, Math.PI*2);
                ctx.fill();
            });

            ctx.setTransform(1,0,0,1,0,0);
            requestAnimationFrame(draw);
        }
        draw();

        // Roteiro Científico
        const missionScript = [
            { 
                time: 1, char: "AISA", 
                audio: "Commander, trans-mars injection burn complete. Escape velocity verified at eleven point two kilometers per second.",
                translation: "Comandante, queima de inserção trans-marciana concluída. Velocidade de escape verificada em 11.2 km/s."
            },
            { 
                time: 10, char: "CONTROL", 
                audio: "Alpha, this is Houston Starbase. Telemetry confirms your trajectory. You are officially leaving Earth's hill sphere.",
                translation: "Alpha, aqui é a Base Houston. A telemetria confirma sua trajetória. Vocês estão oficialmente deixando a esfera de influência da Terra."
            },
            { 
                time: 20, char: "AISA", 
                audio: "Fuel consumption report: twelve hundred tons of liquid methane and oxygen. Mass ratios are optimal for the long cruise phase.",
                translation: "Relatório de combustível: 1.200 toneladas de metano líquido e oxigênio. A proporção de massa está ideal para a fase de cruzeiro."
            },
            { 
                time: 32, char: "CONTROL", 
                audio: "Copy that, Alpha. The booster has successfully landed on the drone ship. Enjoy the silent flight. Houston out.",
                translation: "Copiado, Alpha. O propulsor pousou com sucesso na balsa. Aproveitem o voo silencioso. Houston encerrando."
            },
            { 
                time: 45, char: "AISA", 
                audio: "We are now four hundred thousand kilometers from Earth. Lunar orbit distance exceeded. Transitioning to deep space protocol.",
                translation: "Estamos agora a 400.000 quilômetros da Terra. Distância da órbita lunar superada. Transicionando para o protocolo de espaço profundo."
            },
            { 
                time: 58, char: "AISA", 
                audio: "Infrared readings show engine bell cooling is steady. Thermal radiation is being dissipated as planned.",
                translation: "Leituras infravermelhas mostram que o resfriamento da campânula do motor está estável. A radiação térmica está sendo dissipada como planejado."
            }
                    // --- CONTINUAÇÃO DO BLOCO DE CRUZEIRO (DENSIDADE ALTA) ---
        { 
            time: 100, char: "AISA", 
            audio: "External radiation sensors reporting zero point four millisieverts. Activating secondary shielding for the biological storage unit.",
            translation: "Sensores de radiação externa relatando 0.4 milisieverts. Ativando blindagem secundária para a unidade de armazenamento biológico."
        },
        { 
            time: 160, char: "CONTROL", 
            audio: "Alpha, Houston. We need a manual recalibration of the star tracker. Confirm when the Orion constellation is centered in your secondary lens.",
            translation: "Alpha, aqui é Houston. Precisamos de uma recalibragem manual do rastreador de estrelas. Confirme quando a constelação de Órion estiver centrada."
        },
        { 
            time: 220, char: "AISA", 
            audio: "Recalibration complete. Navigation computer is now synced with the Deep Space Network. Precision is within three centimeters.",
            translation: "Recalibragem concluída. O computador de navegação está sincronizado com a Rede de Espaço Profundo. Precisão de 3 centímetros."
        },
        { 
            time: 280, char: "AISA", 
            audio: "Initiating daily hydroponics check. Nutrient levels in the lettuce and radish modules are stable. Growth rate is consistent with Earth baseline.",
            translation: "Iniciando checagem diária de hidroponia. Níveis de nutrientes nos módulos de alface e rabanete estão estáveis. Taxa de crescimento nominal."
        },
        { 
            time: 340, char: "CONTROL", 
            audio: "Alpha, we are receiving your biometric data. Heart rate is slightly elevated. Drink four hundred milliliters of electrolyte solution.",
            translation: "Alpha, estamos recebendo seus dados biométricos. Frequência cardíaca levemente elevada. Beba 400 ml de solução eletrolítica."
        },
        { 
            time: 400, char: "AISA", 
            audio: "Internal pressure update: Nitrogen levels at seventy-eight percent. Maintaining standard sea-level atmosphere simulation.",
            translation: "Atualização de pressão interna: Níveis de nitrogênio em 78%. Mantendo simulação de atmosfera padrão ao nível do mar."
        },
        { 
            time: 460, char: "AISA", 
            audio: "Checking hull integrity. Micro-meteoroid shield reports no impacts in the last twenty-four hours. Vacuum seal is perfect.",
            translation: "Verificando integridade do casco. O escudo contra micrometeoroides não relata impactos nas últimas 24 horas. Selo de vácuo perfeito."
        },
        { 
            time: 520, char: "CONTROL", 
            audio: "Alpha, signal delay is now reaching ninety seconds. Switching to packet-based data bursts. Next high-gain window in two hours.",
            translation: "Alpha, o atraso de sinal está atingindo 90 segundos. Mudando para rajadas de dados em pacotes. Próxima janela de ganho em 2 horas."
        },
        { 
            time: 600, char: "AISA", 
            audio: "The Sabatier reactor test run was successful. We can now confirm that methane production on the Martian surface is theoretically viable.",
            translation: "O teste do reator Sabatier foi um sucesso. Podemos confirmar que a produção de metano na superfície marciana é teoricamente viável."
        },
        { 
            time: 680, char: "AISA", 
            audio: "Thermal management system status: Radiators are dissipating excess heat from the nuclear thermal generator. Core temperature is nominal.",
            translation: "Status do sistema térmico: Os radiadores estão dissipando o excesso de calor do gerador térmico nuclear. Temperatura do núcleo nominal."
        },
        { 
            time: 760, char: "CONTROL", 
            audio: "Alpha, please verify the status of the emergency EVA suits. We need the oxygen seals checked before the next sleep cycle.",
            translation: "Alpha, verifique o status dos trajes de emergência para atividade extraveicular. Precisamos selos de oxigênio checados."
        },
        { 
            time: 840, char: "AISA", 
            audio: "Bio-hazard sensors clear. Air filtration system has removed ninety-nine percent of suspended particles. Cabin air quality is premium.",
            translation: "Sensores de risco biológico limpos. O sistema de filtragem de ar removeu 99% das partículas suspensas. Qualidade do ar excelente."
        },
        { 
            time: 920, char: "AISA", 
            audio: "Warning: Solar flare detected on the Eastern limb of the Sun. Moving all non-essential systems to surge protection mode.",
            translation: "Aviso: Erupção solar detectada no limbo leste do Sol. Movendo sistemas não essenciais para o modo de proteção contra surtos."
        },
        { 
            time: 1000, char: "CONTROL", 
            audio: "Alpha, stay in the shielded corridor for the next sixty minutes. We are monitoring the proton flux. Do not initiate any external maneuvers.",
            translation: "Alpha, permaneça no corredor blindado pelos próximos 60 minutos. Estamos monitorando o fluxo de prótons. Não inicie manobras externas."
        },
        { 
            time: 1100, char: "AISA", 
            audio: "Proton flux has peaked. Radiation levels are returning to cruise baseline. Resuming standard operations.",
            translation: "O fluxo de prótons atingiu o pico. Os níveis de radiação estão retornando à base de cruzeiro. Retomando operações padrão."
        },
        { 
            time: 1200, char: "AISA", 
            audio: "Distance from Earth: ten million kilometers. We have officially entered the deep space cruise phase. Earth is now a pale blue light.",
            translation: "Distância da Terra: 10 milhões de quilômetros. Entramos oficialmente na fase de cruzeiro espacial profundo. A Terra é uma luz azul pálida."
        }
        // Repita a lógica de tempo aumentando de 60 em 60 até 3600.

        ];

        function speak(character, text, subtitleText) {
            const msg = new SpeechSynthesisUtterance(text);
            
            // Força a voz para Inglês Americano ou Britânico
            const engVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.includes('en'));
            if(engVoice) msg.voice = engVoice;
            
            msg.lang = 'en-US';
            
            if(character === "AISA") {
                msg.pitch = 1.3; msg.rate = 1.05;
                charLabel.style.color = "#00ffff";
                charLabel.innerText = "AISA (I.A. de Bordo):";
            } else {
                msg.pitch = 0.8; msg.rate = 0.9;
                charLabel.style.color = "#ffaa00";
                charLabel.innerText = "CONTROLE DE MISSÃO:";
            }

            subtitle.innerText = subtitleText;
            window.speechSynthesis.speak(msg);
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            speed = 7; // Efeito de aceleração visual
            
            missionScript.forEach(step => {
                setTimeout(() => {
                    speak(step.char, step.audio, step.translation);
                }, step.time * 1000);
            });

            // Simulador de Telemetria (Atualiza a cada 100ms para realismo)
            setInterval(() => {
                let v = (11.18 + Math.random() * 0.02).toFixed(2);
                let dStr = document.getElementById('dist').innerText.replace(/\./g, '');
                let d = (parseInt(dStr) + 24).toLocaleString('pt-BR');
                document.getElementById('vel').innerText = v;
                document.getElementById('dist').innerText = d;
            }, 100);
        });
    </script>
</body>
</html>
