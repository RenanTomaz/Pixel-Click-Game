<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ares-1: Missão Marte (External Data)</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .cockpit-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; border: 40px solid #1a1a1a; border-image: linear-gradient(to bottom, #333, #111, #333) 1; box-shadow: inset 0 0 200px rgba(0, 255, 255, 0.15); }
        .hud-top { display: flex; justify-content: space-between; padding: 40px; color: #00ffff; text-shadow: 0 0 8px #00ffff; z-index: 20; }
        .hud-bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: rgba(0, 15, 25, 0.95); border-top: 2px solid #00ffff; color: #00ffff; min-height: 150px; text-align: center; display: flex; flex-direction: column; justify-content: center; backdrop-filter: blur(10px); z-index: 20; }
        .status-box { border: 2px solid #00ffff; padding: 15px; background: rgba(0, 255, 255, 0.08); }
        #btnIniciar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 25px 50px; background: #000; color: #00ffff; border: 2px solid #00ffff; font-size: 1.5rem; cursor: pointer; pointer-events: auto; z-index: 100; letter-spacing: 2px; }
        #btnIniciar:disabled { opacity: 0.5; cursor: not-allowed; }
        .char-label { font-weight: bold; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 2px; }
        #subtitle { font-size: 1.3rem; color: #fff; line-height: 1.4; }
    </style>
</head>
<body>

    <button id="btnIniciar">CARREGANDO ROTEIRO...</button>
    <canvas id="starfield"></canvas>

    <div class="cockpit-overlay">
        <div class="hud-top">
            <div class="status-box">
                VELOCIDADE: <span id="vel">0.00</span> km/s<br>
                DISTÂNCIA: <span id="dist">0</span> km
            </div>
            <div class="status-box">
                FASE: <span id="mission-phase">LOAD</span><br>
                STATUS: <span id="sync-status">OFFLINE</span>
            </div>
        </div>
        <div class="hud-bottom">
            <div id="char-name" class="char-label"></div>
            <div id="subtitle">SINCRONIZANDO COM DATA-CENTER TERRESTRE...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnIniciar');
        const subtitle = document.getElementById('subtitle');
        const charLabel = document.getElementById('char-name');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let stars = [], speed = 0.2, voices = [], missionScript = [];

        function loadVoices() { voices = window.speechSynthesis.getVoices(); }
        loadVoices();
        window.speechSynthesis.onvoiceschanged = loadVoices;

        // Carregar Roteiro Externo
        async function fetchScript() {
            try {
                const response = await fetch('roteiro.json');
                missionScript = await response.json();
                btn.innerText = "INICIAR MISSÃO";
                btn.disabled = false;
                subtitle.innerText = "SISTEMAS PRONTOS. AGUARDANDO COMANDO.";
            } catch (e) {
                btn.innerText = "ERRO DE CARREGAMENTO";
                subtitle.innerText = "FALHA AO ACESSAR ROTEIRO.JSON.";
            }
        }
        fetchScript();

        for(let i=0; i<1000; i++) {
            stars.push({ x: Math.random()*canvas.width - canvas.width/2, y: Math.random()*canvas.height - canvas.height/2, z: Math.random()*canvas.width });
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.translate(canvas.width/2, canvas.height/2);
            stars.forEach(s => {
                s.z -= speed; if(s.z <= 0) s.z = canvas.width;
                let sx = (s.x / s.z) * canvas.width, sy = (s.y / s.z) * canvas.height, r = (1 - s.z / canvas.width) * 2.5;
                ctx.beginPath(); ctx.fillStyle = "rgba(200, 255, 255, " + (1 - s.z/canvas.width) + ")";
                ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
            });
            ctx.setTransform(1,0,0,1,0,0); requestAnimationFrame(draw);
        }
        draw();

        function speak(step) {
            const msg = new SpeechSynthesisUtterance(step.audio);
            if (step.char === "NARRATOR") {
                msg.voice = voices.find(v => v.lang.startsWith('pt')) || voices[0];
                msg.lang = 'pt-BR'; msg.rate = 0.95;
            } else {
                msg.voice = voices.find(v => v.lang.startsWith('en')) || voices[0];
                msg.lang = 'en-US'; 
                msg.pitch = step.char === "AISA" ? 1.3 : 0.8;
                msg.rate = step.char === "AISA" ? 1.1 : 0.85;
            }
            msg.onstart = () => {
                charLabel.innerText = `> ${step.char}:`;
                charLabel.style.color = step.char === "AISA" ? "#00ffff" : (step.char === "CONTROL" ? "#ffaa00" : "#fff");
                subtitle.innerText = step.translation;
                document.getElementById('mission-phase').innerText = step.phase;
                document.getElementById('sync-status').innerText = "LIVE LINK";
            };
            window.speechSynthesis.speak(msg);
        }

        btn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            btn.style.display = 'none';
            const startTime = Date.now();
            missionScript.forEach(step => setTimeout(() => speak(step), step.time * 1000));

            setInterval(() => {
                const elapsedSec = (Date.now() - startTime) / 1000;
                let current = missionScript[0];
                for (let s of missionScript) { if (elapsedSec >= s.time) current = s; }
                document.getElementById('vel').innerText = (current.vel + (Math.random() * 0.05)).toFixed(2);
                document.getElementById('dist').innerText = Math.floor(current.dist + (current.vel * (elapsedSec - current.time))).toLocaleString('pt-BR');
                speed = current.vel / 2.5;
            }, 100);
        });
    </script>
</body>
</html>
