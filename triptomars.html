<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ares-1 | Sistema de Navegação POV</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ffaa00;
            --bg-glass: rgba(0, 15, 25, 0.85);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        .cockpit-frame {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
            background: 
                radial-gradient(circle at 50% 50%, transparent 60%, rgba(0,0,0,0.8) 100%),
                linear-gradient(to bottom, #1a1a1a 40px, transparent 40px),
                linear-gradient(to top, #1a1a1a 150px, transparent 150px);
            box-shadow: inset 0 0 300px rgba(0, 0, 0, 0.9);
        }

        .telemetry-grid {
            position: absolute; top: 50px; left: 50px; right: 50px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
            z-index: 20;
        }

        .data-node {
            background: var(--bg-glass);
            border-left: 4px solid var(--primary);
            padding: 15px; backdrop-filter: blur(10px);
            box-shadow: var(--border-glow);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 95% 100%, 0 100%);
        }

        .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--primary); opacity: 0.8; }
        .value { font-size: 1.4rem; font-weight: bold; font-family: monospace; }

        .dialogue-center {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 900px; min-height: 120px;
            background: var(--bg-glass); border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 25px; text-align: center; z-index: 20;
            border-radius: 5px; backdrop-filter: blur(15px);
        }

        #char-name { font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 10px; color: var(--primary); }
        #subtitle { font-size: 1.1rem; line-height: 1.5; color: #eee; }

        #btnIniciar {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 25px 50px; background: #000; color: var(--primary);
            border: 2px solid var(--primary); font-size: 1.2rem; cursor: pointer;
            z-index: 100; letter-spacing: 5px; transition: 0.3s;
        }
        #btnIniciar:hover { background: var(--primary); color: #000; box-shadow: 0 0 40px var(--primary); }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.05);
            position: absolute; top: 0; z-index: 30;
            animation: scan 10s linear infinite; pointer-events: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <div class="scanline"></div>
    <button id="btnIniciar">INICIALIZAR SISTEMAS</button>
    <canvas id="starfield"></canvas>

    <div class="cockpit-frame">
        <div class="telemetry-grid">
            <div class="data-node">
                <div class="label">VELOCIDADE</div>
                <div class="value"><span id="vel">0.00</span> KM/S</div>
            </div>
            <div class="data-node">
                <div class="label">FASE ATUAL</div>
                <div class="value" id="mission-phase">STANDBY</div>
            </div>
            <div class="data-node">
                <div class="label">DISTÂNCIA</div>
                <div class="value"><span id="dist">0</span> KM</div>
            </div>
        </div>

        <div class="dialogue-center">
            <div id="char-name">SISTEMA</div>
            <div id="subtitle">AGUARDANDO COMANDO DE IGNICÃO...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnIniciar');
        const subtitle = document.getElementById('subtitle');
        const charLabel = document.getElementById('char-name');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let stars = [], speed = 0.2, voices = [], missionScript = [];

        // FALLBACK: Caso o arquivo JSON não carregue
        const fallbackScript = [
            {"time": 1, "char": "AISA", "vel": 11.2, "dist": 384400, "phase": "ERROR-SAFE-MODE", "audio": "Critical Error. JSON not found. Fallback engaged.", "translation": "Erro Crítico. JSON não encontrado. Modo de segurança ativado."}
        ];

        // Carregar Vozes
        function loadVoices() { 
            voices = window.speechSynthesis.getVoices(); 
        }
        loadVoices();
        window.speechSynthesis.onvoiceschanged = loadVoices;

        // Gerar Estrelas
        for(let i=0; i<1000; i++) {
            stars.push({ x: Math.random()*canvas.width - canvas.width/2, y: Math.random()*canvas.height - canvas.height/2, z: Math.random()*canvas.width });
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.translate(canvas.width/2, canvas.height/2);
            stars.forEach(s => {
                s.z -= speed; if(s.z <= 0) s.z = canvas.width;
                let sx = (s.x / s.z) * canvas.width, sy = (s.y / s.z) * canvas.height;
                let r = (1 - s.z / canvas.width) * 2.5;
                ctx.beginPath(); ctx.fillStyle = `rgba(180, 255, 255, ${1 - s.z/canvas.width})`;
                ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
            });
            ctx.setTransform(1,0,0,1,0,0); requestAnimationFrame(draw);
        }
        draw();

        function speak(step) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(step.audio);
            
            if (step.char === "NARRATOR") {
                msg.voice = voices.find(v => v.lang.includes('pt')) || voices[0];
                msg.lang = 'pt-BR'; 
            } else {
                msg.voice = voices.find(v => v.lang.includes('en')) || voices[0];
                msg.lang = 'en-US'; 
                msg.pitch = step.char === "AISA" ? 1.2 : 0.8;
            }

            msg.onstart = () => {
                charLabel.innerText = `COMMS // ${step.char}`;
                charLabel.style.color = step.char === "AISA" ? "#00f2ff" : (step.char === "CONTROL" ? "#ffaa00" : "#fff");
                subtitle.innerText = step.translation;
                document.getElementById('mission-phase').innerText = step.phase;
            };
            window.speechSynthesis.speak(msg);
        }

        // Lógica principal de inicialização
        btn.addEventListener('click', async () => {
            btn.innerText = "SINCRONIZANDO...";
            
            try {
                const response = await fetch('roteiro.json');
                if (!response.ok) throw new Error("CORS_OR_NOT_FOUND");
                missionScript = await response.json();
                console.log("Roteiro carregado com sucesso!");
            } catch (e) {
                console.error("Falha ao carregar JSON:", e);
                missionScript = fallbackScript;
                alert("Atenção: O arquivo roteiro.json não pôde ser lido. Certifique-se de estar usando um servidor local (Live Server) ou que o arquivo esteja na mesma pasta.");
            }

            btn.style.display = 'none';
            const startTime = Date.now();
            
            // Agendar as falas
            missionScript.forEach(step => {
                setTimeout(() => speak(step), step.time * 1000);
            });

            // Atualização da Telemetria em tempo real
            setInterval(() => {
                const elapsedSec = (Date.now() - startTime) / 1000;
                
                // Busca o estado atual no roteiro
                let current = missionScript[0];
                for (let s of missionScript) { 
                    if (elapsedSec >= s.time) current = s; 
                }
                
                // Update UI
                document.getElementById('vel').innerText = current.vel.toFixed(2);
                document.getElementById('dist').innerText = Math.floor(current.dist + (current.vel * (elapsedSec - current.time))).toLocaleString('pt-BR');
                
                // Estrelas reagem à velocidade (vel 15000 / 5000 = speed 3)
                speed = Math.max(0.2, current.vel / 5000); 
            }, 100);
        });
    </script>
</body>
</html>
