<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Ares-1: Partida</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background: #000; font-family: 'Courier New', monospace;
        }

        canvas { display: block; }

        /* Interface POV do Cockpit */
        .cockpit-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            border: 30px solid #1a1a1a;
            box-shadow: inset 0 0 150px rgba(0, 255, 255, 0.1);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .hud-top {
            display: flex; justify-content: space-between;
            padding: 40px; color: #00ffff; text-shadow: 0 0 10px #00ffff;
        }

        .hud-bottom {
            padding: 40px; background: rgba(0, 0, 0, 0.7);
            border-top: 1px solid #00ffff; color: #00ffff;
            min-height: 80px; text-align: center;
        }

        .status-box { border: 1px solid #00ffff; padding: 10px; background: rgba(0, 255, 255, 0.05); }

        #btnIniciar {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px; background: transparent;
            color: #00ffff; border: 2px solid #00ffff;
            font-size: 1.5rem; cursor: pointer; pointer-events: auto;
            z-index: 10; transition: 0.3s;
        }

        #btnIniciar:hover { background: #00ffff; color: #000; box-shadow: 0 0 30px #00ffff; }

        .char-label { font-weight: bold; text-transform: uppercase; margin-right: 10px; }
    </style>
</head>
<body>

    <button id="btnIniciar">INICIAR SEQUÊNCIA DE PARTIDA</button>
    <canvas id="starfield"></canvas>

    <div class="cockpit-overlay">
        <div class="hud-top">
            <div class="status-box">
                VELOCIDADE: <span id="vel">11.20</span> km/s<br>
                DISTÂNCIA TERRA: <span id="dist">384.400</span> km
            </div>
            <div class="status-box">
                SISTEMA: OPERACIONAL<br>
                SETOR: INJEÇÃO TRANS-MARCIANA
            </div>
        </div>
        <div class="hud-bottom">
            <div id="char-name" class="char-label"></div>
            <div id="subtitle">Aguardando autorização do comando...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnIniciar');
        const subtitle = document.getElementById('subtitle');
        const charLabel = document.getElementById('char-name');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];
        let speed = 0.5;

        for(let i=0; i<800; i++) {
            stars.push({
                x: Math.random() * canvas.width - canvas.width/2,
                y: Math.random() * canvas.height - canvas.height/2,
                z: Math.random() * canvas.width
            });
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.translate(canvas.width/2, canvas.height/2);

            stars.forEach(s => {
                s.z -= speed;
                if(s.z <= 0) s.z = canvas.width;
                let sx = (s.x / s.z) * canvas.width;
                let sy = (s.y / s.z) * canvas.height;
                let r = (1 - s.z / canvas.width) * 2;
                ctx.beginPath();
                ctx.fillStyle = "white";
                ctx.arc(sx, sy, r, 0, Math.PI*2);
                ctx.fill();
            });

            ctx.setTransform(1,0,0,1,0,0);
            requestAnimationFrame(draw);
        }
        draw();

        // Roteiro com Áudio em Inglês e Legenda em Português
        const missionScript = [
            { 
                time: 0, 
                char: "AISA", 
                audio: "Commander, trans-mars injection burn complete. Departure velocity set at eleven point two kilometers per second.",
                translation: "Comandante, queima de inserção trans-marciana concluída. Velocidade de partida definida em 11.2 km/s."
            },
            { 
                time: 8, 
                char: "CONTROL", 
                audio: "Alpha, this is Starbase. Ground radars confirm your trajectory. You are officially on your way to the red planet.",
                translation: "Alpha, aqui é a Base Estelar. Os radares de solo confirmam sua trajetória. Vocês estão oficialmente a caminho do planeta vermelho."
            },
            { 
                time: 18, 
                char: "AISA", 
                audio: "Propellant report: twelve hundred tons of methalox consumed. Current ship mass is within expected parameters.",
                translation: "Relatório de propelente: 1.200 toneladas de metalox consumidas. Massa atual da nave dentro dos parâmetros esperados."
            },
            { 
                time: 28, 
                char: "CONTROL", 
                audio: "Copy that, Alpha. Telemetry shows the first stage has already begun its return to base. Clear skies ahead.",
                translation: "Copiado, Alpha. A telemetria mostra que o primeiro estágio já iniciou o retorno para a base. Céu limpo à frente."
            },
            { 
                time: 40, 
                char: "AISA", 
                audio: "Attention. We are crossing the four hundred thousand kilometer mark. Earth's moon is now behind us.",
                translation: "Atenção. Estamos cruzando a marca de 400.000 quilômetros. A Lua da Terra ficou para trás."
            },
            { 
                time: 50, 
                char: "CONTROL", 
                audio: "Alpha, enjoy the view while Earth is still visible. Soon, it will be just a pale blue dot in the void.",
                translation: "Alpha, aproveite a vista enquanto a Terra ainda é visível. Em breve, ela será apenas um ponto azul no vácuo."
            },
            { 
                time: 60, 
                char: "AISA", 
                audio: "Infrared sensors active. Engine cooling is following the predicted thermal curve. No risk of structural deformation.",
                translation: "Sensores infravermelhos ativos. O resfriamento do motor segue a curva térmica prevista. Sem risco de deformação estrutural."
            }
        ];

        function speak(character, text, subtitleText) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; // Áudio em Inglês
            
            if(character === "AISA") {
                msg.pitch = 1.2; msg.rate = 1.0;
                charLabel.style.color = "#00ffff";
                charLabel.innerText = "AISA:";
            } else {
                msg.pitch = 0.8; msg.rate = 0.9;
                charLabel.style.color = "#ffaa00";
                charLabel.innerText = "CONTROLE:";
            }

            subtitle.innerText = subtitleText; // Legenda em Português
            window.speechSynthesis.speak(msg);
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            speed = 5; 
            
            missionScript.forEach(step => {
                setTimeout(() => {
                    speak(step.char, step.audio, step.translation);
                }, step.time * 1000);
            });

            setInterval(() => {
                let v = (11.20 + Math.random() * 0.05).toFixed(2);
                let dStr = document.getElementById('dist').innerText.replace(/\./g, '');
                let d = (parseInt(dStr) + 12).toLocaleString('pt-BR');
                document.getElementById('vel').innerText = v;
                document.getElementById('dist').innerText = d;
            }, 500);
        });
    </script>
</body>
</html>
