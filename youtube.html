<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <title>Pixel Click - Live GEEK, GAMES E CINEMA</title>
    <style>
        :root {
            --color-1: #ff4757; --color-2: #2e86de; --color-3: #2ed573; --color-4: #eccc68;
            --color-accent: #2e86de; --color-title: #ffd700; --correct-glow: #00ff00; 
        }

        body {
            background-color: #000; margin: 0; padding: 0; display: flex;
            justify-content: center; align-items: center; height: 100vh;
            width: 100vw; overflow: hidden; font-family: 'Russo One', sans-serif;
        }

        #video-canvas {
            width: 90vw; height: 50.625vw; max-height: 85vh; max-width: 151vh;
            position: relative; background-image: url('backgroundgeek.png');
            background-size: 100% 100%; background-repeat: no-repeat;
            background-position: center; display: flex; flex-direction: column;
            align-items: center; box-sizing: border-box; padding: 4vh 10vh;
            border: 1px solid #333; overflow: hidden;
        }

        .fixed-title {
            font-size: 4.5vh; text-transform: uppercase; letter-spacing: 0.2vh;
            color: var(--color-title); text-shadow: 0 0 1vh rgba(255, 215, 0, 0.6), 0.3vh 0.3vh 0.3vh rgba(0, 0, 0, 0.8);
            width: 100%; z-index: 5; margin-top: 2vh; margin-bottom: 2vh;
            position: relative; text-align: center;
        }

        .question-text {
            font-size: 3vh; height: 12vh; display: flex; align-items: center;
            justify-content: center; text-transform: uppercase; text-shadow: 0.3vh 0.3vh 0px #000;
            margin-bottom: 1.5vh; color: white; line-height: 1.2; z-index: 2;
            text-align: center; width: 100%;
        }

        #timer-container {
            width: 80%; height: 1.6vh; background: rgba(255,255,255,0.1);
            border-radius: 1vh; overflow: hidden; border: 0.2vh solid rgba(255,255,255,0.2);
            z-index: 2; flex-shrink: 0; margin: 1vh 0 3vh 0;
        }

        #timer-bar { width: 100%; height: 100%; background: var(--color-3); transform-origin: center left; }

        .options-list {
            width: 100%; display: grid; grid-template-columns: 1fr 1fr;
            gap: 2vh; flex-grow: 1; align-content: center; z-index: 2;
        }

        .option {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(1vh);
            border: 0.3vh solid rgba(255, 255, 255, 0.2); padding: 2.5vh 2vh;
            border-radius: 1.5vh; font-size: 2.2vh; text-transform: uppercase;
            color: white; display: flex; align-items: center; justify-content: center;
            text-align: center; width: 100%; box-sizing: border-box;
        }

        .highlight-correct {
            border-color: var(--correct-glow) !important;
            background: var(--correct-glow) !important;
            color: black !important; transform: scale(1.05); z-index: 10;
        }

        .footer-brand {
            width: 35%; background: var(--color-accent); padding: 1vh 0;
            border-radius: 5vh; font-size: 2vh; font-weight: bold;
            color: white; border: 0.3vh solid rgba(255, 255, 255, 0.3);
            margin-top: 3vh; margin-bottom: 2vh; z-index: 2; text-align: center;
        }

        .particle { position: absolute; width: 0.5vh; height: 0.5vh; border-radius: 50%; pointer-events: none; z-index: -1; animation: move-particle 2s linear forwards; }
        @keyframes move-particle { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

<div id="overlay-start" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align: center;">
    <h1 style="color:white; font-size: 5vh; margin-bottom: 4vh;">LIVE GEEK, GAMES E CINEMA</h1>
    <button onclick="iniciarLive()" style="padding: 2.5vh 6vh; font-family:'Russo One', sans-serif; font-size: 3vh; background: var(--color-3); color:black; border:none; border-radius:15px; cursor:pointer;">
        INICIAR TRANSMISSÃO
    </button>
</div>

<div id="video-canvas">
    <div class="fixed-title" id="main-title">QUIZ GEEK, GAMES E CINEMA</div>
    <div class="question-text" id="q-text"></div>
    <div id="timer-container"><div id="timer-bar"></div></div>
    <div class="options-list" id="options-box"></div>
    <div class="footer-brand" id="footer-btn">WWW.PIXELCLICK.FUN</div>
</div>

<script src="geek.js"></script>

<script>
    let liveQueue = []; // Fila de perguntas que ainda não passaram
    let particleIntervals = [];

    const sfx = {
        timer: new Howl({ src: ['timer_tic_tac.mp3'], loop: true, volume: 0.5 }),
        correct: new Howl({ src: ['success.mp3'], volume: 0.8 }),
        transition: new Howl({ src: ['swoosh.mp3'], volume: 0.4 })
    };

    sfx.timer.rate(1.5);
    sfx.transition.rate(1.5);

    function narrar(texto, velocidade = 1.5, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto.toLowerCase());
        msg.lang = 'pt-BR';
        msg.rate = velocidade;

        const vozes = window.speechSynthesis.getVoices();
        const vozMasculina = vozes.find(v => 
            v.lang.includes('pt-BR') && 
            (v.name.includes('Daniel') || v.name.includes('Antonio') || v.name.includes('Guilherme') || v.name.toLowerCase().includes('male'))
        ) || vozes.find(v => v.lang.includes('pt-BR'));

        if (vozMasculina) msg.voice = vozMasculina;
        if (callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    function iniciarLive() {
        document.getElementById('overlay-start').style.display = 'none';
        prepararFila();
        sfx.transition.play();
        proximaPergunta();
    }

    function prepararFila() {
    // Verifica se os dados existem antes de tentar usar
    if (typeof geekData !== 'undefined' && geekData.length > 0) {
        liveQueue = [...geekData].sort(() => Math.random() - 0.5);
        console.log("Fila preparada com " + liveQueue.length + " perguntas.");
    } else {
        console.error("Erro: geekData não foi encontrado ou está vazio!");
        // Opcional: Criar uma pergunta de fallback para a live não ficar preta
        liveQueue = [{q: "Carregando perguntas...", options: ["Aguarde", "Aguarde", "Aguarde", "Aguarde"], correct: 0}];
    }
}

    function proximaPergunta() {
        particleIntervals.forEach(clearInterval);
        particleIntervals = [];

        // Se a fila esvaziar, recarrega e embaralha tudo de novo para a live não parar
        if (liveQueue.length === 0) {
            prepararFila();
        }

        // Remove a primeira pergunta da fila (o que garante que não repita até o deck acabar)
        const data = liveQueue.shift();
        
        const correctText = data.options[data.correct];
        
        // Randomiza a posição das alternativas para evitar vícios na opção 1
        let shuffledOptions = data.options.map(text => ({ text })).sort(() => Math.random() - 0.5);
        const newCorrectIndex = shuffledOptions.findIndex(opt => opt.text === correctText);

        document.getElementById('q-text').innerText = data.q;
        narrar(data.q);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        const colors = ['#ff4757', '#2e86de', '#2ed573', '#eccc68'];

        particleIntervals.push(setInterval(() => spawnParticle(document.getElementById('main-title'), '#ffffff'), 400));

        shuffledOptions.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = `option opt-${i}`;
            div.id = `opt-${i}`;
            div.style.borderColor = colors[i];
            div.innerText = opt.text;
            box.appendChild(div);
            particleIntervals.push(setInterval(() => spawnParticle(div, colors[i]), 250));
        });

        sfx.timer.play();
        runTimer(newCorrectIndex, correctText);
    }

    function runTimer(correctIndex, correctText) {
        const barEl = document.getElementById('timer-bar');
        const startTime = Date.now();
        const duration = 8000;

        function update() {
            const elapsed = Date.now() - startTime;
            const percent = Math.max(0, 100 - (elapsed / duration * 100));
            barEl.style.width = percent + "%";

            if (percent > 60) barEl.style.backgroundColor = "#2ed573";
            else if (percent > 30) barEl.style.backgroundColor = "#eccc68";
            else barEl.style.backgroundColor = "#ff4757";

            if (elapsed < duration) {
                requestAnimationFrame(update);
            } else {
                sfx.timer.stop(); 
                sfx.correct.play(); 
                document.getElementById(`opt-${correctIndex}`).classList.add('highlight-correct');
                
                setTimeout(() => {
                    narrar(correctText, 1.4, () => {
                        setTimeout(() => {
                            proximaPergunta();
                        }, 1200); // Pausa leve para o público absorver a resposta
                    });
                }, 200);
            }
        }
        update();
    }

    function spawnParticle(parent, color) {
        if (!parent) return;
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.backgroundColor = color;
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        const range = window.innerHeight * 0.08;
        p.style.setProperty('--mx', (Math.random() - 0.5) * range + 'px');
        p.style.setProperty('--my', (Math.random() - 0.5) * range + 'px');
        parent.appendChild(p);
        setTimeout(() => p.remove(), 2000);
    }
    
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>
</body>
</html>
