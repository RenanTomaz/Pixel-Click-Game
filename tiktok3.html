<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Russo+One&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Caderno Realista - Pilha Dinâmica</title>
    <style>
        :root {
            --paper-color: #fdfdfd;
            --line-color: #d1e4f9;
            --margin-color: #ffadb0;
            --ink-color: #1a2a6c;
            --wood-brown: #3d2b1f; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background: var(--wood-brown);
            /* Textura de mesa de madeira */
            background-image: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        #notebook-container {
            width: 90vw;
            height: 85vh;
            max-width: 420px;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Folha Base (estática por baixo para dar volume) */
        .page-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #eee;
            border-radius: 5px 15px 15px 5px;
            transform: translate(4px, 4px);
            z-index: 0;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper-color);
            background-image: 
                linear-gradient(90deg, transparent 39px, var(--margin-color) 39px, var(--margin-color) 41px, transparent 41px),
                linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 3.2vh;
            background-position: 0 0, 0 5vh;
            border-radius: 5px 15px 15px 5px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            padding: 6vh 8% 4vh 18%;
            display: flex;
            flex-direction: column;
            transform-origin: left center;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden;
        }

        /* A folha virando */
        .page.flipped {
            transform: rotateY(-130deg);
            pointer-events: none;
        }

        .question-text {
            font-family: 'Caveat', cursive;
            color: var(--ink-color);
            font-size: 3.4vh;
            line-height: 1.2;
            margin-top: 2vh;
            margin-bottom: 2vh;
            min-height: 18vh;
            white-space: pre-wrap;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
            margin-top: auto;
            margin-bottom: 5vh;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .options-visible { opacity: 1; }

        .option {
            font-family: 'Caveat', cursive;
            font-size: 2.6vh;
            color: #333;
            padding: 0.8vh;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
            position: relative;
        }

        .option.correct::before { content: "✓"; position: absolute; left: -35px; color: #2ecc71; font-size: 4vh; }
        .option.wrong::before { content: "✗"; position: absolute; left: -35px; color: #e74c3c; font-size: 4vh; }

        .timer-container { width: 100%; height: 3px; background: rgba(0,0,0,0.05); margin-bottom: 2vh; }
        .timer-bar { width: 100%; height: 100%; background: var(--ink-color); }

        #overlay-start {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .btn-play {
            margin-top: 20px; padding: 15px 50px; font-family: 'Russo One';
            font-size: 3vh; background: #fff; color: #000; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="overlay-start">
    <h1 style="font-family: 'Caveat'; font-size: 6vh;">Meu Caderno</h1>
    <button class="btn-play" onclick="iniciarQuiz()">ESTUDAR</button>
</div>

<div id="notebook-container">
    <div class="page-shadow"></div>
</div>

<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    const masterPool = [
        ...(typeof esportesData !== 'undefined' ? esportesData : []),
        ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
        ...(typeof historiaData !== 'undefined' ? historiaData : []),
        ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
        ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
        ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
    ];

    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;

    const sfx = {
        flip: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3'] }),
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-2101.mp3'], volume: 0.4, loop: true }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3'] })
    };

    function iniciarQuiz() {
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        document.getElementById('overlay-start').style.display = 'none';
        
        // Pré-carrega a primeira e a segunda página
        renderizarPagina(0);
        if (selectedQuestions.length > 1) renderizarPagina(1);
    }

    function renderizarPagina(index) {
        if (index >= TOTAL_Q || document.getElementById(`page-${index}`)) return;

        const data = selectedQuestions[index];
        const container = document.getElementById('notebook-container');

        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${index}`;
        // Z-index decrescente para que a página 0 fique no topo
        page.style.zIndex = TOTAL_Q - index;

        page.innerHTML = `
            <div style="font-size: 1.5vh; color: #aaa; text-align: right;">Pág. ${index + 1}</div>
            <div class="question-text" id="q-text-${index}"></div>
            <div class="timer-container"><div class="timer-bar" id="bar-${index}"></div></div>
            <div class="options-list" id="options-${index}">
                ${data.options.map((opt, i) => `
                    <div class="option" onclick="validar(this, ${i}, ${data.correct})">${opt}</div>
                `).join('')}
            </div>
        `;

        container.appendChild(page);

        // Só inicia a escrita se for a página atual
        if (index === currentQ) {
            prepararEscrita(index, data);
        }
    }

    async function prepararEscrita(index, data) {
        await typeWriter(`q-text-${index}`, data.q);
        document.getElementById(`options-${index}`).classList.add('options-visible');
        iniciarTimer(index, data.correct);
    }

    function typeWriter(elementId, text) {
        return new Promise((resolve) => {
            let i = 0;
            const element = document.getElementById(elementId);
            sfx.write.play();
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 50);
                } else {
                    sfx.write.stop();
                    resolve();
                }
            }
            type();
        });
    }

    function iniciarTimer(id, correctIdx) {
        const bar = document.getElementById(`bar-${id}`);
        let width = 100;
        const timer = setInterval(() => {
            width -= 0.6;
            bar.style.width = width + '%';
            if (width <= 0) {
                clearInterval(timer);
                finalizarPergunta(correctIdx);
            }
        }, 50);
        bar.dataset.timerId = timer;
    }

    function validar(el, escolhido, correto) {
        const bar = document.getElementById(`bar-${currentQ}`);
        if (bar) clearInterval(parseInt(bar.dataset.timerId));
        finalizarPergunta(correto);
    }

    function finalizarPergunta(corretoIdx) {
        const parent = document.getElementById(`options-${currentQ}`);
        if (!parent || parent.dataset.locked) return;
        parent.dataset.locked = "true";

        const options = parent.querySelectorAll('.option');
        options.forEach((opt, i) => {
            if (i === corretoIdx) opt.classList.add('correct');
            else opt.classList.add('wrong');
        });

        sfx.correct.play();
        confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });

        setTimeout(() => {
            const pageAtual = document.getElementById(`page-${currentQ}`);
            if (pageAtual) {
                pageAtual.classList.add('flipped');
                sfx.flip.play();
            }
            
            currentQ++;
            
            // Renderiza a "página depois da próxima" para manter sempre uma folha por baixo
            if (currentQ + 1 < TOTAL_Q) {
                renderizarPagina(currentQ + 1);
            }

            // Inicia o processo na página que agora ficou no topo
            if (currentQ < TOTAL_Q) {
                const proxData = selectedQuestions[currentQ];
                prepararEscrita(currentQ, proxData);
            }
        }, 2500);
    }
</script>
</body>
</html>
