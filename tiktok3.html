<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - 9:16 Ultra Neon</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-yellow: #ffff00;
            --neon-green: #00ff00;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Container 9:16 */
        #video-canvas {
            width: 100vw;
            height: 100vh;
            aspect-ratio: 9/16;
            background-size: 400% 400%;
            animation: meshGradient 12s ease infinite;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 2vh 6%;
            overflow: hidden;
        }

        /* Barra de Progresso Superior */
        .progress-header {
            display: flex;
            gap: 1.5vw;
            width: 100%;
            margin-top: 1vh;
            z-index: 10;
        }

        .step {
            flex: 1;
            height: 0.8vh;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .step.active {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* Título Principal */
        .fixed-title {
            font-family: 'Russo One', sans-serif;
            font-size: 3.2vh;
            text-align: center;
            margin: 3vh 0;
            text-transform: uppercase;
            line-height: 1;
            background: linear-gradient(to bottom, #fff 40%, #ccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        /* Container da Pergunta */
        .question-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 2.5vh;
            padding: 3vh 2vh;
            min-height: 20vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .question-text {
            font-size: 3vh;
            font-weight: 900;
            text-align: center;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Timer Minimalista */
        #timer-container {
            width: 100%;
            height: 1.2vh;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 4vh;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            transform-origin: left;
        }

        /* Lista de Opções */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 2vh;
            width: 100%;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255,255,255,0.2);
            padding: 2.2vh;
            border-radius: 2vh;
            font-size: 2.4vh;
            font-weight: 700;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            position: relative;
        }

        .highlight-correct {
            background: var(--neon-green) !important;
            border-color: #fff !important;
            color: #000 !important;
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--neon-green);
            z-index: 5;
        }

        .fade-out { opacity: 0.3 !important; transform: scale(0.95); filter: grayscale(1); }

        /* Rodapé Estilizado */
        .footer-brand {
            margin-top: auto;
            margin-bottom: 2vh;
            padding: 1.8vh;
            background: #fff;
            color: #000;
            border-radius: 50px;
            font-weight: 900;
            font-size: 2vh;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        /* Botão Iniciar Overlay */
        #overlay-start {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3vh;
        }

        .btn-play {
            padding: 2.5vh 8vh;
            font-family: 'Russo One', sans-serif;
            font-size: 4vh;
            background: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px var(--neon-blue);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="overlay-start">
    <div style="font-family:'Russo One'; font-size: 4vh; color: var(--neon-pink); text-align:center; margin-bottom: 2vh;">PIXEL<br>CLICK</div>
    <button class="btn-play" onclick="iniciarQuiz()">JOGAR!</button>
</div>

<div id="video-canvas" id="main-bg">
    <div class="progress-header" id="step-container"></div>
    <div class="fixed-title">QUIZ FLASH</div>
    
    <div class="question-container">
        <div class="question-text" id="q-text">CARREGANDO...</div>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>
    
    <div class="options-list" id="options-box"></div>
    
    <div class="footer-brand">WWW.PIXELCLICK.FUN</div>
</div>

<script>
    /* LÓGICA DE CORES */
    function getRandomNeonColor() {
        const colors = ['#ff00ff', '#00ffff', '#ffff00', '#00ff00', '#ff4757', '#6c5ce7', '#ffa500'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function applyRandomBackground() {
        const c1 = getRandomNeonColor();
        const c2 = getRandomNeonColor();
        const canvas = document.getElementById('video-canvas');
        canvas.style.background = `linear-gradient(-45deg, ${c1}33, #050505, ${c2}33, #050505)`;
        canvas.style.backgroundSize = '400% 400%';
    }

    // Dados Mockados para funcionamento independente (caso os scripts externos falhem)
    const masterPool = [
        {q: "Qual a capital da França?", options: ["Londres", "Berlim", "Paris", "Madrid"], correct: 2},
        {q: "Quanto é 5x5?", options: ["20", "25", "30", "15"], correct: 1},
        {q: "Qual planeta é o vermelho?", options: ["Marte", "Vênus", "Júpiter", "Saturno"], correct: 0},
        {q: "Qual o maior oceano?", options: ["Atlântico", "Índico", "Glacial", "Pacífico"], correct: 3},
        {q: "Quem pintou a Mona Lisa?", options: ["Van Gogh", "Da Vinci", "Picasso", "Monet"], correct: 1},
        {q: "Qual a cor da esmeralda?", options: ["Azul", "Vermelho", "Verde", "Amarelo"], correct: 2},
        {q: "Animal mais rápido?", options: ["Leão", "Guepardo", "Cavalo", "Falcão"], correct: 1},
        {q: "Capital do Japão?", options: ["Seul", "Pequim", "Quioto", "Tóquio"], correct: 3}
    ];

    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;

    const sfx = {
        timer: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-stopwatch-ticking-644.mp3'], loop: true, volume: 0.2 }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3'], volume: 0.5 }),
        transition: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-fast-sword-whoosh-2325.mp3'], volume: 0.4 })
    };

    function createSteps() {
        const container = document.getElementById('step-container');
        container.innerHTML = '';
        for(let i=0; i<TOTAL_Q; i++) {
            const div = document.createElement('div');
            div.className = 'step';
            div.id = `step-${i}`;
            container.appendChild(div);
        }
    }

    function iniciarQuiz() {
        applyRandomBackground();
        document.getElementById('overlay-start').style.display = 'none';
        createSteps();
        startSequence();
    }

    function startSequence() {
        if (currentQ >= TOTAL_Q) {
            document.getElementById('video-canvas').innerHTML = `
                <div style="text-align:center; padding-top:25vh">
                    <div style="font-size:10vh">🏆</div>
                    <h1 style="font-family:'Russo One'; color:var(--neon-yellow); font-size:6vh;">FIM DE JOGO!</h1>
                    <p style="font-size:3vh; font-weight:900">VOCÊ É UM EXPERT!</p>
                    <button onclick="location.reload()" style="margin-top:5vh; padding:2vh 5vh; border-radius:50px; border:none; background:#fff; font-weight:900;">JOGAR NOVO</button>
                </div>`;
            return;
        }

        document.getElementById(`step-${currentQ}`).classList.add('active');
        const data = selectedQuestions[currentQ];
        document.getElementById('q-text').innerText = data.q;
        
        // Narrativa (Opcional - Voz)
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(data.q.toLowerCase());
        msg.lang = 'pt-BR';
        window.speechSynthesis.speak(msg);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        const correctTxt = data.options[data.correct];
        let options = data.options.map(t => ({t})).sort(() => Math.random() - 0.5);
        const correctIdx = options.findIndex(o => o.t === correctTxt);

        options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt.t;
            div.style.animation = `slideIn 0.4s ease forwards ${i * 0.15}s`;
            box.appendChild(div);
        });

        sfx.transition.play();
        setTimeout(() => {
            sfx.timer.play();
            runTimer(correctIdx, correctTxt);
        }, 800);
    }

    function runTimer(correctIdx, text) {
        const bar = document.getElementById('timer-bar');
        const start = Date.now();
        const duration = 6000; // 6 segundos para ser mais dinâmico

        function update() {
            const elapsed = Date.now() - start;
            const p = Math.max(0, 100 - (elapsed / duration * 100));
            bar.style.width = p + "%";

            if (p < 30) bar.style.background = "var(--neon-pink)";
            else bar.style.background = "linear-gradient(90deg, var(--neon-blue), var(--neon-green))";

            if (elapsed < duration) {
                requestAnimationFrame(update);
            } else {
                finishRound(correctIdx, text);
            }
        }
        update();
    }

    function finishRound(idx, text) {
        sfx.timer.stop();
        sfx.correct.play();
        
        confetti({
            particleCount: 150,
            spread: 60,
            origin: { y: 0.7 },
            colors: [getRandomNeonColor(), '#ffffff', '#00ffff']
        });

        const allOpts = document.querySelectorAll('.option');
        allOpts.forEach((el, i) => {
            if(i === idx) el.classList.add('highlight-correct');
            else el.classList.add('fade-out');
        });

        setTimeout(() => {
            currentQ++;
            applyRandomBackground();
            startSequence();
        }, 2800);
    }
</script>
</body>
</html>
