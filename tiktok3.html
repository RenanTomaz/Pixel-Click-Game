<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Caderno Realista Quiz</title>
    <style>
        :root {
            --paper-color: #fcfcfc;
            --line-color: #e0e9f5;
            --margin-color: #ffadb0;
            --ink-color: #1a2a6c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background: #1a1a1a; /* Mesa escura */
            background-image: repeating-linear-gradient(45deg, #151515 0, #151515 1px, transparent 0, transparent 50%);
            background-size: 10px 10px;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
        }

        /* Container do Caderno */
        #notebook-container {
            width: 90vw;
            height: 85vh;
            max-width: 450px;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Folha de Papel */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper-color);
            background-image: 
                linear-gradient(90deg, transparent 39px, var(--margin-color) 39px, var(--margin-color) 41px, transparent 41px),
                linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 3.5vh;
            border-radius: 5px 20px 20px 5px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.3);
            padding: 5vh 10% 5vh 15%;
            display: flex;
            flex-direction: column;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            backface-visibility: hidden;
            z-index: 2;
        }

        /* Animação de virar folha */
        .page.flipped {
            transform: rotateY(-130deg);
            z-index: 1;
        }

        /* Escrita à mão */
        .handwritten {
            font-family: 'Caveat', cursive;
            color: var(--ink-color);
            font-size: 3.8vh;
            line-height: 1.1;
            margin-bottom: 3vh;
            opacity: 0;
        }

        .writing-animation {
            opacity: 1;
            border-right: 3px solid transparent;
            white-space: normal;
            overflow: hidden;
            animation: typing 1.5s steps(40, end);
        }

        @keyframes typing {
            from { max-height: 0; }
            to { max-height: 50vh; }
        }

        /* Opções (Post-its ou botões discretos) */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 2vh;
            margin-top: auto;
        }

        .option {
            background: rgba(0,0,0,0.03);
            border: 1px dashed rgba(0,0,0,0.2);
            padding: 2vh;
            border-radius: 5px;
            font-size: 2.2vh;
            color: #333;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .option.correct {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid green;
            color: green;
            transform: rotate(-2deg);
        }

        .option.wrong {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid red;
            color: red;
            opacity: 0.5;
        }

        /* Timer (como uma linha de carregamento de caneta) */
        #timer-wrap {
            width: 100%;
            height: 4px;
            background: #eee;
            margin: 2vh 0;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--ink-color);
            transition: width 0.1s linear;
        }

        /* Overlay Inicial */
        #start-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
        }
        .btn-pen {
            padding: 20px 40px; font-size: 24px; font-family: 'Russo One';
            background: #fff; color: #000; border: none; border-radius: 50px;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="margin-bottom: 30px;">QUIZ DE CADERNO</h1>
    <button class="btn-pen" onclick="iniciarQuiz()">PEGAR CANETA</button>
</div>

<div id="notebook-container">
    <!-- As páginas serão geradas dinamicamente aqui -->
</div>

<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    const masterPool = [
        ...(window.esportesData || []),
        ...(window.geografiaData || []),
        ...(window.historiaData || []),
        ...(window.naturezaData || []),
        ...(window.cienciaData || []),
        ...(window.entretenimentoData || [])
    ];

    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentIdx = 0;

    const sfx = {
        flip: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3'] }),
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-2101.mp3'], volume: 0.5 })
    };

    function iniciarQuiz() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        document.getElementById('start-screen').style.display = 'none';
        renderPage();
    }

    function renderPage() {
        if (currentIdx >= TOTAL_Q) {
            alert("Fim do caderno!");
            return;
        }

        const container = document.getElementById('notebook-container');
        const data = selectedQuestions[currentIdx];

        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${currentIdx}`;
        
        page.innerHTML = `
            <div style="font-size: 1.5vh; color: #999; margin-bottom: 1vh;">Questão ${currentIdx + 1}/${TOTAL_Q}</div>
            <div class="handwritten" id="text-${currentIdx}">${data.q}</div>
            <div id="timer-wrap"><div id="timer-bar" id="bar-${currentIdx}"></div></div>
            <div class="options-list">
                ${data.options.map((opt, i) => `<div class="option" onclick="check(this, ${i}, ${data.correct})">${opt}</div>`).join('')}
            </div>
        `;

        container.appendChild(page);

        // Animação de escrita e som
        setTimeout(() => {
            const txt = document.getElementById(`text-${currentIdx}`);
            txt.classList.add('writing-animation');
            sfx.write.play();
            
            // Inicia Timer após escrita (2 segundos)
            setTimeout(() => {
                sfx.write.stop();
                startTimer(page.querySelector('#timer-bar'), data.correct);
            }, 1500);
        }, 100);
    }

    function startTimer(bar, correctIdx) {
        let width = 100;
        const interval = setInterval(() => {
            width -= 0.5;
            bar.style.width = width + '%';
            if (width <= 0) {
                clearInterval(interval);
                reveal(correctIdx);
            }
        }, 35); // Aprox 7 segundos
    }

    function reveal(correctIdx) {
        const currentPage = document.getElementById(`page-${currentIdx}`);
        const options = currentPage.querySelectorAll('.option');
        
        options.forEach((opt, i) => {
            if (i === correctIdx) opt.classList.add('correct');
            else opt.classList.add('wrong');
        });

        confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });

        // Virar a página após 3 segundos
        setTimeout(() => {
            currentPage.classList.add('flipped');
            sfx.flip.play();
            currentIdx++;
            setTimeout(renderPage, 400);
        }, 3000);
    }

    function check(el, clicked, correct) {
        // Bloqueia cliques extras mas permite que o timer termine ou force o reveal
        if (el.parentElement.classList.contains('locked')) return;
        el.parentElement.classList.add('locked');
        // O reveal oficial acontece pelo timer para manter a sincronia, 
        // ou você pode chamar o reveal(correct) imediatamente aqui.
    }
</script>
</body>
</html>
