<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - 9:16 Fullscreen Ultra</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-purple: #8a2be2;
            --neon-green: #00ff00;
            --bg-black: #000000;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-black);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Principal 9:16 */
        #video-canvas {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 4vh 7% 5vh 7%;
            position: relative;
            /* Gradiente sem tons de marrom (apenas pretos e frios) */
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            transition: background 0.8s ease;
        }

        /* Barra de Progresso Superior */
        .progress-header {
            display: flex;
            gap: 1.2vw;
            width: 100%;
            z-index: 10;
        }

        .step {
            flex: 1;
            height: 0.8vh;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .step.active {
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Título */
        .fixed-title {
            font-family: 'Russo One', sans-serif;
            font-size: 3.5vh;
            text-align: center;
            margin-top: 4vh;
            margin-bottom: 2vh;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        /* Container da Pergunta */
        .question-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 2.5vh;
            padding: 3vh;
            min-height: 18vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2vh;
            backdrop-filter: blur(10px);
        }

        .question-text {
            font-size: 3vh;
            font-weight: 900;
            text-align: center;
            color: #fff;
            line-height: 1.2;
        }

        /* Timer */
        #timer-container {
            width: 100%;
            height: 1.2vh;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            margin-bottom: 4vh;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            transform-origin: left;
        }

        /* Opções */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1.8vh;
            flex-grow: 1;
        }

        .option {
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.15);
            padding: 2.2vh;
            border-radius: 1.5vh;
            font-size: 2.3vh;
            font-weight: 700;
            color: #fff;
            text-align: center;
            opacity: 0;
            transition: transform 0.2s;
        }

        .highlight-correct {
            background: var(--neon-green) !important;
            border-color: #fff !important;
            color: #000 !important;
            box-shadow: 0 0 30px var(--neon-green);
            transform: scale(1.05);
            z-index: 2;
        }

        .fade-out { opacity: 0.2 !important; }

        /* Rodapé */
        .footer-brand {
            padding: 1.5vh;
            background: var(--neon-pink);
            color: #fff;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.8vh;
            text-align: center;
            margin-top: 2vh;
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.3);
        }

        /* Iniciar */
        #overlay-start {
            position: fixed; inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-play {
            padding: 3vh 8vh;
            font-family: 'Russo One', sans-serif;
            font-size: 4vh;
            background: var(--neon-blue);
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 20px var(--neon-blue);
            cursor: pointer;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="overlay-start">
    <button class="btn-play" onclick="entrarTelaCheia()">JOGAR!</button>
</div>

<div id="video-canvas">
    <div class="progress-header" id="step-container"></div>
    <div class="fixed-title">VERDADEIRO OU FALSO?</div>
    
    <div class="question-container">
        <div class="question-text" id="q-text">CARREGANDO...</div>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>
    
    <div class="options-list" id="options-box"></div>
    
    <div class="footer-brand">WWW.PIXELCLICK.FUN</div>
</div>

<script>
    // --- CONFIGURAÇÃO E DADOS ---
    const TOTAL_Q = 8;
    let currentQ = 0;
    
    // Fallback de dados para garantir funcionamento
    const quizData = [
        {q: "O Sol é uma estrela?", options: ["Verdadeiro", "Falso"], correct: 0},
        {q: "A Lua tem luz própria?", options: ["Verdadeiro", "Falso"], correct: 1},
        {q: "O Brasil fica na África?", options: ["Verdadeiro", "Falso"], correct: 1},
        {q: "A água ferve a 100°C?", options: ["Verdadeiro", "Falso"], correct: 0},
        {q: "Existem 12 meses no ano?", options: ["Verdadeiro", "Falso"], correct: 0},
        {q: "O oceano é feito de doce?", options: ["Verdadeiro", "Falso"], correct: 1},
        {q: "O morcego é um pássaro?", options: ["Verdadeiro", "Falso"], correct: 1},
        {q: "2 + 2 é igual a 4?", options: ["Verdadeiro", "Falso"], correct: 0}
    ];

    const sfx = {
        timer: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-stopwatch-ticking-644.mp3'], loop: true, volume: 0.2 }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-reward-952.mp3'], volume: 0.5 })
    };

    function entrarTelaCheia() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        else if (doc.msRequestFullscreen) doc.msRequestFullscreen();

        document.getElementById('overlay-start').style.display = 'none';
        setupGame();
    }

    function setupGame() {
        const container = document.getElementById('step-container');
        for(let i=0; i<TOTAL_Q; i++) {
            const div = document.createElement('div');
            div.className = 'step';
            div.id = `step-${i}`;
            container.appendChild(div);
        }
        proximaPergunta();
    }

    function proximaPergunta() {
        if (currentQ >= TOTAL_Q) {
            document.getElementById('video-canvas').innerHTML = `<h1 style="color:white; text-align:center; margin-top:40vh">FIM DO QUIZ!</h1>`;
            return;
        }

        document.getElementById(`step-${currentQ}`).classList.add('active');
        const data = quizData[currentQ];
        document.getElementById('q-text').innerText = data.q;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';

        data.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.style.animation = `slideIn 0.4s ease forwards ${i * 0.1}s`;
            box.appendChild(div);
        });

        iniciarTimer(data.correct);
    }

    function iniciarTimer(correctIdx) {
        sfx.timer.play();
        const bar = document.getElementById('timer-bar');
        let start = Date.now();
        let duration = 5000; 

        function frame() {
            let elapsed = Date.now() - start;
            let p = Math.max(0, 100 - (elapsed / duration * 100));
            bar.style.width = p + "%";

            if (elapsed < duration) requestAnimationFrame(frame);
            else finalizarRodada(correctIdx);
        }
        requestAnimationFrame(frame);
    }

    function finalizarRodada(idx) {
        sfx.timer.stop();
        sfx.correct.play();

        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

        const opts = document.querySelectorAll('.option');
        opts.forEach((el, i) => {
            if(i === idx) el.classList.add('highlight-correct');
            else el.classList.add('fade-out');
        });

        setTimeout(() => {
            currentQ++;
            proximaPergunta();
        }, 3000);
    }
</script>
</body>
</html>
