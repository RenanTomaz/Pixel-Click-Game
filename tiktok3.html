<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Russo+One&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Caderno Realista Quiz</title>
    <style>
        :root {
            --paper-color: #fdfdfd;
            --line-color: #d1e4f9;
            --margin-color: #ffadb0;
            --ink-color: #1a2a6c;
            --wood-dark: #121212;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background: var(--wood-dark);
            /* Textura de mesa de madeira escura */
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px; /* Crucial para o efeito 3D */
        }

        /* Container do Caderno */
        #notebook-container {
            width: 90vw;
            height: 85vh;
            max-width: 450px;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Folha de Papel */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--paper-color);
            /* Desenho das linhas do caderno via CSS */
            background-image: 
                linear-gradient(90deg, transparent 39px, var(--margin-color) 39px, var(--margin-color) 41px, transparent 41px),
                linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 3.2vh; /* Espaçamento das linhas */
            background-position: 0 0, 0 5vh;
            border-radius: 5px 15px 15px 5px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
            padding: 6vh 8% 4vh 18%; /* Margem maior à esquerda para o "espiral" */
            display: flex;
            flex-direction: column;
            transform-origin: left center;
            transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
            backface-visibility: hidden;
            z-index: 2;
        }

        /* Animação de virar folha */
        .page.flipped {
            transform: rotateY(-140deg);
            z-index: 1;
        }

        /* Texto da Pergunta (Manuscrito) */
        .question-text {
            font-family: 'Caveat', cursive;
            color: var(--ink-color);
            font-size: 3.5vh;
            line-height: 1.2;
            margin-top: 2vh;
            margin-bottom: 4vh;
            min-height: 15vh;
            opacity: 0;
        }

        .writing-active {
            opacity: 1;
            animation: inkFlow 2s ease-out forwards;
        }

        @keyframes inkFlow {
            from { clip-path: inset(0 100% 0 0); }
            to { clip-path: inset(0 0 0 0); }
        }

        /* Lista de Opções (estilo itens de lista) */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            margin-top: auto;
            margin-bottom: 5vh;
        }

        .option {
            font-family: 'Caveat', cursive;
            font-size: 2.8vh;
            color: #333;
            padding: 1vh;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        /* Marcador de resposta (como um X feito a caneta) */
        .option.correct::before {
            content: "✓";
            position: absolute;
            left: -35px;
            color: #2ecc71;
            font-size: 4vh;
            font-weight: bold;
        }

        .option.wrong::before {
            content: "✗";
            position: absolute;
            left: -35px;
            color: #e74c3c;
            font-size: 4vh;
        }

        /* Timer (barra de progresso minimalista) */
        .timer-container {
            width: 100%;
            height: 3px;
            background: #eee;
            margin-bottom: 2vh;
        }
        .timer-bar {
            width: 100%;
            height: 100%;
            background: var(--ink-color);
        }

        /* Overlay Inicial */
        #overlay-start {
            position: fixed; inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .btn-play {
            margin-top: 20px;
            padding: 20px 60px;
            font-family: 'Russo One', sans-serif;
            font-size: 4vh;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div id="overlay-start">
    <h1 style="font-family: 'Caveat'; font-size: 7vh;">Meu Caderno</h1>
    <p style="font-family: 'Montserrat'; font-size: 2vh; opacity: 0.7;">Responda o Quiz nas páginas</p>
    <button class="btn-play" onclick="iniciarQuiz()">ABRIR</button>
</div>

<div id="notebook-container">
    <!-- As páginas serão inseridas aqui via JS -->
</div>

<!-- IMPORTANTE: Estes arquivos devem estar na mesma pasta que este HTML -->
<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    // Agregando os dados
    const masterPool = [
        ...(typeof esportesData !== 'undefined' ? esportesData : []),
        ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
        ...(typeof historiaData !== 'undefined' ? historiaData : []),
        ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
        ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
        ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
    ];

    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;

    // Sons (usando links de biblioteca para garantir que toque)
    const sfx = {
        flip: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3'] }),
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-2101.mp3'], volume: 0.5 }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3'] })
    };

    function iniciarQuiz() {
        // Fullscreen
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        
        document.getElementById('overlay-start').style.display = 'none';
        renderizarPagina();
    }

    function renderizarPagina() {
        if (currentQ >= TOTAL_Q) {
            finalizar();
            return;
        }

        const data = selectedQuestions[currentQ];
        const container = document.getElementById('notebook-container');

        // Cria a nova página
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${currentQ}`;
        page.style.zIndex = TOTAL_Q - currentQ; // Empilhamento inverso

        page.innerHTML = `
            <div style="font-size: 1.5vh; color: #aaa; text-align: right;">Pág. ${currentQ + 1}</div>
            <div class="question-text" id="q-text-${currentQ}">${data.q}</div>
            <div class="timer-container"><div class="timer-bar" id="bar-${currentQ}"></div></div>
            <div class="options-list" id="options-${currentQ}">
                ${data.options.map((opt, i) => `
                    <div class="option" onclick="validar(this, ${i}, ${data.correct})">${opt}</div>
                `).join('')}
            </div>
        `;

        container.appendChild(page);

        // Animação de escrita
        setTimeout(() => {
            const txt = document.getElementById(`q-text-${currentQ}`);
            txt.classList.add('writing-active');
            sfx.write.play();
            
            setTimeout(() => {
                sfx.write.stop();
                iniciarTimer(currentQ, data.correct);
            }, 2000);
        }, 300);
    }

    function iniciarTimer(id, correctIdx) {
        const bar = document.getElementById(`bar-${id}`);
        let width = 100;
        const duration = 7000; // 7 segundos
        const step = 100 / (duration / 50);

        const timer = setInterval(() => {
            width -= step;
            bar.style.width = width + '%';

            if (width <= 0) {
                clearInterval(timer);
                finalizarPergunta(correctIdx);
            }
        }, 50);

        // Armazena o timer para cancelar se o usuário clicar antes
        bar.dataset.timerId = timer;
    }

    function validar(el, escolhido, correto) {
        const bar = document.getElementById(`bar-${currentQ}`);
        clearInterval(parseInt(bar.dataset.timerId));
        finalizarPergunta(correto);
    }

    function finalizarPergunta(corretoIdx) {
        const parent = document.getElementById(`options-${currentQ}`);
        if (parent.dataset.locked) return;
        parent.dataset.locked = "true";

        const options = parent.querySelectorAll('.option');
        options.forEach((opt, i) => {
            if (i === corretoIdx) opt.classList.add('correct');
            else opt.classList.add('wrong');
        });

        sfx.correct.play();
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });

        // Virar página
        setTimeout(() => {
            const page = document.getElementById(`page-${currentQ}`);
            page.classList.add('flipped');
            sfx.flip.play();
            currentQ++;
            setTimeout(renderizarPagina, 600);
        }, 3000);
    }

    function finalizar() {
        document.getElementById('notebook-container').innerHTML = `
            <div class="page" style="text-align:center; display:flex; flex-direction:column; justify-content:center;">
                <h1 style="font-family:'Caveat'; font-size:6vh;">Fim do Quiz!</h1>
                <p>Obrigado por participar.</p>
                <button class="btn-play" onclick="location.reload()" style="background:#000; color:#fff; font-size:2vh;">RECOMEÇAR</button>
            </div>`;
    }
</script>
</body>
</html>
