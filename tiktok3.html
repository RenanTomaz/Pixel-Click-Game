<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Russo+One&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - Caderno de Questões</title>
    <style>
        :root {
            --paper-color: #fdfdfd;
            --line-color: #d1e4f9;
            --margin-color: #ffadb0;
            --ink-color: #1a2a6c;
            --wood-brown: #3d2b1f; 
            --red-pen: #d63031;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--wood-brown);
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            perspective: 2000px;
        }

        /* Overlay de Contagem - Ajustado para estabilidade */
        #countdown-overlay {
            position: fixed; inset: 0; 
            display: none; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); z-index: 10000;
            pointer-events: none;
        }
        #countdown-number {
            font-family: 'Russo One', sans-serif;
            font-size: 18vh; color: white;
            text-shadow: 0 0 30px var(--ink-color);
        }
        
        .animate-pop {
            animation: popSfx 1s ease-out;
        }
        @keyframes popSfx {
            0% { transform: scale(0.5); opacity: 0; }
            20% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        .notebook-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800; font-size: 2.2vh; color: #333;
            background: #eee; padding: 8px 25px; border-radius: 4px;
            margin-bottom: 2vh; box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            border-left: 10px solid var(--ink-color); z-index: 10;
        }

        #notebook-container {
            width: 92vw; height: 82vh; max-width: 420px;
            position: relative; transform-style: preserve-3d;
        }

        .page {
            position: absolute; width: 100%; height: 100%;
            background: var(--paper-color);
            background-image: 
                linear-gradient(90deg, transparent 39px, var(--margin-color) 39px, var(--margin-color) 41px, transparent 41px),
                linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 3.2vh;
            background-position: 0 0, 0 5vh;
            border-radius: 2px 15px 15px 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            padding: 6vh 8% 6vh 18%;
            display: flex; flex-direction: column;
            transform-origin: left center;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden;
        }

        .page::after {
            content: '';
            position: absolute; left: 10px; top: 0; bottom: 0; width: 15px;
            background-image: radial-gradient(circle, #333 40%, transparent 50%);
            background-size: 15px 3.2vh; background-position: 0 1vh; opacity: 0.15;
        }

        .footer-site {
            position: absolute; bottom: 2vh; right: 4vh;
            font-family: 'Montserrat', sans-serif; font-size: 1.2vh;
            color: #bbb; letter-spacing: 1px; font-weight: 700;
        }

        .page.flipped { transform: rotateY(-130deg); pointer-events: none; }

        .question-text {
            font-family: 'Caveat', cursive; color: var(--ink-color);
            font-size: 3.2vh; line-height: 1.2; margin-top: 1vh;
            min-height: 14vh; white-space: pre-wrap;
        }

        .options-list {
            display: flex; flex-direction: column; gap: 0.8vh;
            margin-top: 2vh; opacity: 0; transition: opacity 0.5s ease;
        }

        .options-visible { opacity: 1; }

        .option {
            font-family: 'Caveat', cursive; font-size: 2.6vh;
            color: #333; padding: 0.6vh; border-bottom: 1px dashed #ccc;
            cursor: pointer; transition: all 0.3s;
        }

        .option.correct { color: #27ae60; font-weight: bold; border-bottom: 2px solid #27ae60; }
        .option.wrong { color: var(--red-pen); opacity: 0.7; text-decoration: line-through; animation: wrongShake 0.4s linear; }

        @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

        .timer-container { width: 100%; height: 3px; background: rgba(0,0,0,0.05); margin-top: 1vh; }
        .timer-bar { width: 100%; height: 100%; background: var(--ink-color); }

        #overlay-start {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
        }

        .btn-cta {
            margin-top: 20px; padding: 15px 40px; font-family: 'Russo One';
            font-size: 2.5vh; background: var(--ink-color); color: #fff; 
            border: none; border-radius: 10px; cursor: pointer; text-decoration: none;
        }

        .grade-table {
            width: 100%; border-collapse: collapse; margin-top: 2vh;
            font-family: 'Caveat', cursive; font-size: 2.2vh; color: #444;
        }
        .grade-table th, .grade-table td { border: 1px solid #ddd; padding: 5px; text-align: center; }

        .ask-grade {
            font-family: 'Caveat', cursive; font-size: 5.5vh; color: var(--red-pen);
            margin: 2vh 0; transform: rotate(-2deg);
            animation: stamp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes stamp { from { transform: scale(2); opacity: 0; } to { transform: scale(1) rotate(-2deg); opacity: 1; } }
    </style>
</head>
<body>

<div id="countdown-overlay"><div id="countdown-number">5</div></div>

<div id="overlay-start">
    <h1 style="font-family: 'Caveat'; font-size: 6vh;">Pixel Click</h1>
    <button class="btn-cta" style="background:#fff; color:#000" onclick="iniciarQuiz()">ABRIR CADERNO</button>
</div>

<div class="notebook-label">CADERNO DE QUESTÕES</div>

<div id="notebook-container">
    <div style="position:absolute; width:100%; height:100%; background:#ddd; border-radius:2px 15px 15px 2px; transform:translate(4px,4px); z-index:0;"></div>
</div>

<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    const masterPool = [
        ...(typeof esportesData !== 'undefined' ? esportesData : []),
        ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
        ...(typeof historiaData !== 'undefined' ? historiaData : []),
        ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
        ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
        ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
    ];

    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;
    let acertos = 0;
    const letras = ["A", "B", "C", "D"];

    const sfx = {
        flip: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3'] }),
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-2101.mp3'], volume: 0.3, loop: true }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3'] }),
        wrong: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-failing-armpit-fart-3091.mp3'], volume: 0.2 }),
        tick: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-click-melodic-tone-1129.mp3'], volume: 0.4 })
    };

    function iniciarQuiz() {
        // Tentativa suave de fullscreen (se falhar, não trava a gravação)
        try {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => console.log("Fullscreen negado."));
            }
        } catch (e) {}

        document.getElementById('overlay-start').style.display = 'none';
        
        const overlay = document.getElementById('countdown-overlay');
        const number = document.getElementById('countdown-number');
        overlay.style.display = 'flex';
        
        let count = 5;
        const runCount = () => {
            if (count > 0) {
                number.innerText = count;
                number.classList.remove('animate-pop');
                void number.offsetWidth; // Force reflow
                number.classList.add('animate-pop');
                sfx.tick.play();
                count--;
                setTimeout(runCount, 1000);
            } else {
                overlay.style.display = 'none';
                renderizarPagina(0);
                if (selectedQuestions.length > 1) renderizarPagina(1);
            }
        };
        runCount();
    }

    function renderizarPagina(index) {
        if (index >= TOTAL_Q || document.getElementById(`page-${index}`)) return;

        const data = selectedQuestions[index];
        const container = document.getElementById('notebook-container');
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${index}`;
        page.style.zIndex = TOTAL_Q - index;

        page.innerHTML = `
            <div style="font-size: 1.4vh; color: #aaa; text-align: right;">Questão ${index + 1}</div>
            <div class="question-text" id="q-text-${index}"></div>
            <div class="timer-container"><div class="timer-bar" id="bar-${index}"></div></div>
            <div class="options-list" id="options-${index}">
                ${data.options.map((opt, i) => `<div class="option" onclick="validar(this, ${i}, ${data.correct})">${letras[i]}) ${opt}</div>`).join('')}
            </div>
            <div class="footer-site">www.pixelclick.fun</div>
        `;
        container.appendChild(page);
        if (index === currentQ) prepararEscrita(index, data);
    }

    async function prepararEscrita(index, data) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(data.q);
        ut.lang = 'pt-BR'; ut.rate = 1.1;
        window.speechSynthesis.speak(ut);

        await typeWriter(`q-text-${index}`, data.q);
        document.getElementById(`options-${index}`).classList.add('options-visible');
        iniciarTimer(index, data.correct);
    }

    function typeWriter(id, text) {
        return new Promise((res) => {
            let i = 0; const el = document.getElementById(id);
            sfx.write.play();
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 45); }
                else { sfx.write.stop(); res(); }
            }
            type();
        });
    }

    function iniciarTimer(id, correctIdx) {
        const bar = document.getElementById(`bar-${id}`);
        let width = 100;
        const timer = setInterval(() => {
            width -= 0.8; bar.style.width = width + '%';
            if (width <= 0) { clearInterval(timer); finalizarPergunta(correctIdx, false); }
        }, 50);
        bar.dataset.timerId = timer;
    }

    function validar(el, escolhido, correto) {
        const bar = document.getElementById(`bar-${currentQ}`);
        if (bar) clearInterval(parseInt(bar.dataset.timerId));
        const parent = document.getElementById(`options-${currentQ}`);
        if (parent.dataset.locked) return;
        
        let acertou = (escolhido === correto);
        if (acertou) acertos++;
        else { el.classList.add('wrong'); sfx.wrong.play(); }
        finalizarPergunta(correto, acertou);
    }

    function finalizarPergunta(corretoIdx, foiAcerto) {
        const parent = document.getElementById(`options-${currentQ}`);
        if (!parent || parent.dataset.locked) return;
        parent.dataset.locked = "true";
        
        const correctOption = parent.querySelectorAll('.option')[corretoIdx];
        correctOption.classList.add('correct');

        sfx.correct.play();
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#1a2a6c', '#27ae60', '#fdfdfd', '#ffadb0']
        });

        setTimeout(() => {
            const pageAtual = document.getElementById(`page-${currentQ}`);
            if (pageAtual) { pageAtual.classList.add('flipped'); sfx.flip.play(); }
            currentQ++;
            if (currentQ < TOTAL_Q) { 
                renderizarPagina(currentQ + 1); 
                prepararEscrita(currentQ, selectedQuestions[currentQ]); 
            } else { 
                mostrarFinal(); 
            }
        }, 2500);
    }

    function mostrarFinal() {
        const container = document.getElementById('notebook-container');
        const finalPage = document.createElement('div');
        finalPage.className = 'page';
        finalPage.style.zIndex = 100;
        finalPage.innerHTML = `
            <div style="text-align:center;">
                <h2 style="font-family:'Caveat'; font-size:4vh; color:var(--ink-color); margin:0;">Fim das Questões</h2>
                <div class="ask-grade">Qual foi a sua nota?</div>
                <table class="grade-table">
                    <tr><th>Acertos</th><th>Nota</th></tr>
                    <tr><td>8</td><td>A+</td></tr>
                    <tr><td>6-7</td><td>B</td></tr>
                    <tr><td>4-5</td><td>C</td></tr>
                    <tr><td>0-3</td><td>F</td></tr>
                </table>
                <a href="https://www.pixelclick.fun" target="_blank" class="btn-cta" style="font-size:2vh; padding:10px 20px; margin-top:3vh; display:inline-block; background:var(--ink-color); color:white; border-radius:8px; text-decoration:none;">WWW.PIXELCLICK.FUN</a>
            </div>
            <div class="footer-site">www.pixelclick.fun</div>
        `;
        container.appendChild(finalPage);
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(`Você acertou ${acertos} de ${TOTAL_Q}. Me diga, qual foi a sua nota?`));
    }
</script>
</body>
</html>
