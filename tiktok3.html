<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Russo+One&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Caderno Quiz - Pro</title>
    <style>
        :root {
            --paper-color: #fdfdfd;
            --line-color: #d1e4f9;
            --margin-color: #ffadb0;
            --ink-color: #1a2a6c;
            --wood-brown: #3d2b1f; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--wood-brown);
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            perspective: 2000px;
        }

        #notebook-container {
            width: 90vw; height: 85vh; max-width: 420px;
            position: relative; transform-style: preserve-3d;
        }

        .page {
            position: absolute; width: 100%; height: 100%;
            background: var(--paper-color);
            background-image: 
                linear-gradient(90deg, transparent 39px, var(--margin-color) 39px, var(--margin-color) 41px, transparent 41px),
                linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 100%, 100% 3.2vh;
            background-position: 0 0, 0 5vh;
            border-radius: 5px 15px 15px 5px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            padding: 6vh 8% 4vh 18%;
            display: flex; flex-direction: column;
            transform-origin: left center;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            backface-visibility: hidden;
        }

        .page.flipped { transform: rotateY(-130deg); pointer-events: none; }

        .question-text {
            font-family: 'Caveat', cursive; color: var(--ink-color);
            font-size: 3.2vh; line-height: 1.2; margin-top: 1vh;
            min-height: 14vh; white-space: pre-wrap;
        }

        .options-list {
            display: flex; flex-direction: column; gap: 0.8vh;
            margin-top: 2vh; /* Movido para cima */
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .options-visible { opacity: 1; }

        .option {
            font-family: 'Caveat', cursive; font-size: 2.5vh;
            color: #333; padding: 0.6vh; border-bottom: 1px dashed #ccc;
            cursor: pointer; transition: all 0.3s; position: relative;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); background: transparent; }
            50% { transform: scale(1.03); background: rgba(46, 204, 113, 0.1); }
            100% { transform: scale(1); background: rgba(46, 204, 113, 0.05); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .option.correct {
            animation: correctPulse 0.5s ease forwards;
            color: #27ae60; font-weight: bold; border-bottom: 2px solid #27ae60;
        }

        .option.wrong {
            animation: wrongShake 0.4s linear;
            color: #c0392b; opacity: 0.7; text-decoration: line-through;
        }

        .timer-container { width: 100%; height: 3px; background: rgba(0,0,0,0.05); margin-top: 1vh; margin-bottom: 1vh; }
        .timer-bar { width: 100%; height: 100%; background: var(--ink-color); }

        #overlay-start {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
        }

        .btn-cta {
            margin-top: 20px; padding: 15px 40px; font-family: 'Russo One';
            font-size: 2.5vh; background: var(--ink-color); color: #fff; 
            border: none; border-radius: 10px; cursor: pointer; text-decoration: none;
            display: inline-block; text-align: center;
        }
    </style>
</head>
<body>

<div id="overlay-start">
    <h1 style="font-family: 'Caveat'; font-size: 6vh;">Quiz de Caderno</h1>
    <button class="btn-cta" style="background:#fff; color:#000" onclick="iniciarQuiz()">INICIAR TESTE</button>
</div>

<div id="notebook-container">
    <div style="position:absolute; width:100%; height:100%; background:#ddd; border-radius:5px 15px 15px 5px; transform:translate(4px,4px); z-index:0;"></div>
</div>

<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    const masterPool = [
        ...(typeof esportesData !== 'undefined' ? esportesData : []),
        ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
        ...(typeof historiaData !== 'undefined' ? historiaData : []),
        ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
        ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
        ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
    ];

    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;
    const letras = ["A", "B", "C", "D"];

    const sfx = {
        flip: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-paper-slide-1530.mp3'] }),
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-2101.mp3'], volume: 0.3, loop: true }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3'] }),
        wrong: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-failing-armpit-fart-3091.mp3'], volume: 0.2 })
    };

    function iniciarQuiz() {
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        document.getElementById('overlay-start').style.display = 'none';
        renderizarPagina(0);
        if (selectedQuestions.length > 1) renderizarPagina(1);
    }

    function renderizarPagina(index) {
        if (index >= TOTAL_Q || document.getElementById(`page-${index}`)) return;

        const data = selectedQuestions[index];
        // Garantir o ponto de interrogação
        let pergunta = data.q.trim();
        if (!pergunta.endsWith('?')) pergunta += '?';
        data.q = pergunta;

        const container = document.getElementById('notebook-container');
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${index}`;
        page.style.zIndex = TOTAL_Q - index;

        page.innerHTML = `
            <div style="font-size: 1.4vh; color: #aaa; text-align: right; margin-bottom: 5px;">Pág. ${index + 1}</div>
            <div class="question-text" id="q-text-${index}"></div>
            <div class="timer-container"><div class="timer-bar" id="bar-${index}"></div></div>
            <div class="options-list" id="options-${index}">
                ${data.options.map((opt, i) => `
                    <div class="option" onclick="validar(this, ${i}, ${data.correct})">
                        ${letras[i]}) ${opt}
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(page);
        if (index === currentQ) prepararEscrita(index, data);
    }

    async function prepararEscrita(index, data) {
        // Narração em tempo real (Voz)
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(data.q);
        utterance.lang = 'pt-BR';
        utterance.rate = 1.1;
        window.speechSynthesis.speak(utterance);

        await typeWriter(`q-text-${index}`, data.q);
        document.getElementById(`options-${index}`).classList.add('options-visible');
        iniciarTimer(index, data.correct);
    }

    function typeWriter(elementId, text) {
        return new Promise((resolve) => {
            let i = 0;
            const element = document.getElementById(elementId);
            sfx.write.play();
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 45); // Sincronizado com a velocidade da voz
                } else {
                    sfx.write.stop();
                    resolve();
                }
            }
            type();
        });
    }

    function iniciarTimer(id, correctIdx) {
        const bar = document.getElementById(`bar-${id}`);
        let width = 100;
        const timer = setInterval(() => {
            width -= 0.7;
            bar.style.width = width + '%';
            if (width <= 0) {
                clearInterval(timer);
                finalizarPergunta(correctIdx);
            }
        }, 50);
        bar.dataset.timerId = timer;
    }

    function validar(el, escolhido, correto) {
        const bar = document.getElementById(`bar-${currentQ}`);
        if (bar) clearInterval(parseInt(bar.dataset.timerId));
        
        const parent = document.getElementById(`options-${currentQ}`);
        if (parent.dataset.locked) return;
        
        if (escolhido !== correto) {
            el.classList.add('wrong');
            sfx.wrong.play();
        }
        finalizarPergunta(correto);
    }

    function finalizarPergunta(corretoIdx) {
        const parent = document.getElementById(`options-${currentQ}`);
        if (!parent || parent.dataset.locked) return;
        parent.dataset.locked = "true";

        const options = parent.querySelectorAll('.option');
        options[corretoIdx].classList.add('correct');
        
        sfx.correct.play();
        confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });

        setTimeout(() => {
            const pageAtual = document.getElementById(`page-${currentQ}`);
            if (pageAtual) {
                pageAtual.classList.add('flipped');
                sfx.flip.play();
            }
            currentQ++;
            if (currentQ < TOTAL_Q) {
                renderizarPagina(currentQ + 1);
                prepararEscrita(currentQ, selectedQuestions[currentQ]);
            } else {
                mostrarFinal();
            }
        }, 2500);
    }

    function mostrarFinal() {
        const container = document.getElementById('notebook-container');
        const finalPage = document.createElement('div');
        finalPage.className = 'page';
        finalPage.style.zIndex = 100;
        finalPage.innerHTML = `
            <div style="text-align:center; margin-top:5vh">
                <h2 style="font-family:'Caveat'; font-size:5vh; color:var(--ink-color)">Fim do Caderno!</h2>
                <p style="font-family:'Caveat'; font-size:3.2vh; margin: 3vh 0">
                    Você completou todas as lições. Parabéns pelo empenho!
                </p>
                <div style="border: 2px dashed #ccc; padding: 3vh; margin-top: 4vh">
                    <p style="font-family:'Montserrat'; font-weight:800; font-size:1.8vh">GOSTOU DO DESAFIO?</p>
                    <p style="font-family:'Caveat'; font-size:2.5vh">Acesse nosso portal para mais:</p>
                    <a href="https://www.pixelclick.fun" target="_blank" class="btn-cta">WWW.PIXELCLICK.FUN</a>
                </div>
            </div>
        `;
        container.appendChild(finalPage);
        
        const finalVoice = new SpeechSynthesisUtterance("Parabéns! Você completou o caderno. Acesse pixel click ponto fun para mais desafios.");
        finalVoice.lang = 'pt-BR';
        window.speechSynthesis.speak(finalVoice);
    }
</script>
</body>
</html>
