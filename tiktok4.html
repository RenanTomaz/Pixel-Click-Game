<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - SciFi Lab Core</title>
    <style>
        :root {
            --white-panel: #eef5f8;
            --screen-bg: rgba(220, 235, 245, 0.85);
            --wrong-color: #ff0055;
            /* Variáveis dinâmicas controladas pela animação global */
            --neon-primary: #00f3ff;
            --neon-secondary: #ff00aa;
        }

        /* Animação global para alternar a iluminação do laboratório entre azul e rosa */
        @keyframes pulseNeon {
            0%, 100% {
                --neon-primary: #00f3ff;
                --neon-secondary: #00ffaa;
            }
            50% {
                --neon-primary: #ff00aa;
                --neon-secondary: #bc13fe;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #ffffff; 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            perspective: 400px; 
            perspective-origin: 50% 50%;
            animation: pulseNeon 8s ease-in-out infinite;
        }

        /* Suporte principal da câmera com amortecimento mecânico */
        #camera-rig {
            width: 100vw; height: 100vh;
            transform-style: preserve-3d;
            transition: transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateZ(0px) rotateY(0deg);
        }

        .camera-walking {
            animation: scifiWalk 0.6s ease-in-out infinite alternate;
        }

        @keyframes scifiWalk {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-1vh) rotate(0.15deg); }
        }

        /* CENÁRIO 3D: Construção Física do Corredor Branco da Imagem */
        #studio-room {
            position: absolute;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        .panel-surface {
            position: absolute;
            background: var(--white-panel);
        }

        /* Chão Branco Reflexivo */
        .floor {
            width: 300vw; height: 20000px;
            left: -100vw; top: 50vh;
            transform: rotateX(90deg);
            transform-origin: top center;
            background: linear-gradient(to bottom, #ffffff, #dbeef5);
            box-shadow: inset 0 0 100px rgba(255,255,255,1);
        }

        /* Teto Branco com Linhas de Fuga */
        .ceiling {
            width: 300vw; height: 20000px;
            left: -100vw; top: -50vh;
            transform: rotateX(-90deg);
            transform-origin: bottom center;
            background: linear-gradient(to top, #ffffff, #e6f0f5);
        }

        /* Parede de Painéis Esquerda */
        .wall-left {
            width: 20000px; height: 100vh;
            right: 50vw; top: 0;
            transform: rotateY(90deg);
            transform-origin: right center;
            background: linear-gradient(90deg, #f4fafc, #dceef5);
        }

        /* Parede de Painéis Direita */
        .wall-right {
            width: 20000px; height: 100vh;
            left: 50vw; top: 0;
            transform: rotateY(-90deg);
            transform-origin: left center;
            background: linear-gradient(-90deg, #f4fafc, #dceef5);
        }

        /* Arcos Estruturais de LED Neon (Simulando as molduras da imagem ao longo do corredor) */
        .neon-ring {
            position: absolute;
            width: 100vw; height: 100vh;
            border: 6px solid var(--neon-primary);
            box-shadow: 0 0 30px var(--neon-primary), inset 0 0 30px var(--neon-primary);
            border-radius: 40px; /* Curvatura característica dos portais da imagem */
            left: 0; top: 0;
            pointer-events: none;
            backface-visibility: hidden;
        }

        /* FORMATO VERTICAL GERAL (9:16) */
        .cinematic-track {
            position: absolute;
            width: 100%; height: 100%;
            max-width: 420px; max-height: 746px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
        }

        /* Janelas de Interface Gráfica dos Computadores de Bordo */
        .computer-screen {
            position: absolute;
            width: 86vw; height: 52vh;
            max-width: 360px; max-height: 420px;
            background: var(--screen-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid #ffffff;
            border-top: 6px solid var(--neon-primary);
            box-shadow: 0 15px 35px rgba(150, 180, 200, 0.3), 0 0 15px rgba(255,255,255,0.6);
            border-radius: 8px;
            padding: 3.5vh 6%;
            display: flex; flex-direction: column;
            backface-visibility: hidden;
            left: 7%; top: 24%;
            transition: border-color 0.5s, box-shadow 0.5s;
        }

        .node-left { transform: translateX(-42vw) rotateY(45deg); }
        .node-right { transform: translateX(42vw) rotateY(-45deg); }
        
        .node-final { 
            transform: translateX(0) rotateY(0deg); 
            background: #ffffff;
            border-top: 6px solid var(--neon-secondary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .question-text {
            font-family: 'Orbitron', sans-serif; color: #1e293b;
            font-size: 2.3vh; font-weight: 800; line-height: 1.4; margin-top: 1vh; min-height: 11vh;
        }

        .options-list { display: flex; flex-direction: column; gap: 1vh; margin-top: 2vh; opacity: 0; transition: opacity 0.3s; }
        .options-visible { opacity: 1; }
        
        .option { 
            font-family: 'Montserrat', sans-serif; font-size: 1.8vh; color: #334155; font-weight: 600;
            padding: 1.2vh; background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8);
            border-radius: 6px; cursor: pointer; transition: all 0.25s ease;
        }
        .option.correct { color: #fff !important; background: #00ffaa; border-color: #00ffaa; box-shadow: 0 0 15px rgba(0,255,170,0.6); }
        .option.wrong { color: #fff !important; background: var(--wrong-color); border-color: var(--wrong-color); text-decoration: line-through; box-shadow: 0 0 15px rgba(255,0,85,0.4); }

        .timer-container { width: 100%; height: 5px; background: rgba(0,0,0,0.05); margin-top: 1.5vh; border-radius: 3px; overflow: hidden; }
        .timer-bar { width: 100%; height: 100%; background: var(--neon-primary); transition: background-color 0.5s; }

        /* Interfaces Estáticas de Controle */
        #overlay-start, #countdown-overlay {
            position: fixed; inset: 0; background: #ffffff; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #1e293b;
        }
        #countdown-number { font-family: 'Orbitron'; font-size: 10vh; font-weight:800; color: var(--neon-primary); }
        .btn-cta { padding: 16px 45px; font-family: 'Orbitron'; font-weight: 800; font-size: 1.8vh; background: #1e293b; color: #fff; border: none; border-radius: 30px; cursor: pointer; text-decoration: none; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: 0.3s; }

        .grade-table { width: 100%; border-collapse: collapse; margin-top: 2vh; font-family: 'Montserrat'; font-size: 1.8vh; color: #1e293b; }
        .grade-table th, .grade-table td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; }
        .ask-grade { font-family: 'Orbitron'; font-size: 3.5vh; color: var(--neon-secondary); text-align: center; margin: 2vh 0; font-weight: 800; }
    </style>
</head>
<body>

<div id="countdown-overlay" style="display: none;"><div id="countdown-number">CONECTANDO</div></div>

<div id="overlay-start">
    <h1 style="font-family: 'Orbitron'; font-size: 4.5vh; margin-bottom: 0; font-weight: 800; letter-spacing: -1px;">PIXEL LAB</h1>
    <p style="font-size: 1.6vh; color: #94a3b8; font-family: 'Orbitron'; font-weight: 600;">SISTEMA DE DIAGNÓSTICO INTEGRADO</p>
    <button class="btn-cta" onclick="iniciarDiretor()">INICIAR RECONHECIMENTO</button>
</div>

<div id="camera-rig">
    <div id="studio-room">
        <div class="panel-surface floor"></div>
        <div class="panel-surface ceiling"></div>
        <div class="panel-surface wall-left"></div>
        <div class="panel-surface wall-right"></div>
        
        <div id="neon-rings-layer" style="transform-style: preserve-3d; position:absolute; inset:0;"></div>
    </div>
    
    <div class="cinematic-track" id="main-track"></div>
</div>

<script>
    const mockPool = [
        { q: "Qual é o oceano mais profundo do planeta Terra", options: ["Atlântico", "Índico", "Pacífico", "Ártico"], correct: 2 },
        { q: "Quantos segundos existem em uma hora completa", options: ["3600 segundos", "60 segundos", "2400 segundos", "1200 segundos"], correct: 0 },
        { q: "Qual país é o maior produtor de café do mundo", options: ["Colômbia", "Brasil", "Etiópia", "Vietnã"], correct: 1 },
        { q: "Qual o planeta mais próximo do Sol no sistema", options: ["Vênus", "Marte", "Mercúrio", "Júpiter"], correct: 2 }
    ];

    const TOTAL_Q = 4;
    const selectedQuestions = mockPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;
    let acertos = 0;
    const letras = ["A", "B", "C", "D"];

    const sfx = {
        passos: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-slow-heavy-footsteps-1025.mp3'], volume: 0.3 }),
        cameraTurn: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-futuristic-space-hiss-2908.mp3'], volume: 0.3 }),
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-computer-keyboard-typing-1386.mp3'], volume: 0.4, loop: true }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-electronic-retro-win-sound-2703.mp3'], volume: 0.4 }),
        wrong: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-system-fault-error-2911.mp3'], volume: 0.4 }),
        tick: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-digital-quick-click-2305.mp3'], volume: 0.2 })
    };

    function iniciarDiretor() {
        document.getElementById('overlay-start').style.display = 'none';
        const overlay = document.getElementById('countdown-overlay');
        const number = document.getElementById('countdown-number');
        overlay.style.display = 'flex';
        
        let count = 3;
        const runCount = () => {
            if (count > 0) {
                number.innerText = `LINKING: ${count}`;
                sfx.tick.play();
                count--;
                setTimeout(runCount, 1000);
            } else {
                overlay.style.display = 'none';
                construirCenario();
                executarSequenciaPassos();
            }
        };
        runCount();
    }

    function construirCenario() {
        const track = document.getElementById('main-track');
        const ringsLayer = document.getElementById('neon-rings-layer');
        
        // Gera aneis estruturais repetidos para dar a sensação exata de túnel modular da imagem
        for(let r = 1; r <= (TOTAL_Q + 2) * 4; r++) {
            const ring = document.createElement('div');
            ring.className = 'neon-ring';
            ring.style.transform = `translateZ(${r * -600}px)`;
            ringsLayer.appendChild(ring);
        }

        selectedQuestions.forEach((data, index) => {
            if (!data.q.trim().endsWith('?')) data.q = data.q.trim() + "?";
            
            const node = document.createElement('div');
            const lado = index % 2 === 0 ? 'node-left' : 'node-right';
            node.className = `computer-screen ${lado}`;
            node.id = `node-${index}`;
            
            const zPosition = (index + 1) * -2400;
            node.style.transform += ` translateZ(${zPosition}px)`;

            node.innerHTML = `
                <div style="font-family:'Orbitron'; font-size: 1.3vh; color: var(--neon-primary); font-weight:800;">MONITOR // DATA_0${index + 1}</div>
                <div class="question-text" id="q-text-${index}"></div>
                <div class="timer-container"><div class="timer-bar" id="bar-${index}"></div></div>
                <div class="options-list" id="options-${index}">
                    ${data.options.map((opt, i) => `<div class="option" onclick="validar(this, ${i}, ${data.correct}, ${index})">${letras[i]} ➜ ${opt}</div>`).join('')}
                </div>
            `;
            track.appendChild(node);
        });

        const finalNode = document.createElement('div');
        finalNode.className = 'computer-screen node-final';
        finalNode.id = `node-final`;
        finalNode.style.transform = `translateX(0) translateZ(${(TOTAL_Q + 1) * -2400}px)`;
        track.appendChild(finalNode);
    }

    function executarSequenciaPassos() {
        const rig = document.getElementById('camera-rig');
        rig.className = "camera-walking"; 
        sfx.passos.play();

        const zDestino = (currentQ + 1) * 2400;

        setTimeout(() => {
            rig.className = ""; 
            sfx.passos.stop();
            sfx.cameraTurn.play();

            // Desvio angular preciso para focar na tela acoplada à parede lateral
            const ladoOlhar = currentQ % 2 === 0 ? -40 : 40; 
            rig.style.transform = `translateZ(${zDestino}px) rotateY(${ladoOlhar}deg)`;

            setTimeout(() => {
                prepararPergunta(currentQ);
            }, 800);

        }, 2000); 
    }

    async function prepararPergunta(index) {
        const data = selectedQuestions[index];
        const ut = new SpeechSynthesisUtterance(data.q);
        ut.lang = 'pt-BR';
        window.speechSynthesis.speak(ut);

        await typeWriter(`q-text-${index}`, data.q);
        document.getElementById(`options-${index}`).classList.add('options-visible');
        iniciarTimer(index, data.correct);
    }

    function typeWriter(id, text) {
        return new Promise((res) => {
            let i = 0; const el = document.getElementById(id);
            sfx.write.play();
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 40); }
                else { sfx.write.stop(); res(); }
            }
            type();
        });
    }

    function iniciarTimer(id, correctIdx) {
        const bar = document.getElementById(`bar-${id}`);
        let width = 100;
        const timer = setInterval(() => {
            width -= 0.8; bar.style.width = width + '%';
            if (width <= 0) { clearInterval(timer); finalizarPergunta(correctIdx, false); }
        }, 50);
        bar.dataset.timerId = timer;
    }

    function validar(el, escolhido, correto, index) {
        const bar = document.getElementById(`bar-${index}`);
        if (bar) clearInterval(parseInt(bar.dataset.timerId));
        
        const parent = document.getElementById(`options-${index}`);
        if (parent.dataset.locked) return;
        parent.dataset.locked = "true";
        
        let acertou = (escolhido === correto);
        if (acertou) {
            acertos++;
            el.classList.add('correct');
            sfx.correct.play();
            confetti({ particleCount: 40, spread: 50, colors: ['#00f3ff', '#ff00aa'], origin: { y: 0.7 } });
        } else {
            el.classList.add('wrong');
            const corretoEl = parent.querySelectorAll('.option')[correto];
            corretoEl.classList.add('correct');
            sfx.wrong.play();
        }

        setTimeout(() => {
            avancarProxima();
        }, 2500);
    }

    function finalizarPergunta(corretoIdx, foiAcerto) {
        avancarProxima();
    }

    function avancarProxima() {
        const rig = document.getElementById('camera-rig');
        sfx.cameraTurn.play();
        
        const zDestino = (currentQ + 1) * 2400;
        rig.style.transform = `translateZ(${zDestino}px) rotateY(0deg)`;

        currentQ++;
        setTimeout(() => {
            if (currentQ < TOTAL_Q) {
                executarSequenciaPassos();
            } else {
                mostrarFinalCinematico();
            }
        }, 1000);
    }

    function mostrarFinalCinematico() {
        const rig = document.getElementById('camera-rig');
        rig.className = "camera-walking";
        sfx.passos.play();

        const zFinal = (TOTAL_Q + 1) * 2400;

        setTimeout(() => {
            rig.className = "";
            sfx.passos.stop();
            sfx.cameraTurn.play();
            rig.style.transform = `translateZ(${zFinal}px) rotateY(0deg)`;

            const finalPage = document.getElementById('node-final');
            finalPage.innerHTML = `
                <div style="text-align:center; padding-top: 1.5vh;">
                    <h2 style="font-family:'Orbitron'; font-size:2.8vh; color:#1e293b; margin:0; font-weight:800; letter-spacing:-1px;">ANÁLISE CONCLUÍDA</h2>
                    <div class="ask-grade">MODULO: APEX</div>
                    <p style="font-size: 1.9vh; color: #64748b; font-weight:600;">Assertividade de dados: ${acertos} de ${TOTAL_Q}</p>
                    <table class="grade-table">
                        <tr><th>MÓDULO</th><th>STATUS</th></tr>
                        <tr><td>Protocolo</td><td>Sincronizado</td></tr>
                    </table>
                    <p style="font-size: 1.4vh; margin-top: 3vh; color: #94a3b8; font-family:'Orbitron'; font-weight:600;">INSCREVA-SE PARA NOVOS TESTES</p>
                    <a href="https://www.pixelclick.fun" target="_blank" class="btn-cta" style="background: var(--neon-secondary); box-shadow: 0 10px 25px rgba(255,0,170,0.3);">ACESSAR REDE</a>
                </div>
            `;
            
            const finalUt = new SpeechSynthesisUtterance(`Varredura completa. Resultados salvos na central. Inscreva-se e deixe seu comentário!`);
            finalUt.lang = 'pt-BR';
            window.speechSynthesis.speak(finalUt);
        }, 2200);
    }
</script>
</body>
</html>
