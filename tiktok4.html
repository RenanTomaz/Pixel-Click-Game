<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Russo+One&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - Futuristic Lab Quiz</title>
    <style>
        :root {
            --bg-color: #060713;
            --neon-blue: #00f3ff;
            --neon-cyan: #00ffaa;
            --text-color: #ffffff;
            --wrong-color: #ff0055;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: #ffffff; /* Céu branco de fundo que vaza pelo teto aberto */
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            /* Calibração precisa da lente de perspectiva e altura do olho */
            perspective: 450px; 
            perspective-origin: 50% 50%;
        }

        /* Plataforma de Câmera com balanço suave e preciso */
        #camera-rig {
            width: 100vw; height: 100vh;
            transform-style: preserve-3d;
            transition: transform 2s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateZ(0px) rotateY(0deg);
        }

        .camera-walking {
            animation: cameraSciFi 0.7s ease-in-out infinite alternate;
        }

        @keyframes cameraSciFi {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-1.2vh) rotate(0.2deg); }
        }

        /* CENÁRIO 3D: Estrutura do Corredor do Laboratório */
        #studio-room {
            position: absolute;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        .room-element {
            position: absolute;
            background-color: var(--bg-color);
        }

        /* Chão metálico escuro com linhas neon reflexivas nas bordas */
        .floor {
            width: 400vw; height: 15000px;
            left: -150vw; top: 50vh;
            transform: rotateX(90deg);
            transform-origin: top center;
            background: linear-gradient(to bottom, #111424, #060713);
            border-left: 4px solid var(--neon-blue);
            border-right: 4px solid var(--neon-blue);
            box-shadow: 0 0 80px rgba(0, 243, 255, 0.3);
        }

        /* Teto aberto simula painéis futuristas que deixam ver o fundo branco */
        .ceiling {
            width: 80vw; height: 15000px;
            left: 10vw; top: -50vh;
            transform: rotateX(-90deg);
            transform-origin: bottom center;
            background: transparent;
            border-left: 2px dashed rgba(0, 243, 255, 0.4);
            border-right: 2px dashed rgba(0, 243, 255, 0.4);
        }

        /* Parede de Laboratório Esquerda */
        .wall-left {
            width: 15000px; height: 100vh;
            right: 50vw; top: 0;
            transform: rotateY(90deg);
            transform-origin: right center;
            background: linear-gradient(90deg, #090a1a, #0d1127);
            border-bottom: 5px solid var(--neon-blue);
            box-shadow: inset 0 -30px 50px rgba(0, 243, 255, 0.15);
        }

        /* Parede de Laboratório Direita */
        .wall-right {
            width: 15000px; height: 100vh;
            left: 50vw; top: 0;
            transform: rotateY(-90deg);
            transform-origin: left center;
            background: linear-gradient(-90deg, #090a1a, #0d1127);
            border-bottom: 5px solid var(--neon-cyan);
            box-shadow: inset 0 -30px 50px rgba(0, 255, 170, 0.15);
        }

        /* FORMATO VERTICAL 9:16 TRILHO CENTRAL */
        .cinematic-track {
            position: absolute;
            width: 100%; height: 100%;
            max-width: 420px; max-height: 746px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            transform-style: preserve-3d;
        }

        /* Monitores Holográficos de Computador Sci-Fi */
        .computer-screen {
            position: absolute;
            width: 88vw; height: 50vh;
            max-width: 370px; max-height: 400px;
            background: rgba(10, 15, 35, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 3vh 6%;
            display: flex; flex-direction: column;
            backface-visibility: hidden;
            left: 6%; top: 25%; /* Centralização vertical precisa no viewport */
        }

        .node-left { transform: translateX(-45vw) rotateY(50deg); border-color: var(--neon-blue); box-shadow: 0 0 30px rgba(0,243,255,0.4); }
        .node-right { transform: translateX(45vw) rotateY(-50deg); border-color: var(--neon-cyan); box-shadow: 0 0 30px rgba(0,255,170,0.4); }
        
        .node-final { 
            transform: translateX(0) rotateY(0deg); 
            background: rgba(6, 7, 19, 0.95);
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 40px var(--neon-cyan);
        }

        .question-text {
            font-family: 'Orbitron', sans-serif; color: var(--text-color);
            font-size: 2.2vh; font-weight: 500; line-height: 1.4; margin-top: 1vh; min-height: 10vh;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        .options-list { display: flex; flex-direction: column; gap: 1vh; margin-top: 2vh; opacity: 0; transition: opacity 0.3s; }
        .options-visible { opacity: 1; }
        
        .option { 
            font-family: 'Montserrat', sans-serif; font-size: 1.8vh; color: #b2c0f0; 
            padding: 1.2vh; background: rgba(255,255,255,0.03); border: 1px solid rgba(0,243,255,0.2);
            border-radius: 6px; cursor: pointer; transition: all 0.2s ease;
        }
        .option.correct { color: #fff !important; background: rgba(0, 255, 170, 0.3); border-color: var(--neon-cyan); font-weight: bold; box-shadow: 0 0 15px var(--neon-cyan); }
        .option.wrong { color: #fff !important; background: rgba(255, 0, 85, 0.3); border-color: var(--wrong-color); text-decoration: line-through; box-shadow: 0 0 15px var(--wrong-color); }

        .timer-container { width: 100%; height: 5px; background: rgba(255,255,255,0.1); margin-top: 1.5vh; border-radius: 3px; overflow: hidden; }
        .timer-bar { width: 100%; height: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        /* Interfaces de Sistema */
        #overlay-start, #countdown-overlay {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        #countdown-number { font-family: 'Orbitron'; font-size: 12vh; color: var(--neon-blue); text-shadow: 0 0 30px var(--neon-blue); }
        .btn-cta { padding: 15px 40px; font-family: 'Orbitron'; font-weight: 800; font-size: 1.8vh; background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); border-radius: 6px; cursor: pointer; text-decoration: none; margin-top: 20px; box-shadow: 0 0 15px rgba(0,243,255,0.3); transition: 0.3s; }
        .btn-cta:hover { background: var(--neon-blue); color: #000; }

        .grade-table { width: 100%; border-collapse: collapse; margin-top: 2vh; font-family: 'Montserrat'; font-size: 1.8vh; color: #fff; }
        .grade-table th, .grade-table td { border: 1px solid rgba(0,255,170,0.2); padding: 8px; text-align: center; }
        .ask-grade { font-family: 'Orbitron'; font-size: 3.5vh; color: var(--neon-cyan); text-align: center; margin: 2vh 0; text-shadow: 0 0 10px var(--neon-cyan); }
    </style>
</head>
<body>

<div id="countdown-overlay" style="display: none;"><div id="countdown-number">SYSTEM</div></div>

<div id="overlay-start">
    <h1 style="font-family: 'Orbitron'; font-size: 4.5vh; margin-bottom: 0; color: var(--neon-blue); letter-spacing: 2px;">LAB CORE</h1>
    <p style="font-size: 1.6vh; color: #525875; font-family: 'Orbitron';">INITIALIZE CINEMATIC MATRIX</p>
    <button class="btn-cta" onclick="iniciarDiretor()">BOOT SYSTEM</button>
</div>

<!-- Estrutura Principal de Câmera Calibrada -->
<div id="camera-rig">
    <!-- Laboratório Sci-Fi -->
    <div id="studio-room">
        <div class="room-element floor"></div>
        <div class="room-element ceiling"></div>
        <div class="room-element wall-left"></div>
        <div class="room-element wall-right"></div>
    </div>
    
    <!-- Linha de Deslocamento das Telas -->
    <div class="cinematic-track" id="main-track"></div>
</div>

<script>
    const mockPool = [
        { q: "Qual é o oceano mais profundo do planeta Terra", options: ["Atlântico", "Índico", "Pacífico", "Ártico"], correct: 2 },
        { q: "Quantos segundos existem em uma hora completa", options: ["3600 segundos", "60 segundos", "2400 segundos", "1200 segundos"], correct: 0 },
        { q: "Qual país é o maior produtor de café do mundo", options: ["Colômbia", "Brasil", "Etiópia", "Vietnã"], correct: 1 },
        { q: "Qual o planeta mais próximo do Sol no sistema", options: ["Vênus", "Marte", "Mercúrio", "Júpiter"], correct: 2 }
    ];

    const TOTAL_Q = 4;
    const selectedQuestions = mockPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;
    let acertos = 0;
    const letras = ["A", "B", "C", "D"];

    // Efeitos Sonoros Futuristas
    const sfx = {
        passos: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-heavy-robot-footstep-2713.mp3'], volume: 0.4 }),
        cameraTurn: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-futuristic-space-hiss-2908.mp3'], volume: 0.4 }),
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-computer-keyboard-typing-1386.mp3'], volume: 0.5, loop: true }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-electronic-retro-win-sound-2703.mp3'], volume: 0.5 }),
        wrong: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-system-fault-error-2911.mp3'], volume: 0.4 }),
        tick: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-digital-quick-click-2305.mp3'], volume: 0.3 })
    };

    function iniciarDiretor() {
        document.getElementById('overlay-start').style.display = 'none';
        const overlay = document.getElementById('countdown-overlay');
        const number = document.getElementById('countdown-number');
        overlay.style.display = 'flex';
        
        let count = 3;
        const runCount = () => {
            if (count > 0) {
                number.innerText = `LOAD: ${count}`;
                sfx.tick.play();
                count--;
                setTimeout(runCount, 1000);
            } else {
                overlay.style.display = 'none';
                construirCenario();
                executarSequenciaPassos();
            }
        };
        runCount();
    }

    function construirCenario() {
        const track = document.getElementById('main-track');
        
        selectedQuestions.forEach((data, index) => {
            if (!data.q.trim().endsWith('?')) data.q = data.q.trim() + "?";
            
            const node = document.createElement('div');
            const lado = index % 2 === 0 ? 'node-left' : 'node-right';
            node.className = `computer-screen ${lado}`;
            node.id = `node-${index}`;
            
            // Definição precisa do espaçamento dos nós digitais (2200px para evitar sobreposição)
            const zPosition = (index + 1) * -2200;
            node.style.transform += ` translateZ(${zPosition}px)`;

            node.innerHTML = `
                <div style="font-family:'Orbitron'; font-size: 1.3vh; color: var(--neon-blue); letter-spacing: 1px;">SYSTEM NODE_0${index + 1}</div>
                <div class="question-text" id="q-text-${index}"></div>
                <div class="timer-container"><div class="timer-bar" id="bar-${index}"></div></div>
                <div class="options-list" id="options-${index}">
                    ${data.options.map((opt, i) => `<div class="option" onclick="validar(this, ${i}, ${data.correct}, ${index})">${letras[i]} // ${opt}</div>`).join('')}
                </div>
            `;
            track.appendChild(node);
        });

        const finalNode = document.createElement('div');
        finalNode.className = 'computer-screen node-final';
        finalNode.id = `node-final`;
        finalNode.style.transform = `translateX(0) translateZ(${(TOTAL_Q + 1) * -2200}px)`;
        track.appendChild(finalNode);
    }

    function ejecutarSequenciaPassos() {
        const rig = document.getElementById('camera-rig');
        rig.className = "camera-walking"; 
        sfx.passos.play();

        const zDestino = (currentQ + 1) * 2200;

        setTimeout(() => {
            rig.className = ""; 
            sfx.passos.stop();
            sfx.cameraTurn.play();

            // Rotação ideal de observação em laboratórios (ângulo dinâmico de 42 graus)
            const ladoOlhar = currentQ % 2 === 0 ? -42 : 42; 
            rig.style.transform = `translateZ(${zDestino}px) rotateY(${ladoOlhar}deg)`;

            setTimeout(() => {
                prepararPergunta(currentQ);
            }, 800);

        }, 2000); 
    }

    async function prepararPergunta(index) {
        const data = selectedQuestions[index];
        const ut = new SpeechSynthesisUtterance(data.q);
        ut.lang = 'pt-BR';
        window.speechSynthesis.speak(ut);

        await typeWriter(`q-text-${index}`, data.q);
        document.getElementById(`options-${index}`).classList.add('options-visible');
        iniciarTimer(index, data.correct);
    }

    function typeWriter(id, text) {
        return new Promise((res) => {
            let i = 0; const el = document.getElementById(id);
            sfx.write.play();
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 40); }
                else { sfx.write.stop(); res(); }
            }
            type();
        });
    }

    function iniciarTimer(id, correctIdx) {
        const bar = document.getElementById(`bar-${id}`);
        let width = 100;
        const timer = setInterval(() => {
            width -= 0.8; bar.style.width = width + '%';
            if (width <= 0) { clearInterval(timer); finalizarPergunta(correctIdx, false); }
        }, 50);
        bar.dataset.timerId = timer;
    }

    function validar(el, escolhido, correto, index) {
        const bar = document.getElementById(`bar-${index}`);
        if (bar) clearInterval(parseInt(bar.dataset.timerId));
        
        const parent = document.getElementById(`options-${index}`);
        if (parent.dataset.locked) return;
        parent.dataset.locked = "true";
        
        let acertou = (escolhido === correto);
        if (acertou) {
            acertos++;
            el.classList.add('correct');
            sfx.correct.play();
            confetti({ particleCount: 40, spread: 50, colors: ['#00f3ff', '#00ffaa'], origin: { y: 0.7 } });
        } else {
            el.classList.add('wrong');
            const corretoEl = parent.querySelectorAll('.option')[correto];
            corretoEl.classList.add('correct');
            sfx.wrong.play();
        }

        setTimeout(() => {
            avancarProxima();
        }, 2500);
    }

    function finalizarPergunta(corretoIdx, foiAcerto) {
        avancarProxima();
    }

    function avancarProxima() {
        const rig = document.getElementById('camera-rig');
        sfx.cameraTurn.play();
        
        const zDestino = (currentQ + 1) * 2200;
        rig.style.transform = `translateZ(${zDestino}px) rotateY(0deg)`;

        currentQ++;
        setTimeout(() => {
            if (currentQ < TOTAL_Q) {
                executarSequenciaPassos();
            } else {
                mostrarFinalCinematico();
            }
        }, 1000);
    }

    function mostrarFinalCinematico() {
        const rig = document.getElementById('camera-rig');
        rig.className = "camera-walking";
        sfx.passos.play();

        const zFinal = (TOTAL_Q + 1) * 2200;

        setTimeout(() => {
            rig.className = "";
            sfx.passos.stop();
            sfx.cameraTurn.play();
            rig.style.transform = `translateZ(${zFinal}px) rotateY(0deg)`;

            const finalPage = document.getElementById('node-final');
            finalPage.innerHTML = `
                <div style="text-align:center; padding-top: 2vh;">
                    <h2 style="font-family:'Orbitron'; font-size:2.8vh; color:#fff; margin:0; letter-spacing:2px;">CORE TERMINATED</h2>
                    <div class="ask-grade" style="margin: 2vh 0;">RANK: OMEGA</div>
                    <p style="font-size: 2vh; color: #b2c0f0;">Módulos processados: ${acertos} / ${TOTAL_Q}</p>
                    <table class="grade-table">
                        <tr><th>DADOS</th><th>INTEGRIDADE</th></tr>
                        <tr><td>Sincronia</td><td>${(acertos/TOTAL_Q)*100}%</td></tr>
                    </table>
                    <p style="font-size: 1.4vh; margin-top: 4vh; color: #525875; font-family:'Orbitron'">CLIQUE PARA COMPARTILHAR O FEED</p>
                    <a href="https://www.pixelclick.fun" target="_blank" class="btn-cta" style="border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0,255,170,0.2);">SUBSCRIBE MATRIX</a>
                </div>
            `;
            
            const finalUt = new SpeechSynthesisUtterance(`Terminal finalizado. Resultados consolidados no banco de dados. Deixe seu like!`);
            finalUt.lang = 'pt-BR';
            window.speechSynthesis.speak(finalUt);
        }, 2200);
    }
</script>
</body>
</html>
