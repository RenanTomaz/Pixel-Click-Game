<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - Matrix Immersive 8 Qs</title>
    <style>
    :root {
        /* Cores Neon Absolutas */
        --neon-red: #ff3333;
        --neon-blue: #00f0ff;
        --neon-green: #39ff14;
        --neon-yellow: #ffea00;
        --neon-purple: #bd00ff;
        
        --panel-red: rgba(255, 51, 51, 0.08);
        --panel-blue: rgba(0, 240, 255, 0.08);
        --panel-green: rgba(57, 255, 20, 0.08);
        --panel-yellow: rgba(255, 234, 0, 0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* ANIMAÇÃO DO BACKGROUND: Gradiente Colorido Fluido */
    body {
        margin: 0; padding: 0; height: 100vh; width: 100vw;
        background: linear-gradient(125deg, #050508, #12021c, #020b14, #010f08);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        font-family: 'Montserrat', sans-serif;
        overflow: hidden; display: flex; justify-content: center; align-items: center;
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Moldura HUD com Pulsação Cibernética */
    .hud-frame {
        position: fixed; inset: 0;
        border: 2px solid rgba(0, 240, 255, 0.2);
        pointer-events: none; z-index: 999;
        box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 15px rgba(0, 240, 255, 0.1);
        animation: hudPulse 4s infinite alternate;
    }
    @keyframes hudPulse {
        from { border-color: rgba(0, 240, 255, 0.15); box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 10px rgba(0, 240, 255, 0.05); }
        to { border-color: rgba(189, 0, 255, 0.3); box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(189, 0, 255, 0.2); }
    }

    #countdown-overlay {
        position: fixed; inset: 0; 
        display: none; justify-content: center; align-items: center;
        background: rgba(3, 5, 8, 0.95); z-index: 10000;
        backdrop-filter: blur(5px);
    }
    #countdown-number {
        font-family: 'Orbitron', sans-serif; font-size: 15vh; color: #fff;
        text-shadow: 0 0 10px var(--neon-blue), 0 0 30px var(--neon-blue), 0 0 50px var(--neon-purple);
    }
    .animate-pop { animation: popSfx 1s ease-out; }
    @keyframes popSfx {
        0% { transform: scale(0.6); opacity: 0; }
        20% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 30px #fff; }
        100% { transform: scale(1); opacity: 0; }
    }

    .phone-viewport {
        height: 100vh;
        aspect-ratio: 9 / 16;
        position: relative;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.6);
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
    }

    #matrix-grid {
        width: 200%; height: 200%;
        position: absolute; top: 0; left: 0;
        display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
        transition: transform 1.2s cubic-bezier(0.7, 0, 0.2, 1);
        transform: scale(0.5) translate(-50%, -50%);
    }

    #matrix-grid.focus-init { transform: scale(0.5) translate(-50%, -50%); }
    #matrix-grid.focus-q0   { transform: scale(1) translate(0%, 0%); }       
    #matrix-grid.focus-q1   { transform: scale(1) translate(-50%, 0%); }     
    #matrix-grid.focus-q2   { transform: scale(1) translate(0%, -50%); }     
    #matrix-grid.focus-q3   { transform: scale(1) translate(-50%, -50%); }   
    #matrix-grid.focus-end  { transform: scale(0.5) translate(-50%, -50%); opacity: 0.15; }

    /* Quadrantes Translúcidos para Absorver o Fundo Colorido */
    .quadrant {
        width: 100%; height: 100%;
        padding: 7vh 8% 5vh 8%;
        display: flex; flex-direction: column;
        position: relative;
        background-color: rgba(3, 5, 8, 0.4);
        background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
        background-size: 30px 30px;
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.5s ease;
    }

    /* Brilho Neon Interno quando o Quadrante é focado */
    .quadrant.active-border-0 { border: 2px solid var(--neon-red); box-shadow: inset 0 0 30px rgba(255, 51, 51, 0.25), 0 0 15px rgba(255, 51, 51, 0.1); }
    .quadrant.active-border-1 { border: 2px solid var(--neon-blue); box-shadow: inset 0 0 30px rgba(0, 240, 255, 0.25), 0 0 15px rgba(0, 240, 255, 0.1); }
    .quadrant.active-border-2 { border: 2px solid var(--neon-green); box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.25), 0 0 15px rgba(57, 255, 20, 0.1); }
    .quadrant.active-border-3 { border: 2px solid var(--neon-yellow); box-shadow: inset 0 0 30px rgba(255, 234, 0, 0.25), 0 0 15px rgba(255, 234, 0, 0.1); }

    /* Textos com Brilho Glow Intenso */
    .brand-watermark {
        font-family: 'Orbitron', sans-serif; font-size: 3.5vh; font-weight: 900;
        letter-spacing: 6px; text-align: center; margin-bottom: 3vh; opacity: 0.95;
    }
    .q-red .brand-watermark { color: #fff; text-shadow: 0 0 8px var(--neon-red), 0 0 20px var(--neon-red); }
    .q-blue .brand-watermark { color: #fff; text-shadow: 0 0 8px var(--neon-blue), 0 0 20px var(--neon-blue); }
    .q-green .brand-watermark { color: #fff; text-shadow: 0 0 8px var(--neon-green), 0 0 20px var(--neon-green); }
    .q-yellow .brand-watermark { color: #fff; text-shadow: 0 0 8px var(--neon-yellow), 0 0 20px var(--neon-yellow); }

    .node-header {
        font-family: 'Orbitron', sans-serif; font-size: 1.5vh; font-weight: 900;
        padding: 10px 15px; border-radius: 6px; margin-bottom: 3vh; letter-spacing: 2px;
        background: rgba(0,0,0,0.4) !important;
    }
    .q-red .node-header { border: 1px solid var(--neon-red); color: var(--neon-red); box-shadow: 0 0 10px var(--panel-red); }
    .q-blue .node-header { border: 1px solid var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 10px var(--panel-blue); }
    .q-green .node-header { border: 1px solid var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px var(--panel-green); }
    .q-yellow .node-header { border: 1px solid var(--neon-yellow); color: var(--neon-yellow); box-shadow: 0 0 10px var(--panel-yellow); }

    .question-text { color: #ffffff; font-size: 2.5vh; font-weight: 700; line-height: 1.4; min-height: 14vh; margin-bottom: 1vh; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

    .options-container { display: flex; flex-direction: column; gap: 1.6vh; margin-top: 0; margin-bottom: 1vh; opacity: 0; transition: opacity 0.4s ease; }
    .options-visible { opacity: 1; }

    /* Botões de Opção Estilo Cyberpunk */
    .option-btn {
        font-family: 'Orbitron', sans-serif; font-size: 1.8vh; color: #fff;
        padding: 1.6vh 20px; background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
        cursor: pointer; display: flex; align-items: center; gap: 15px;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; text-align: left;
    }
    .option-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255,255,255,0.4); transform: scale(1.02); }
    .option-letter { font-weight: 900; padding-right: 10px; border-right: 1px solid rgba(255,255,255,0.2); }

    .q-red .option-btn { border-left: 4px solid var(--neon-red); }
    .q-blue .option-btn { border-left: 4px solid var(--neon-blue); }
    .q-green .option-btn { border-left: 4px solid var(--neon-green); }
    .q-yellow .option-btn { border-left: 4px solid var(--neon-yellow); }

    /* Estados de Acerto e Erro com Overglow */
    .option-btn.correct { color: #fff !important; background: rgba(57, 255, 20, 0.2) !important; border: 2px solid var(--neon-green) !important; box-shadow: 0 0 25px var(--neon-green); text-shadow: 0 0 5px #fff; }
    .option-btn.wrong { color: #ffcccc !important; background: rgba(255, 51, 51, 0.2) !important; border: 2px solid var(--neon-red) !important; box-shadow: 0 0 20px var(--neon-red); animation: wrongShake 0.4s linear; }
    @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    .timer-line { width: 100%; height: 6px; background: rgba(0, 0, 0, 0.4); border-radius: 3px; overflow: hidden; margin-bottom: 3vh; border: 1px solid rgba(255,255,255,0.05); }
    .timer-core { width: 100%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; }

    /* Telas de Overlay */
    #overlay-start { position: fixed; inset: 0; background: rgba(3, 5, 8, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(8px); }
    .btn-cta { margin-top: 30px; padding: 18px 45px; font-family: 'Orbitron', sans-serif; font-size: 2vh; font-weight: 900; background: transparent; color: #fff; border: 2px solid var(--neon-blue); border-radius: 30px; cursor: pointer; letter-spacing: 2px; box-shadow: 0 0 15px var(--panel-blue), inset 0 0 10px var(--panel-blue); transition: all 0.3s ease; text-shadow: 0 0 5px var(--neon-blue); }
    .btn-cta:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); text-shadow: none; transform: translateY(-2px); }

    /* Tela Final Holográfica */
    #final-overlay {
        position: absolute; inset: 4vh 6%; 
        background: rgba(5, 9, 18, 0.9);
        border: 2px solid var(--neon-purple); border-radius: 24px;
        box-shadow: 0 0 50px var(--neon-purple), inset 0 0 20px rgba(189, 0, 255, 0.3);
        z-index: 500; display: none; flex-direction: column;
        justify-content: center; align-items: center; text-align: center; color: #fff;
        backdrop-filter: blur(15px);
        animation: finalPanelShow 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes finalPanelShow { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .grade-table { width: 100%; border-collapse: collapse; margin-top: 3vh; font-size: 1.5vh; background: rgba(0,0,0,0.3); }
    .grade-table th, .grade-table td { border: 1px solid rgba(255,255,255,0.08); padding: 10px; text-align: center; }
    .grade-table th { color: var(--neon-blue); font-family: 'Orbitron'; text-shadow: 0 0 5px var(--neon-blue); }
    .ask-grade { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 3.2vh; color: var(--neon-yellow); margin: 2vh 0; text-shadow: 0 0 10px var(--neon-yellow); }
</style>

</head>
<body>

<div id="countdown-overlay"><div id="countdown-number">5</div></div>

<div id="overlay-start">
    <h1 style="font-family: 'Orbitron'; font-size: 4vh; letter-spacing: 4px; text-shadow: 0 0 15px var(--neon-blue);">PIXEL CLICK</h1>
    <button class="btn-cta" onclick="iniciarQuiz()">INICIAR CAPTURA</button>
</div>

<div class="phone-viewport">
    <div class="hud-frame"></div>
    
    <div id="final-overlay"></div>
    
    <div id="matrix-grid" class="focus-init">
        
        <div class="quadrant q-red" id="quad-0">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">_RED // SECTOR_01</div>
            <div class="question-text" id="q-text-0"></div>
            <div class="timer-line"><div class="timer-core" id="timer-0"></div></div>
            <div class="options-container" id="options-0"></div>
        </div>
        
        <div class="quadrant q-blue" id="quad-1">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">_BLUE // SECTOR_02</div>
            <div class="question-text" id="q-text-1"></div>
            <div class="timer-line"><div class="timer-core" id="timer-1"></div></div>
            <div class="options-container" id="options-1"></div>
        </div>
        
        <div class="quadrant q-green" id="quad-2">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">_GREEN // SECTOR_03</div>
            <div class="question-text" id="q-text-2"></div>
            <div class="timer-line"><div class="timer-core" id="timer-2"></div></div>
            <div class="options-container" id="options-2"></div>
        </div>
        
        <div class="quadrant q-yellow" id="quad-3">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">_YELLOW // SECTOR_04</div>
            <div class="question-text" id="q-text-3"></div>
            <div class="timer-line"><div class="timer-core" id="timer-3"></div></div>
            <div class="options-container" id="options-3"></div>
        </div>

    </div>
</div>

<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    const masterPool = [
        ...(typeof esportesData !== 'undefined' ? esportesData : []),
        ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
        ...(typeof historiaData !== 'undefined' ? historiaData : []),
        ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
        ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
        ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
    ];

    // Alterado estritamente para apresentar 8 questões
    const TOTAL_Q = 8;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;
    let acertos = 0;
    const letras = ["A", "B", "C", "D"];
    let timerInterval;

    const SECTOR_COLS = ['#d63031', '#00a8ff', '#27ae60', '#f1c40f'];

    const sfx = {
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-2101.mp3'], volume: 0.08, loop: true }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3'] }),
        wrong: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-failing-armpit-fart-3091.mp3'], volume: 0.2 }),
        tick: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-click-melodic-tone-1129.mp3'], volume: 0.4 }),
        zoom: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-futuristic-space-ship-vibration-1473.mp3'], volume: 0.4 })
    };

    function wakeUpSpeech() {
        const dummy = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(dummy);
    }

    function iniciarQuiz() {
        wakeUpSpeech();
        try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {}); } catch (e) {}

        document.getElementById('overlay-start').style.display = 'none';
        const overlay = document.getElementById('countdown-overlay');
        const number = document.getElementById('countdown-number');
        overlay.style.display = 'flex';
        
        let count = 5;
        const runCount = () => {
            if (count > 0) {
                number.innerText = count;
                number.classList.remove('animate-pop');
                void number.offsetWidth;
                number.classList.add('animate-pop');
                sfx.tick.play();
                count--;
                setTimeout(runCount, 1000);
            } else {
                overlay.style.display = 'none';
                executarRodada();
            }
        };
        runCount();
    }

    function executarRodada() {
        if (currentQ >= TOTAL_Q) {
            mostrarFinal();
            return;
        }

        const data = selectedQuestions[currentQ];
        
        // Operação Resto (%) garante mapeamento cíclico dos 4 quadrantes (0, 1, 2, 3) nas 8 rodadas
        const activeIdx = currentQ % 4;

        // Limpa bordas ativas anteriores de todos os quadrantes
        for (let i = 0; i < 4; i++) {
            document.getElementById(`quad-${i}`).className = `quadrant ${getQuadrantClass(i)}`;
        }

        // 1. Move a câmera para o quadrante correspondente
        sfx.zoom.play();
        document.getElementById('matrix-grid').className = `focus-q${activeIdx}`;

        // 2. Aplica a classe de borda brilhante visível apenas no quadrante em foco
        document.getElementById(`quad-${activeIdx}`).classList.add(`active-border-${activeIdx}`);

        if (!data.q.trim().endsWith('?')) data.q = data.q.trim() + "?";

        const originalCorrectOption = data.options[data.correct];
        const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);
        data.options = shuffledOptions;
        data.correct = shuffledOptions.indexOf(originalCorrectOption);

        // 3. Monta a árvore de elementos no contêiner da rodada ativa
        const targetContainer = document.getElementById(`options-${activeIdx}`);
        document.getElementById(`timer-${activeIdx}`).style.backgroundColor = SECTOR_COLS[activeIdx];
        document.getElementById(`q-text-${activeIdx}`).innerHTML = "";
        
        // Garante que o container de alternativas fique invisível antes da escrita terminar
        targetContainer.classList.remove('options-visible');
        targetContainer.innerHTML = data.options.map((opt, i) => 
            `<button class="option-btn" onclick="validar(this, ${i}, ${data.correct})"><span class="option-letter">${letras[i]}</span>${opt}</button>`
        ).join('');

        setTimeout(() => prepararEscrita(data, activeIdx), 1100);
    }

    function getQuadrantClass(idx) {
        if (idx === 0) return 'q-red';
        if (idx === 1) return 'q-blue';
        if (idx === 2) return 'q-green';
        return 'q-yellow';
    }

    async function prepararEscrita(data, activeIdx) {
        const ut = new SpeechSynthesisUtterance(data.q);
        ut.lang = 'pt-BR'; ut.rate = 1.1;
        window.speechSynthesis.speak(ut);

        await typeWriter(`q-text-${activeIdx}`, data.q);
        document.getElementById(`options-${activeIdx}`).classList.add('options-visible');
        iniciarTimer(data.correct, activeIdx);
    }

    function typeWriter(id, text) {
        return new Promise((res) => {
            let i = 0; const el = document.getElementById(id);
            sfx.write.play();
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 35); }
                else { sfx.write.stop(); res(); }
            }
            type();
        });
    }

    function iniciarTimer(correctIdx, activeIdx) {
        const bar = document.getElementById(`timer-${activeIdx}`);
        let width = 100;
        bar.style.width = '100%';
        
        timerInterval = setInterval(() => {
            width -= 0.8; bar.style.width = width + '%';
            if (width <= 0) { clearInterval(timerInterval); finalizarPergunta(correctIdx, false, activeIdx); }
        }, 50);
    }

    function validar(el, escolhido, correto) {
        clearInterval(timerInterval);
        const activeIdx = currentQ % 4;
        const parent = document.getElementById(`options-${activeIdx}`);
        if (parent.dataset.locked) return;
        
        let acertou = (escolhido === correto);
        if (acertou) acertos++;
        else { el.classList.add('wrong'); sfx.wrong.play(); }
        finalizarPergunta(correto, acertou, activeIdx);
    }

    function finalizarPergunta(corretoIdx, foiAcerto, activeIdx) {
        const parent = document.getElementById(`options-${activeIdx}`);
        if (parent.dataset.locked) return;
        parent.dataset.locked = "true";
        
        const correctOption = parent.querySelectorAll('.option-btn')[corretoIdx];
        correctOption.classList.add('correct');

        sfx.correct.play();
        confetti({
            particleCount: 80, spread: 60, origin: { y: 0.6 },
            colors: ['#00a8ff', '#27ae60', '#f1c40f', '#d63031']
        });

        setTimeout(() => {
            parent.removeAttribute('data-locked');
            currentQ++;
            executarRodada();
        }, 2500);
    }

    function mostrarFinal() {
        // 1. Executa o efeito de Zoom Out (Câmera recua mostrando a visão geral esmaecida)
        sfx.zoom.play();
        document.getElementById('matrix-grid').className = 'focus-end';
        
        // Limpa as bordas de destaque dos quadrantes
        for (let i = 0; i < 4; i++) {
            document.getElementById(`quad-${i}`).className = `quadrant ${getQuadrantClass(i)}`;
        }

        // 2. Renderiza e ativa o painel holográfico flutuante de resultados
        const finalOverlay = document.getElementById('final-overlay');
        finalOverlay.innerHTML = `
            <h2 style="font-family:'Orbitron'; font-size:2.6vh; color:var(--neon-blue); margin:0; letter-spacing:2px;">QUANTAS VOCÊ ACERTOU?</h2>
            <table class="grade-table">
                <tr><th>Acertos</th><th>Rank</th></tr>
                <tr><td>8</td><td>A+</td></tr>
                <tr><td>6-7</td><td>B</td></tr>
                <tr><td>4-5</td><td>C</td></tr>
                <tr><td>0-3</td><td>F</td></tr>
            </table>
            <a href="https://www.pixelclick.fun" target="_blank" class="btn-cta" style="font-size:1.8vh; padding:12px 30px; margin-top:4vh; display:inline-block; text-decoration:none;">www.pixelclick.fun</a>
        `;
        
        // Exibe o painel flutuante por cima do grid recuado
        finalOverlay.style.display = 'flex';
        
        const finalUt = new SpeechSynthesisUtterance("Quantas você acertou? Veja qual foi a sua nota e escreva nos comentários!");
        finalUt.lang = 'pt-BR'; window.speechSynthesis.speak(finalUt);
    }
</script>
</body>
</html>
