<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>Pixel Click - Matrix Immersive 4 Quadrants</title>
    <style>
        :root {
            --bg-dark: #030508;
            --neon-red: #d63031;
            --neon-blue: #00a8ff;
            --neon-green: #27ae60;
            --neon-yellow: #f1c40f;
            
            --panel-red: rgba(214, 48, 49, 0.05);
            --panel-blue: rgba(0, 168, 255, 0.05);
            --panel-green: rgba(39, 174, 96, 0.05);
            --panel-yellow: rgba(241, 196, 15, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Moldura de Gravação Global Fixo */
        .hud-frame {
            position: fixed; inset: 0;
            border: 2px solid rgba(255,255,255,0.05);
            pointer-events: none; z-index: 999;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        /* Overlay de Contagem */
        #countdown-overlay {
            position: fixed; inset: 0; 
            display: none; justify-content: center; align-items: center;
            background: rgba(3, 5, 8, 0.98); z-index: 10000;
        }
        #countdown-number {
            font-family: 'Orbitron', sans-serif; font-size: 15vh; color: #fff;
            text-shadow: 0 0 20px var(--neon-blue);
        }
        .animate-pop { animation: popSfx 1s ease-out; }
        @keyframes popSfx {
            0% { transform: scale(0.6); opacity: 0; }
            20% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* VIEWPORT 9:16 RIGIDA - Limita a visualização como a tela de um smartphone */
        .phone-viewport {
            height: 100vh;
            aspect-ratio: 9 / 16;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        /* O PALCO DA MATRIZ (Contém os 4 quadrantes lado a lado em malha 2x2) */
        #matrix-grid {
            width: 200%; height: 200%;
            position: absolute; top: 0; left: 0;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.2, 1);
            transform: scale(0.5) translate(-50%, -50%); /* Visão Geral Inicial */
        }

        /* Estados da Câmera: Movimenta a malha e dá zoom de 100% no quadrante desejado */
        #matrix-grid.focus-init { transform: scale(0.5) translate(-50%, -50%); }
        #matrix-grid.focus-q1   { transform: scale(1) translate(0%, 0%); }       /* Q1 Vermelho ocupa 100% */
        #matrix-grid.focus-q2   { transform: scale(1) translate(-50%, 0%); }     /* Q2 Azul ocupa 100% */
        #matrix-grid.focus-q3   { transform: scale(1) translate(0%, -50%); }     /* Q3 Verde ocupa 100% */
        #matrix-grid.focus-q4   { transform: scale(1) translate(-50%, -50%); }   /* Q4 Amarelo ocupa 100% */
        #matrix-grid.focus-end  { transform: scale(0.5) translate(-50%, -50%); }

        /* Estilização Geral de cada Quadrante da imagem de referência */
        .quadrant {
            width: 100%; height: 100%;
            padding: 6vh 8% 4vh 8%;
            display: flex; flex-direction: column;
            position: relative;
            background-color: var(--bg-dark);
            /* Grid interno de dados sutil */
            background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 25px 25px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Customizações específicas de identidade de cada quadrante */
        .q-red { background: linear-gradient(135deg, #070202, #140505); border-top: 4px solid var(--neon-red); }
        .q-blue { background: linear-gradient(135deg, #02050c, #050e1a); border-top: 4px solid var(--neon-blue); }
        .q-green { background: linear-gradient(135deg, #020704, #05140b); border-top: 4px solid var(--neon-green); }
        .q-yellow { background: linear-gradient(135deg, #080702, #1a1605); border-top: 4px solid var(--neon-yellow); }

        /* Marcas d'água decorativas de ID corporativo Pixel Click */
        .brand-watermark {
            font-family: 'Orbitron', sans-serif; font-size: 3.5vh; font-weight: 900;
            letter-spacing: 4px; text-align: center; margin-bottom: 4vh; opacity: 0.85;
        }
        .q-red .brand-watermark { color: #fff; text-shadow: 0 0 10px var(--neon-red); }
        .q-blue .brand-watermark { color: #fff; text-shadow: 0 0 10px var(--neon-blue); }
        .q-green .brand-watermark { color: #fff; text-shadow: 0 0 10px var(--neon-green); }
        .q-yellow .brand-watermark { color: #fff; text-shadow: 0 0 10px var(--neon-yellow); }

        /* HUD Headers Internos */
        .node-header {
            font-family: 'Orbitron', sans-serif; font-size: 1.8vh; font-weight: 900;
            padding: 10px 15px; border-radius: 8px; margin-bottom: 3vh; letter-spacing: 1px;
        }
        .q-red .node-header { background: var(--panel-red); border: 1px solid var(--neon-red); color: var(--neon-red); }
        .q-blue .node-header { background: var(--panel-blue); border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .q-green .node-header { background: var(--panel-green); border: 1px solid var(--neon-green); color: var(--neon-green); }
        .q-yellow .node-header { background: var(--panel-yellow); border: 1px solid var(--neon-yellow); color: var(--neon-yellow); }

        /* Corpo da Questão */
        .question-text {
            color: #ffffff; font-size: 2.6vh; font-weight: 700;
            line-height: 1.4; min-height: 14vh; margin-bottom: 2vh;
        }

        /* Caixa das Alternativas */
        .options-container {
            display: flex; flex-direction: column; gap: 1.8vh;
            margin-top: auto; margin-bottom: 2vh; opacity: 0; transition: opacity 0.4s ease;
        }
        .options-visible { opacity: 1; }

        /* Estilização Rígida dos Botões */
        .option-btn {
            font-family: 'Orbitron', sans-serif; font-size: 2vh; color: #fff;
            padding: 1.8vh 20px; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: all 0.2s ease; width: 100%; text-align: left;
        }
        .option-letter {
            font-weight: 900; padding-right: 10px; border-right: 1px solid rgba(255,255,255,0.2);
        }

        /* Vinculação de cores de destaque às bordas das opções baseadas no container ativo */
        .q-red .option-btn { border-left: 4px solid var(--neon-red); }
        .q-blue .option-btn { border-left: 4px solid var(--neon-blue); }
        .q-green .option-btn { border-left: 4px solid var(--neon-green); }
        .q-yellow .option-btn { border-left: 4px solid var(--neon-yellow); }

        /* Comportamento de Status Operacionais (Certo / Errado) */
        .option-btn.correct {
            color: #fff !important; background: rgba(39, 174, 96, 0.25) !important;
            border: 2px solid var(--neon-green) !important; box-shadow: 0 0 20px rgba(39, 174, 96, 0.4);
        }
        .option-btn.wrong {
            color: #ffcccc !important; background: rgba(214, 48, 49, 0.2) !important;
            border: 2px solid var(--neon-red) !important; box-shadow: 0 0 15px rgba(214, 48, 49, 0.3);
            animation: wrongShake 0.4s linear;
        }
        @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }

        /* Cronômetros Lineares */
        .timer-line { width: 100%; height: 4px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; margin-bottom: 4vh; }
        .timer-core { width: 100%; height: 100%; background: #fff; }

        /* Tela de Entrada */
        #overlay-start {
            position: fixed; inset: 0; background: var(--bg-dark);
            z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
        }
        .btn-cta {
            margin-top: 30px; padding: 18px 45px; font-family: 'Orbitron', sans-serif;
            font-size: 2vh; font-weight: 900; background: transparent; color: #fff; 
            border: 2px solid var(--neon-blue); border-radius: 30px; cursor: pointer;
            letter-spacing: 2px; box-shadow: 0 0 15px rgba(0, 168, 255, 0.2);
        }

        /* Resultados */
        .end-panel {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: #fff;
            padding: 0 20px;
        }
        .grade-table { width: 100%; border-collapse: collapse; margin-top: 3vh; font-size: 1.6vh; }
        .grade-table th, .grade-table td { border: 1px solid rgba(255,255,255,0.1); padding: 10px; text-align: center; }
        .grade-table th { color: var(--neon-blue); font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="countdown-overlay"><div id="countdown-number">5</div></div>

<div id="overlay-start">
    <h1 style="font-family: 'Orbitron'; font-size: 4vh; letter-spacing: 4px; text-shadow: 0 0 15px var(--neon-blue);">PIXEL CLICK</h1>
    <button class="btn-cta" onclick="iniciarQuiz()">INICIAR CAPTURA</button>
</div>

<div class="phone-viewport">
    <div class="hud-frame"></div>
    
    <div id="matrix-grid" class="focus-init">
        
        <div class="quadrant q-red" id="quad-0">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">NODE_RED // SECTOR_01</div>
            <div class="question-text" id="q-text-0"></div>
            <div class="timer-line"><div class="timer-core" id="timer-0"></div></div>
            <div class="options-container" id="options-0"></div>
        </div>
        
        <div class="quadrant q-blue" id="quad-1">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">NODE_BLUE // SECTOR_02</div>
            <div class="question-text" id="q-text-1"></div>
            <div class="timer-line"><div class="timer-core" id="timer-1"></div></div>
            <div class="options-container" id="options-1"></div>
        </div>
        
        <div class="quadrant q-green" id="quad-2">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">NODE_GREEN // SECTOR_03</div>
            <div class="question-text" id="q-text-2"></div>
            <div class="timer-line"><div class="timer-core" id="timer-2"></div></div>
            <div class="options-container" id="options-2"></div>
        </div>
        
        <div class="quadrant q-yellow" id="quad-3">
            <div class="brand-watermark">PIXEL<br>CLICK</div>
            <div class="node-header">NODE_YELLOW // SECTOR_04</div>
            <div class="question-text" id="q-text-3"></div>
            <div class="timer-line"><div class="timer-core" id="timer-3"></div></div>
            <div class="options-container" id="options-3"></div>
        </div>

    </div>
</div>

<script src="esportes.js"></script>
<script src="geografia.js"></script>
<script src="historia.js"></script>
<script src="natureza.js"></script>
<script src="ciencia.js"></script>
<script src="entretenimento.js"></script>

<script>
    const masterPool = [
        ...(typeof esportesData !== 'undefined' ? esportesData : []),
        ...(typeof geografiaData !== 'undefined' ? geografiaData : []),
        ...(typeof historiaData !== 'undefined' ? historiaData : []),
        ...(typeof naturezaData !== 'undefined' ? naturezaData : []),
        ...(typeof cienciaData !== 'undefined' ? cienciaData : []),
        ...(typeof entretenimentoData !== 'undefined' ? entretenimentoData : [])
    ];

    // Travado estritamente em 4 rodadas para preencher o Grid de Cores
    const TOTAL_Q = 4;
    const selectedQuestions = masterPool.sort(() => 0.5 - Math.random()).slice(0, TOTAL_Q);
    let currentQ = 0;
    let acertos = 0;
    const letras = ["A", "B", "C", "D"];
    let timerInterval;

    const CAMERA_CLASSES = ['focus-q1', 'focus-q2', 'focus-q3', 'focus-q4'];
    const SECTOR_COLS = ['#d63031', '#00a8ff', '#27ae60', '#f1c40f'];

    const sfx = {
        write: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-pencil-writing-on-paper-2101.mp3'], volume: 0.08, loop: true }),
        correct: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3'] }),
        wrong: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-failing-armpit-fart-3091.mp3'], volume: 0.2 }),
        tick: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-click-melodic-tone-1129.mp3'], volume: 0.4 }),
        zoom: new Howl({ src: ['https://assets.mixkit.co/sfx/preview/mixkit-futuristic-space-ship-vibration-1473.mp3'], volume: 0.4 })
    };

    function wakeUpSpeech() {
        const dummy = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(dummy);
    }

    function iniciarQuiz() {
        wakeUpSpeech();
        try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {}); } catch (e) {}

        document.getElementById('overlay-start').style.display = 'none';
        const overlay = document.getElementById('countdown-overlay');
        const number = document.getElementById('countdown-number');
        overlay.style.display = 'flex';
        
        let count = 5;
        const runCount = () => {
            if (count > 0) {
                number.innerText = count;
                number.classList.remove('animate-pop');
                void number.offsetWidth;
                number.classList.add('animate-pop');
                sfx.tick.play();
                count--;
                setTimeout(runCount, 1000);
            } else {
                overlay.style.display = 'none';
                executarRodada();
            }
        };
        runCount();
    }

    function executarRodada() {
        if (currentQ >= TOTAL_Q) {
            mostrarFinal();
            return;
        }

        const data = selectedQuestions[currentQ];
        
        // 1. Ativa o movimento de imersão de câmera da malha de quadrantes
        sfx.zoom.play();
        document.getElementById('matrix-grid').className = CAMERA_CLASSES[currentQ];

        // 2. Garante formatação gramatical estruturada
        if (!data.q.trim().endsWith('?')) data.q = data.q.trim() + "?";

        // 3. Embaralha as respostas mantendo rastreio do ponteiro original
        const originalCorrectOption = data.options[data.correct];
        const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);
        data.options = shuffledOptions;
        data.correct = shuffledOptions.indexOf(originalCorrectOption);

        // 4. Constrói a árvore DOM interna do bloco operacional correspondente
        const targetContainer = document.getElementById(`options-${currentQ}`);
        document.getElementById(`timer-${currentQ}`).style.backgroundColor = SECTOR_COLS[currentQ];
        
        targetContainer.innerHTML = data.options.map((opt, i) => 
            `<button class="option-btn" onclick="validar(this, ${i}, ${data.correct})"><span class="option-letter">${letras[i]}</span>${opt}</button>`
        ).join('');

        // Dispara processos dinâmicos após estabilização da transição mecânica
        setTimeout(() => prepararEscrita(data), 1000);
    }

    async function prepararEscrita(data) {
        const ut = new SpeechSynthesisUtterance(data.q);
        ut.lang = 'pt-BR'; ut.rate = 1.1;
        window.speechSynthesis.speak(ut);

        await typeWriter(`q-text-${currentQ}`, data.q);
        document.getElementById(`options-${currentQ}`).classList.add('options-visible');
        iniciarTimer(data.correct);
    }

    function typeWriter(id, text) {
        return new Promise((res) => {
            let i = 0; const el = document.getElementById(id);
            sfx.write.play();
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 35); }
                else { sfx.write.stop(); res(); }
            }
            type();
        });
    }

    function iniciarTimer(correctIdx) {
        const bar = document.getElementById(`timer-${currentQ}`);
        let width = 100;
        bar.style.width = '100%';
        
        timerInterval = setInterval(() => {
            width -= 0.8; bar.style.width = width + '%';
            if (width <= 0) { clearInterval(timerInterval); finalizarPergunta(correctIdx, false); }
        }, 50);
    }

    function validar(el, escolhido, correto) {
        clearInterval(timerInterval);
        const parent = document.getElementById(`options-${currentQ}`);
        if (parent.dataset.locked) return;
        
        let acertou = (escolhido === correto);
        if (acertou) acertos++;
        else { el.classList.add('wrong'); sfx.wrong.play(); }
        finalizarPergunta(correto, acertou);
    }

    function finalizarPergunta(corretoIdx, foiAcerto) {
        const parent = document.getElementById(`options-${currentQ}`);
        if (parent.dataset.locked) return;
        parent.dataset.locked = "true";
        
        const correctOption = parent.querySelectorAll('.option-btn')[corretoIdx];
        correctOption.classList.add('correct');

        sfx.correct.play();
        confetti({
            particleCount: 80, spread: 60, origin: { y: 0.6 },
            colors: ['#00a8ff', '#27ae60', '#f1c40f', '#d63031']
        });

        // Aguarda exibição do status antes de mover para o próximo quadrante
        setTimeout(() => {
            currentQ++;
            executarRodada();
        }, 2500);
    }

    function mostrarFinal() {
        // Recua a câmera para visualização total estável
        document.getElementById('matrix-grid').className = 'focus-end';
        
        // Substitui o quadrante amarelo (último) pela tela de pontuação global centralizada
        const lastQuad = document.getElementById('quad-3');
        lastQuad.style.background = 'var(--bg-dark)';
        lastQuad.style.borderColor = 'var(--neon-blue)';
        
        lastQuad.innerHTML = `
            <div class="end-panel">
                <h2 style="font-family:'Orbitron'; font-size:2.4vh; color:var(--neon-blue); margin:0; letter-spacing:2px;">SISTEMA CONCLUÍDO</h2>
                <div class="ask-grade" style="font-family:'Orbitron'; font-size:3.5vh; font-weight:900; color:var(--neon-yellow); margin:2vh 0;">SCORE: ${acertos}/${TOTAL_Q}</div>
                <table class="grade-table">
                    <tr><th>Acertos</th><th>Rank</th></tr>
                    <tr><td>4</td><td>A+ (CYBER GOD)</td></tr>
                    <tr><td>3</td><td>B (NETRUNNER)</td></tr>
                    <tr><td>2</td><td>C (OPERATOR)</td></tr>
                    <tr><td>0-1</td><td>F (DISCONNECTED)</td></tr>
                </table>
                <a href="https://www.pixelclick.fun" target="_blank" class="btn-cta" style="font-size:1.8vh; padding:12px 30px; margin-top:4vh; display:inline-block; text-decoration:none;">RECONECTAR</a>
            </div>
        `;
        
        const finalUt = new SpeechSynthesisUtterance("Quantas você acertou? Veja qual foi a sua nota e escreva nos comentários!");
        finalUt.lang = 'pt-BR'; window.speechSynthesis.speak(finalUt);
    }
</script>
</body>
</html>
