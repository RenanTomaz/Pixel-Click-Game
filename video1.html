<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação Campanha - Adulto Ney</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container do Vídeo Cinematográfico */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-container.visible {
            opacity: 0.45; /* Luz de fundo perfeita para dar contraste ao texto */
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Vinheta escura para focar a atenção no centro */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
        }

        /* Palco Principal (Conteúdo) */
        .stage {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 700px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Transições de Imagem Avançadas */
        .artwork-frame {
            position: absolute;
            top: -120px;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: opacity 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .artwork-frame.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .artwork-frame img {
            width: 160px;
            height: auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 25px rgba(255, 223, 0, 0.3));
        }

        /* Tipografia Dinâmica (Fade In/Out + Deslocamento) */
        .slide-text {
            position: absolute;
            color: #ffffff;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
            filter: blur(5px);
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }

        /* Estado Ativo (Visível e Nítido) */
        .slide-text.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        /* Estado de Saída (Sobe sumindo para o próximo entrar) */
        .slide-text.exit {
            opacity: 0;
            transform: translateY(-25px);
            filter: blur(3px);
        }

        /* Cores de Destaque da Identidade Visual */
        .gold { color: #ffdf00; text-shadow: 0 0 15px rgba(255, 223, 0, 0.5); }
        .green { color: #009c3b; text-shadow: 0 0 15px rgba(0, 156, 59, 0.5); }

        /* CTA Botão Elegante */
        .cta-box {
            position: absolute;
            bottom: -50px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
        }

        .cta-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-action {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 45px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-action:hover {
            background: #ffdf00;
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .slide-text { font-size: 22px; }
            .artwork-frame img { width: 130px; }
        }
    </style>
</head>
<body>

    <!-- Cenário 1: Vídeo de Fundo Dinâmico -->
    <div class="video-container" id="videoBg">
        <video id="promoVideo" loop muted playsinline>
            <source src="neyvideo.mp4" type="video/mp4">
        </video>
        <div class="vignette"></div>
    </div>

    <!-- Palco da Apresentação -->
    <div class="stage">
        
        <!-- Cenário 2: Imagem Principal com entrada suave -->
        <div class="artwork-frame" id="artFrame">
            <img src="aney.png" alt="Adulto Ney">
        </div>

        <!-- Sequência de Textos da Apresentação -->
        <div class="slide-text active" id="text1">Faltam poucos dias para a <br><span class="gold">Estreia da Copa</span>...</div>
        <div class="slide-text" id="text2">E o <span class="green">Adulto Ney</span> precisa da sua ajuda.</div>
        <div class="slide-text" id="text3">Entramos na contagem regressiva <br>pelo Hexa. ⏳</div>
        <div class="slide-text" id="text4">Faça parte do <br><span class="gold">Mutirão Oficial</span>!</div>

        <!-- Botão de fechamento da apresentação -->
        <div class="cta-box" id="ctaBox">
            <a href="https://adultoney.com.br" class="btn-action">Enviar Energia ⚡</a>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const text1 = document.getElementById('text1');
            const text2 = document.getElementById('text2');
            const text3 = document.getElementById('text3');
            const text4 = document.getElementById('text4');
            const videoBg = document.getElementById('videoBg');
            const promoVideo = document.getElementById('promoVideo');
            const artFrame = document.getElementById('artFrame');
            const ctaBox = document.getElementById('ctaBox');

            // Linha do tempo controlada para transições profissionais (em milissegundos)
            
            // Passo 1: Transição do Texto 1 para o Texto 2 + Entrada do Vídeo
            setTimeout(() => {
                text1.classList.add('exit');
                text2.classList.add('active');
                
                // O vídeo entra de forma suave no fundo e começa a rodar
                videoBg.classList.add('visible');
                if(promoVideo) promoVideo.play();
            }, 3000);

            // Passo 2: Transição do Texto 2 para o Texto 3 + Aparição da Imagem aney.png
            setTimeout(() => {
                text2.classList.add('exit');
                text3.classList.add('active');
                
                // A arte em pixel art surge com efeito elástico controlado por CSS
                artFrame.classList.add('active');
            }, 6000);

            // Passo 3: Transição do Texto 3 para o Texto Final (Foco na Chamada)
            setTimeout(() => {
                text3.classList.add('exit');
                text4.classList.add('active');
            }, 9000);

            // Passo 4: Revelação do Botão de Ação (CTA)
            setTimeout(() => {
                ctaBox.classList.add('active');
            }, 10200);
        });
    </script>
</body>
</html>
